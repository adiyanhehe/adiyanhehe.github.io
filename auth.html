<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Identity // Nexus Protocol</title>
    <!-- Matched web.html font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Load GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #030303;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00A2FF;
            --accent-glow: rgba(0, 162, 255, 0.3);
            --transition: cubic-bezier(0.76, 0, 0.24, 1);
            --discord: #5865F2;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            background: #000; color: #fff; font-family: 'Outfit', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow-x: hidden; position: relative;
        }

        #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.2; z-index: -1; filter: blur(20px); }

        /* AUTH CARD CONTAINER */
        .auth-card {
            width: 100%; max-width: 480px; padding: 50px; background: rgba(10,10,10,0.85); backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 24px; position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); z-index: 10;
            margin: 100px 20px 40px;
            opacity: 1 !important; visibility: visible !important; /* Safety */
        }

        .auth-header { text-align: center; margin-bottom: 35px; }
        .auth-header h1 { font-weight: 900; font-size: 2.2rem; letter-spacing: -1px; text-transform: uppercase; color: #fff; }
        .auth-header p { color: #888; font-size: 0.95rem; margin-top: 10px; }

        /* SOCIAL PROVIDERS */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .btn-social {
            padding: 16px; border-radius: 100px; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: rgba(255,255,255,0.03); color: #fff; font-weight: 800; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.4s var(--transition);
            opacity: 1 !important; visibility: visible !important; /* Safety Force */
        }
        .btn-social:hover { background: #fff; color: #000; transform: translateY(-3px); }
        .btn-social svg { width: 18px; height: 18px; fill: currentColor; }
        
        /* Discord Highlight */
        .btn-discord { grid-column: 1 / -1; background: var(--discord); border-color: transparent; border-radius: 100px; padding: 18px; font-weight: 900; }
        .btn-discord:hover { background: #4752c4; color: #fff; box-shadow: 0 10px 30px rgba(88, 101, 242, 0.4); }

        /* DIVIDER */
        .divider { display: flex; align-items: center; gap: 15px; color: #444; margin: 25px 0; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #222; }

        /* INPUTS */
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-label { display: block; margin-bottom: 8px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #555; }
        input {
            width: 100%; padding: 18px; background: rgba(0, 0, 0, 0.5); border: 1px solid #333;
            border-radius: 14px; color: #fff; font-family: inherit; font-size: 1rem; outline: none; transition: 0.4s;
        }
        input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.03); }

        /* MAIN BUTTON */
        .btn-submit {
            width: 100%; padding: 22px; background: #fff; color: #000; border: none; border-radius: 100px;
            font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.4s var(--transition); margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .btn-submit:hover { transform: translateY(-5px); background: var(--accent); color: #fff; box-shadow: 0 20px 40px var(--accent-glow); }

        /* LIGHT MODE */
        body.light-mode { background: #f5f6f7; color: #000; }
        body.light-mode .auth-card { background: #fff; border-color: #eee; }
        body.light-mode .auth-header h1 { color: #000; }
        body.light-mode input { background: #fafafa; border-color: #eee; color: #000; }

        #toast { position: fixed; top: 40px; background: var(--accent); color: #fff; padding: 18px 40px; border-radius: 100px; font-weight: 900; font-size: 1rem; transform: translateY(-150px); opacity: 0; transition: 1s var(--transition); z-index: 999999; }
        #toast.active { transform: translateY(0); opacity: 1; }
    </style>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">ADIYAN<span>.</span>NEXUS</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="threads.html" class="nav-item">Threads</a>
        </nav>
    </header>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="videos/web2.mp4" type="video/mp4">
    </video>

    <div id="toast">Protocol Synced.</div>

    <div class="auth-card">
        <div class="auth-header">
            <h1 id="title">NEXUS<span>.</span>ID</h1>
            <p id="mode-text">Sync your Global Identity via Discord</p>
        </div>

        <div class="social-grid">
            <button class="btn-social btn-discord interactable" onclick="handleSocial('discord')">
                <svg viewBox="0 0 127.14 96.36"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.39,80.21a105.73,105.73,0,0,0,32.77,16.15,77.7,77.7,0,0,0,7.32-11.85,67.35,67.35,0,0,1-11.75-5.67c.91-.66,1.8-1.34,2.66-2.05a75.57,75.57,0,0,0,59.36,0c.86.71,1.75,1.39,2.66,2.05a67.48,67.48,0,0,1-11.75,5.67,77.72,77.72,0,0,0,7.31,11.85,105.3,105.3,0,0,0,32.81-16.15C129.58,52.84,124.93,29.13,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
                Sync with Discord
            </button>
            <button class="btn-social interactable" onclick="handleSocial('google')">
                <svg viewBox="0 0 24 24"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.91 3.22-1.91 4.22-1.21 1.21-3.11 2.52-6.52 2.52-5.41 0-9.67-4.38-9.67-9.79s4.26-9.79 9.67-9.79c3.08 0 5.41 1.15 7.11 2.76l2.31-2.31C18.81 1.15 15.91 0 12 0 5.41 0 0 5.41 0 12s5.41 12 12 12c3.54 0 6.64-1.2 8.71-3.5 2.21-2.21 2.91-5.31 2.91-7.85 0-.54-.05-1.07-.12-1.57h-11.02z"/></svg>
                Google
            </button>
            <button class="btn-social interactable" onclick="handleSocial('github')">
                <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.042-1.416-4.042-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                GitHub
            </button>
        </div>

        <div class="divider">OR SECURE PASS</div>

        <div class="input-group">
            <span class="input-label">Identity Email</span>
            <input type="email" id="email" placeholder="agent@nexus.net">
        </div>
        <div class="input-group">
            <span class="input-label">Access Phrase</span>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-submit interactable" onclick="handleSubmit()" id="submit-btn" style="opacity: 1 !important; visibility: visible !important;">
            <div id="btn-text">Authenticate</div>
            <div id="btn-loader" class="loader"></div>
        </button>
    </div>

    <!-- Scripts at end -->
    <script src="global.js"></script>
    <script>
        // Force Reveal
        window.addEventListener('load', () => {
            gsap.set('.auth-card, .btn-social, .btn-submit, .input-group', { opacity: 1, visibility: 'visible', y: 0, scale: 1 });
        });

        async function handleSocial(provider) {
            try {
                if(!window.supabaseClient) return alert("System Booting...");
                await window.supabaseClient.auth.signInWithOAuth({
                    provider: provider,
                    options: { redirectTo: window.location.origin + window.location.pathname.replace('auth.html', 'index.html') }
                });
            } catch (e) { alert(e.message); }
        }

        async function handleSubmit() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(!email || !pass) return alert("Credentials required.");
            document.getElementById('btn-text').style.display = 'none';
            document.getElementById('btn-loader').style.display = 'block';
            try {
                const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password: pass });
                if(error) throw error;
                showToast("Access Granted");
                setTimeout(() => location.href = 'index.html', 1000);
            } catch (e) { alert(e.message); }
            finally { document.getElementById('btn-text').style.display = 'block'; document.getElementById('btn-loader').style.display = 'none'; }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 3000);
        }
    </script>
</body>
</html>
