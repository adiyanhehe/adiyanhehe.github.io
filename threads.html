<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Threads // Global Feed</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Poppins:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Design System: Reusing Pulse/Discuss CSS -->
    <link rel="stylesheet" href="discuss.css">
    <style>
        /* Thread-specific overrides and additions */
        .thread-item {
            background: var(--bg-panel-soft);
            margin-bottom: 16px;
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .thread-item:hover {
            background: var(--bg-panel-hover);
            transform: translateY(-2px);
            border-color: var(--border-strong);
        }
        .trend-item {
            padding: 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
        }
        .trend-item:hover {
            background: var(--bg-panel-hover);
        }
        .accent-text {
            color: var(--accent);
            font-weight: 600;
        }
        .composer-card {
            background: var(--bg-panel-strong);
            padding: 20px;
            border-radius: var(--radius-xl);
            margin-bottom: 24px;
            border: 1px solid var(--border-strong);
        }
        .feed-scroll {
            height: 100%;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }
        /* Mobile fixes */
        @media (max-width: 1024px) {
            .directory-panel { display: none !important; }
        }
        @media (max-width: 768px) {
            .sidebar { display: none !important; }
        }
    </style>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="messenger-app">
    <!-- Universal Header will be injected by global.js -->
    <script src="global.js"></script>

    <div class="messenger-app">
        <!-- Far Left Sidebar (Same as Discuss) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-nav">
                    <button class="nav-item" onclick="location.href='discuss.html'">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span>Pulse</span>
                    </button>
                    <button class="nav-item active">
                        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                        <span>Threads</span>
                    </button>
                    <button class="nav-item" onclick="location.href='profile.html'">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <span>Account</span>
                    </button>
                </div>
            </div>
            
            <div class="sidebar-bottom">
                 <div class="user-card glass-panel" style="padding: 16px; border-radius: var(--radius-lg); text-align: center;">
                    <img id="side-pic" src="jay.png" style="width: 50px; height: 50px; border-radius: 14px; margin-bottom: 8px;">
                    <div id="side-name" style="font-weight: 700; font-size: 0.9rem;">...</div>
                    <div style="display: flex; gap: 8px; justify-content: center; font-size: 0.7rem; color: var(--text-soft); margin-top: 8px;">
                        <div><span id="stat-followers">0</span> Follows</div>
                        <div><span id="stat-posts">0</span> Posts</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Mid Panel: Trends/Discovery (Replacing Directory) -->
        <main class="directory-panel">
            <header class="directory-header">
                <h2>Network Trends</h2>
                <button class="icon-button"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
            </header>
            
            <div class="directory-content">
                <div id="trend-list" style="padding: 0 16px;">
                    <!-- Trends go here -->
                    <div class="trend-item">
                        <div style="font-size: 0.75rem; color: var(--accent);">Trending #1</div>
                        <div style="font-weight: 700;">#PulseMessenger</div>
                        <div style="font-size: 0.7rem; color: var(--text-soft);">2.4k transmissions</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Panel: The Feed (Replacing Workspace) -->
        <section class="workspace">
            <header class="workspace-header" style="justify-content: flex-start; gap: 16px;">
                <img src="jay.png" id="my-pic" style="width: 40px; border-radius: 12px; height: 40px;">
                <div>
                    <h2 style="margin: 0; font-size: 1.1rem;">Global Feed</h2>
                    <p style="margin: 0; font-size: 0.8rem; color: var(--text-soft);">Encrypted broadcast channel</p>
                </div>
            </header>

            <div class="workspace-body feed-scroll">
                <div class="composer-card">
                    <textarea id="post-in" placeholder="Identify yourself to the network..." style="width: 100%; background: transparent; border: none; color: var(--text-main); font-size: 1.1rem; resize: none; min-height: 80px; outline: none;"></textarea>
                    
                    <div id="media-preview" class="hidden" style="margin: 12px 0; border-radius: 16px; overflow: hidden; position: relative;">
                         <button onclick="removePreview()" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: #fff; width: 30px; height: 30px; border-radius: 50%;">×</button>
                         <div id="media-preview-content"></div>
                    </div>

                    <div style="margin-top: 16px; display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--border);">
                        <div style="display: flex; gap: 12px;">
                            <button class="tool-btn" onclick="document.getElementById('fileInput').click()" style="width: 40px; height: 40px; background: var(--bg-panel-soft); border-radius: 12px; display: grid; place-items: center;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="20" height="20" stroke-width="2"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            </button>
                            <button class="tool-btn" onclick="toggleGifPicker()" style="width: 40px; height: 40px; background: var(--bg-panel-soft); border-radius: 12px; display: grid; place-items: center;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="20" height="20" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            </button>
                        </div>
                        <button id="post-btn" class="post-btn" style="background: var(--bg-bubble-sent); color: #fff; padding: 10px 24px; border-radius: 99px; font-weight: 700;" disabled>Broadcast</button>
                        <input type="file" id="fileInput" hidden accept="image/*">
                    </div>
                </div>

                <div id="feed">
                    <div style="padding: 40px; text-align: center; color: var(--text-soft);">Awaiting signal...</div>
                </div>
            </div>
        </section>
    </div>

    <!-- GIF Picker Overlay -->
    <div id="gif-picker" class="glass-panel hidden" style="position: fixed; bottom: 80px; left: 300px; width: 320px; z-index: 1000; padding: 16px;">
        <input type="text" id="gif-search-in" placeholder="Search GIFs..." style="width: 100%; background: var(--bg-panel-soft); border: none; padding: 12px; border-radius: 12px; color: #fff; margin-bottom: 12px;">
        <div id="gif-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-height: 300px; overflow-y: auto;"></div>
    </div>

    <!-- Core Scripts -->
    <script src="threads.js"></script>
</body>
</html>
