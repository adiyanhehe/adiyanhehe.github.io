<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Threads // Global Feed</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Poppins:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Design System: Reusing Pulse/Discuss CSS -->
    <link rel="stylesheet" href="discuss.css">
    <style>
        /* Thread-specific overrides and additions */
        .thread-item {
            display: flex;
            gap: 16px;
            background: var(--bg-panel-soft);
            margin-bottom: 16px;
            padding: 24px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            transition: var(--transition);
            animation: thread-enter 0.4s ease both;
        }
        @keyframes thread-enter {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .thread-item:hover {
            background: var(--bg-panel-hover);
            transform: translateY(-2px);
            border-color: var(--border-strong);
            box-shadow: var(--shadow-md);
        }
        .trend-item {
            padding: 14px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 4px;
        }
        .trend-item:hover {
            background: var(--bg-panel-hover);
            transform: translateX(4px);
        }
        .composer-card {
            background: var(--bg-panel-strong);
            padding: 24px;
            border-radius: var(--radius-xl);
            margin-bottom: 24px;
            border: 1px solid var(--border-strong);
            box-shadow: var(--shadow-md);
        }
        .feed-scroll {
            height: calc(100% - 80px);
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }
        /* Icon sizing consistency */
        .nav-button-icon svg {
            width: 20px;
            height: 20px;
            stroke-width: 2.2;
            color: var(--text-soft);
        }
        .nav-button.active .nav-button-icon svg {
            color: var(--accent);
        }
    </style>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Universal Header will be injected by global.js -->
    <script src="global.js"></script>

    <div class="messenger-app">
        <!-- Far Left Sidebar (Same as Pulse) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="brand-lockup" style="margin-bottom: 32px;">
                    <div class="brand-mark">TX</div>
                    <div>
                        <p class="eyebrow">Global Feed</p>
                        <h1>Threads</h1>
                    </div>
                </div>

                <nav class="sidebar-nav">
                    <button class="nav-button" onclick="location.href='discuss.html'">
                        <span class="nav-button-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        </span>
                        <span class="nav-button-copy">
                            <strong>Pulse</strong>
                            <small>Direct Network</small>
                        </span>
                    </button>
                    
                    <button class="nav-button active">
                        <span class="nav-button-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        </span>
                        <span class="nav-button-copy">
                            <strong>Threads</strong>
                            <small>Global Broadcast</small>
                        </span>
                    </button>
                    
                    <button class="nav-button" onclick="window.goToMyProfile()">
                         <span class="nav-button-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </span>
                        <span class="nav-button-copy">
                            <strong>Account</strong>
                            <small>Entity Settings</small>
                        </span>
                    </button>
                </nav>
            </div>
            
            <div class="sidebar-bottom">
                 <div class="user-card glass-panel" style="padding: 20px; border-radius: var(--radius-lg); text-align: center; border: 1px solid var(--border);">
                    <img id="side-pic" src="jay.png" style="width: 60px; height: 60px; border-radius: 18px; margin: 0 auto 12px; border: 2px solid var(--border-strong);">
                    <div id="side-name" style="font-weight: 800; font-size: 1rem; color: var(--text-main);">...</div>
                    <div style="display: flex; gap: 12px; justify-content: center; font-size: 0.75rem; color: var(--text-soft); margin-top: 12px;">
                        <div><strong id="stat-followers" style="color: var(--text-main);">0</strong> Follows</div>
                        <div><strong id="stat-posts" style="color: var(--text-main);">0</strong> Posts</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Mid Panel: Trends/Discovery -->
        <main class="directory-panel">
            <header class="directory-header">
                <div class="directory-heading">
                    <p class="eyebrow">Realtime</p>
                    <h2>Network Trends</h2>
                </div>
            </header>
            
            <div class="directory-content" style="padding: 16px;">
                <div id="trend-list">
                    <!-- Trends go here -->
                </div>
            </div>
        </main>

        <!-- Right Panel: The Feed -->
        <section class="workspace">
            <header class="workspace-header">
                <div class="workspace-header-main">
                    <img src="jay.png" id="my-pic" style="width: 44px; height: 44px; border-radius: 14px;">
                    <div>
                        <h2 style="font-size: 1.25rem;">Global Feed</h2>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span style="width: 8px; height: 8px; background: var(--success); border-radius: 50%;"></span>
                            <p style="margin: 0; font-size: 0.8rem; color: var(--text-soft);">Signal operational</p>
                        </div>
                    </div>
                </div>
            </header>

            <div class="workspace-body feed-scroll">
                <div class="composer-card">
                    <textarea id="post-in" placeholder="Identify yourself to the network..." style="width: 100%; background: transparent; border: none; color: var(--text-main); font-size: 1.15rem; resize: none; min-height: 90px; outline: none;"></textarea>
                    
                    <div id="media-preview" class="hidden" style="margin: 16px 0; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid var(--border-strong);">
                         <button onclick="window.removePreview()" style="position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: #fff; width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; cursor: pointer; backdrop-filter: blur(4px);">✕</button>
                         <div id="media-preview-content"></div>
                    </div>

                    <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid var(--border);">
                        <div style="display: flex; gap: 14px;">
                            <button class="utility-button" onclick="document.getElementById('fileInput').click()" style="width: 44px; height: 44px; background: var(--bg-panel-soft); border-radius: 14px; display: grid; place-items: center; transition: 0.2s;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22" stroke-width="2"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            </button>
                            <button class="utility-button" onclick="window.toggleGifPicker()" style="width: 44px; height: 44px; background: var(--bg-panel-soft); border-radius: 14px; display: grid; place-items: center; transition: 0.2s;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            </button>
                        </div>
                        <button id="post-btn" class="send-button" style="background: var(--bg-bubble-sent); color: #fff; padding: 12px 32px; border-radius: 99px; font-weight: 800; font-size: 1rem; box-shadow: 0 8px 20px rgba(111, 131, 255, 0.25);" disabled>Broadcast</button>
                        <input type="file" id="fileInput" hidden accept="image/*">
                    </div>
                </div>

                <div id="feed">
                    <div style="padding: 60px; text-align: center; color: var(--text-soft);">
                        <div class="loader" style="width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; margin: 0 auto 16px; animation: spin 1s linear infinite;"></div>
                        Synchronizing transmissions...
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- GIF Picker Overlay -->
    <div id="gif-picker" class="glass-panel hidden" style="position: fixed; bottom: 100px; left: 300px; width: 340px; z-index: 10000; padding: 20px; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg);">
        <input type="text" id="gif-search-in" placeholder="Search decrypted GIFs..." style="width: 100%; background: var(--bg-panel-soft); border: 1px solid var(--border); padding: 14px; border-radius: 16px; color: #fff; margin-bottom: 16px; outline: none;">
        <div id="gif-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-height: 320px; overflow-y: auto;"></div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="threads.js"></script>
</body>
</html>
