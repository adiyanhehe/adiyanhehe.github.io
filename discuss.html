<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        background: #000;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        overflow: hidden;
    }

    .container {
        max-width: 500px;
    }

    h1 {
        font-size: 3rem;
        font-weight: 800;
        margin-bottom: 10px;
    }

    p {
        color: #888;
        margin-bottom: 40px;
    }

    .buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .btn {
        padding: 12px 25px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
        text-decoration: none;
        display: inline-block;
    }

    .btn-main {
        background: #00A2FF;
        color: #fff;
    }

    .btn-thread {
        background: #222;
        color: #fff;
        border: 1px solid #333;
    }

    .btn-back {
        background: transparent;
        border: 1px solid #555;
        color: #aaa;
    }

    .btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    .spinner {
        margin: 30px auto;
        width: 40px;
        height: 40px;
        border: 4px solid #222;
        border-top: 4px solid #00A2FF;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</head>

<body>

<div class="container">
    <h1>🚧 In Progress</h1>
    <p>This page is currently being built. Check back soon.</p>

    <div class="spinner"></div>

    <div class="buttons">
        <a href="index.html" class="btn btn-main">🏠 Main</a>
        <a href="threads.html" class="btn btn-thread">🧵 Threads</a>
        <button onclick="history.back()" class="btn btn-back">⬅ Go Back</button>
    </div>
</div>

</body>
</html>
