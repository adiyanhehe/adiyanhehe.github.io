<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Nexus // Messages</title>
    <!-- Matched web.html font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg: #030303;
            --surface: rgba(255, 255, 255, 0.02);
            --panel: #0a0a0a;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b8c8f;
            --accent: #5e6ad2;
            --transition: cubic-bezier(0.76, 0, 0.24, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media (min-width: 1024px) {

            body,
            a,
            button,
            input,
            select,
            textarea {
                cursor: none !important;
            }
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- CUSTOM CURSOR --- */
        #cursor-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }

        #cursor-bg {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: width 0.3s var(--transition), height 0.3s var(--transition), background 0.3s var(--transition);
        }

        body.hovering #cursor-bg {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 1);
            mix-blend-mode: difference;
            border-color: transparent;
        }

        .sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .side-head {
            padding: 25px 30px;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: -0.2px;
            border-bottom: 1px solid var(--border);
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .side-head span {
            color: var(--accent);
        }

        .user-link {
            padding: 15px 30px;
            cursor: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .user-link:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--surface);
        }

        .chat-head {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            z-index: 5;
        }

        #chat-title {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: -0.2px;
        }

        .chat-head a {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.3s;
            cursor: none;
        }

        .chat-head a:hover {
            color: var(--text-main);
        }

        #msgs {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 65%;
            padding: 15px 20px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.45;
            font-weight: 400;
        }

        .me {
            align-self: flex-end;
            background: #fff;
            color: #000;
            border-bottom-right-radius: 4px;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.05);
        }

        .not-me {
            align-self: flex-start;
            background: #111;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .input-box {
            padding: 20px 30px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 15px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
        }

        input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px 25px;
            border-radius: 100px;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            transition: 0.3s;
            cursor: none;
        }

        input:focus {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 0 30px;
            border-radius: 100px;
            font-weight: 800;
            cursor: none;
            font-family: inherit;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: transform 0.3s;
            letter-spacing: 1px;
        }

        button:hover {
            transform: scale(1.05);
            background: var(--accent);
            color: #fff;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 35vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .main {
                height: 65vh;
            }

            .chat-head {
                padding: 15px;
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .input-box {
                padding: 15px;
                flex-direction: column;
            }

            button {
                padding: 15px;
            }

            #msgs {
                padding: 15px;
                gap: 10px;
            }

            .bubble {
                max-width: 85%;
                font-size: 0.95rem;
            }
        }
    </style>
    <!-- Global Control Center via Super Admin -->
    <link rel="stylesheet" href="global.css?v=3">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="global.js?v=3" defer></script>
</head>

<body>
    <!-- CUSTOM CURSOR -->
    <div id="cursor-dot"></div>
    <div id="login-gate"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000001; align-items:center; justify-content:center; flex-direction:column; text-align:center; backdrop-filter:blur(10px);">
        <div style="font-size:4rem; font-weight:900; letter-spacing:-3px; margin-bottom:10px;">CHAT</div>
        <p style="color:#888; margin-bottom:40px; font-size:1.1rem; max-width:400px;">Access the global hub and
            communicate with the network.</p>
        <div style="display:flex; gap:20px;">
            <a href="auth.html?mode=register&redirect=discuss.html"
                style="background:#fff; color:#000; padding:18px 45px; border-radius:100px; font-weight:900; text-decoration:none; transition:0.4s; box-shadow:0 15px 40px rgba(255,255,255,0.15);"
                class="interactable">Register</a>
            <a href="auth.html?mode=login&redirect=discuss.html"
                style="background:transparent; border:2px solid #333; color:#fff; padding:18px 45px; border-radius:100px; font-weight:900; text-decoration:none; transition:0.4s;"
                class="interactable">Log In</a>
        </div>
    </div>

    <header class="header">
        <a href="index.html" class="logo interactable">ADIYAN</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="threads.html" class="nav-item">Threads</a>
            <a href="discuss.html" class="nav-item active">Discuss</a>
            <div id="auth-nav"></div>
            <button class="interactable theme-toggle" onclick="toggleTheme(event)">🌙</button>
        </nav>
    </header>

    <div class="sidebar" style="margin-top:75px;">
        <div class="side-head">DIRECT<span>CONTACT</span></div>
        <div class="user-link interactable" onclick="setMode('global')" style="background: rgba(255,255,255,0.1);">#
            Global Hub</div>
        <div class="user-link interactable" onclick="setMode('saved')"
            style="border-top:1px solid var(--border); color:var(--accent); font-weight:900;">★ Bookmarks</div>
        <div id="dm-list" style="margin-top:10px;"></div>
        <div class="user-link interactable" onclick="promptNewDM()"
            style="border-top:1px solid var(--border); border-bottom:1px solid var(--border); opacity:0.5; font-size:0.8rem; justify-content:center;">
            + NEW DM</div>
        <div class="user-link interactable" onclick="setStatus()"
            style="border-bottom:1px solid var(--border); opacity:0.5; font-size:0.8rem; justify-content:center;">
            📡 SET STATUS</div>

        <div class="side-head" style="margin-top:20px; font-size:0.85rem; padding:15px 30px;">
            ONLINE<span>ENTITIES</span></div>
        <div id="online-list"></div>

        <div class="side-head" style="margin-top:20px; font-size:0.85rem; padding:15px 30px;">
            NOTIFICATIONS<span>CENTER</span></div>
        <div id="notify-list" style="padding:15px 30px; font-size:0.8rem; color:#444;">No new transmissions.</div>
    </div>

    <div class="main" style="margin-top:75px;">
        <div class="chat-head">
            <span id="chat-title"># Global Hub</span>
            <div style="display:flex; gap:15px; align-items:center;">
                <a href="index.html" class="interactable">Return to Base</a>
            </div>
        </div>
        <div id="msgs"></div>
        <div class="input-box">
            <input type="text" id="mIn" placeholder="Type transmission..." class="interactable">
            <button onclick="send()" class="interactable">Send</button>
        </div>
    </div>

    <script>
        // --- CUSTOM CURSOR LOGIC ---
        const cursorDot = document.getElementById('cursor-dot');
        const cursorBg = document.getElementById('cursor-bg');
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let dotX = mouseX, dotY = mouseY; let bgX = mouseX, bgY = mouseY;
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

        gsap.ticker.add(() => {
            dotX += (mouseX - dotX) * 0.2; dotY += (mouseY - dotY) * 0.2;
            gsap.set(cursorDot, { x: dotX, y: dotY });
            bgX += (mouseX - bgX) * 0.1; bgY += (mouseY - bgY) * 0.1;
            gsap.set(cursorBg, { x: bgX, y: bgY });
        });



        // --- ABLY CHAT LOGIC ---
        const ably = new Ably.Realtime('I2GocA.2XM7TQ:nuJQeyu7st5NRAjpGZKS00fjwc4qbCRGioyS_ERGTdc');
        const globalChan = ably.channels.get('global-hub');

        let me = localStorage.getItem('rbx_user');
        if (!me) { me = "Guest" + Math.floor(Math.random() * 1000); localStorage.setItem('rbx_user', me); }
        let mode = 'global'; let target = null;

        window.onload = () => {
            const user = localStorage.getItem('rbx_user');
            if (!user) {
                document.getElementById('login-gate').style.display = 'flex';
                return;
            }
            me = user;

            // INITIAL GSAP ANIMATIONS
            gsap.from('.sidebar', { x: -300, opacity: 0, duration: 1, ease: 'power4.out' });
            gsap.from('.side-head', { y: -20, opacity: 0, duration: 0.8, delay: 0.4, ease: 'power2.out' });
            gsap.from('.chat-head', { y: -50, opacity: 0, duration: 1, delay: 0.2, ease: 'expo.out' });
            gsap.from('.input-box', { y: 100, opacity: 0, duration: 1, delay: 0.3, ease: 'expo.out' });

            globalChan.subscribe('msg', (m) => {
                if (mode === 'global') render(m.data);
                if (m.data.user !== me) addList(m.data.user, m.data.pic);
            });
            globalChan.history({ limit: 30 }, (err, page) => {
                if (!err) page.items.reverse().forEach(m_item => render(m_item.data));
            });

            // --- PRESENCE LOGIC ---
            globalChan.presence.enter({ user: me, pic: localStorage.getItem('rbx_pic'), status: 'Online' });
            globalChan.presence.subscribe(() => {
                globalChan.presence.get((err, members) => {
                    const list = document.getElementById('online-list');
                    list.innerHTML = '';
                    members.forEach(m => {
                        const d = document.createElement('div');
                        d.className = 'user-link interactable';
                        d.style.fontSize = '0.8rem';
                        d.style.opacity = '0.7';
                        d.style.flexDirection = 'column';
                        d.style.alignItems = 'flex-start';
                        const isVer = window.isVerified && window.isVerified(m.data.user);
                        d.innerHTML = `
                            <div style="display:flex; align-items:center;">
                                <div style="width:8px; height:8px; background:#00ff88; border-radius:50%; margin-right:10px; box-shadow:0 0-10px #00ff88;"></div>
                                <span style="font-weight:900;">${m.data.user}</span>
                                ${isVer ? `<svg width="10" height="10" viewBox="0 0 24 24" fill="#00A2FF" style="margin-left:5px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : ''}
                            </div>
                            <div style="font-size:0.65rem; color:#666; margin-left:18px;">${m.data.status || 'Active'}</div>`;
                        d.onclick = () => showProfileSummary(m.data.user);
                        list.appendChild(d);
                    });
                });
            });

            // --- AUTO-DM FROM URL ---
            const urlParams = new URLSearchParams(window.location.search);
            const dmUser = urlParams.get('dm');
            if (dmUser) setMode('dm', dmUser);

            ably.channels.get('dm-' + me).subscribe('priv', (m) => {
                const sender = m.data.user;
                addList(sender, m.data.pic);
                persistDM(sender, m.data);
                if (mode === 'dm' && target === sender) render(m.data);
                else if (window.showNotification) showNotification(`New Transmission from @${sender}`);
            });
        };

        function addList(u, p) {
            if (document.getElementById('u-' + u)) return;
            const d = document.createElement('div');
            d.id = 'u-' + u; d.className = 'user-link interactable'; d.onclick = () => setMode('dm', u);
            d.innerHTML = `<img src="${p || 'https://via.placeholder.com/30'}" style="width:30px; height:30px; border-radius:50%; object-fit:cover;"> ${u}`;
            document.getElementById('dm-list').appendChild(d);
            gsap.from(d, { x: -50, opacity: 0, duration: 0.8, ease: "power3.out" });
        }


        function render(d) {
            const b = document.getElementById('msgs');
            const isMe = d.user === me;
            const msgId = 'msg-' + (d.time || Math.random());
            const div = document.createElement('div');
            div.className = isMe ? 'bubble me' : 'bubble not-me';
            div.id = msgId;

            const isVerifiedUser = window.isVerified && window.isVerified(d.user);
            const isAdminUser = window.isAdmin && window.isAdmin(me);

            div.innerHTML = `
                ${!isMe ? `
                    <div style="font-size:0.75rem;opacity:0.6;font-weight:700;margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                        <span class="interactable" onclick="showProfileSummary('${d.user}')" style="cursor:pointer; display:flex; align-items:center; gap:5px;">
                            ${d.user.toUpperCase()}
                            ${isVerifiedUser ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="#00A2FF"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : ''}
                        </span>
                        <div style="display:flex; gap:8px;">
                            <svg onclick="setMode('dm', '${d.user}')" class="interactable" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="cursor:pointer; opacity:0.5;"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                        </div>
                    </div>` : ''}
                <div style="display:flex; justify-content:space-between; gap:20px;">
                    <div id="${msgId}-text">${d.text}</div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        ${(isMe || isAdminUser) ? `
                            <div class="interactable" onclick="editMsg('${msgId}', '${encodeURIComponent(JSON.stringify(d))}')" style="cursor:pointer; opacity:0.3; transition:0.3s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.3">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </div>
                            <div class="interactable" onclick="deleteMsg('${msgId}')" style="cursor:pointer; opacity:0.3; transition:0.3s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.3">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </div>` : ''}
                        <div class="interactable" onclick="saveMsg('${msgId}', '${encodeURIComponent(JSON.stringify(d))}')" style="cursor:pointer; opacity:0.3; transition:0.3s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.3">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        </div>
                        <div class="interactable" onclick="reportContent('discuss', '${msgId}', ${JSON.stringify(d).replace(/"/g, '&quot;')})" style="cursor:pointer; opacity:0.3; transition:0.3s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.3">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 9v4m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 17c-.77 1.333.192 3 1.732 3z"/></svg>
                        </div>
                    </div>
                </div>`;
            b.appendChild(div);
            window.requestAnimationFrame(() => b.scrollTop = b.scrollHeight);
            gsap.from(div, { y: 30, opacity: 0, scale: 0.9, transformOrigin: isMe ? "bottom right" : "bottom left", duration: 0.6, ease: "back.out(2)" });
        }

        function deleteMsg(id) {
            if (confirm("Permanently delete this transmission?")) {
                document.getElementById(id).style.background = '#320000';
                gsap.to(`#${id}`, { scale: 0.8, opacity: 0, duration: 0.6, onComplete: () => document.getElementById(id).remove() });
                // Push deletion event (could push to an 'admin-actions' channel)
            }
        }

        function editMsg(id, dataRaw) {
            const data = JSON.parse(decodeURIComponent(dataRaw));
            const newText = prompt("Revise transmission data:", data.text);
            if (newText && newText !== data.text) {
                document.getElementById(id + '-text').innerText = newText + " (revised)";
                // Push edit event
            }
        }

        function saveMsg(id, dataRaw) {
            const data = JSON.parse(decodeURIComponent(dataRaw));
            let saved = JSON.parse(localStorage.getItem('nexus_saved_msgs') || '[]');
            saved.push(data);
            localStorage.setItem('nexus_saved_msgs', JSON.stringify(saved));

            const icon = document.getElementById(id).querySelector('svg');
            icon.setAttribute('fill', 'var(--accent)');
            gsap.to(icon, { scale: 1.5, duration: 0.3, yoyo: true, repeat: 1 });
        }

        // --- DM PERSISTENCE ---
        function persistDM(u, d) {
            const key = `dm_history_${u}`;
            let history = JSON.parse(localStorage.getItem(key) || '[]');
            history.push(d);
            localStorage.setItem(key, JSON.stringify(history));

            // Track active DMs
            let dmUsers = JSON.parse(localStorage.getItem('nexus_dm_users') || '[]');
            if (!dmUsers.includes(u)) {
                dmUsers.push(u);
                localStorage.setItem('nexus_dm_users', JSON.stringify(dmUsers));
            }
        }

        function loadDMHistory(u) {
            const history = JSON.parse(localStorage.getItem(`dm_history_${u}`) || '[]');
            history.forEach(render);
        }

        function promptNewDM() {
            const u = prompt("Enter username of the recipient:");
            if (u && u.trim() !== me) {
                addList(u);
                setMode('dm', u);
            }
        }

        function setStatus() {
            const s = prompt("Broadcast your current status to the network:");
            if (s) {
                globalChan.presence.update({ user: me, pic: localStorage.getItem('rbx_pic'), status: s });
                if (window.showNotification) showNotification(`Status updated to: ${s}`);
            }
        }

        function setMode(m, u = null) {
            mode = m; target = u;
            document.getElementById('msgs').innerHTML = '';
            document.getElementById('chat-title').innerText = m === 'global' ? '# Global Hub' : (m === 'saved' ? '★ Bookmarks' : '@ ' + u);

            if (m === 'saved') {
                const saved = JSON.parse(localStorage.getItem('nexus_saved_msgs') || '[]');
                saved.forEach(render);
            } else if (m === 'global') {
                globalChan.history({ limit: 30 }, (err, page) => {
                    if (!err) page.items.reverse().forEach(m_item => render(m_item.data));
                });
            } else if (m === 'dm') {
                loadDMHistory(u);
            }
            gsap.from('#chat-title', { opacity: 0, x: -20, duration: 0.5 });
        }

        function send() {
            const i = document.getElementById('mIn'); if (!i.value.trim()) return;
            const d = { user: me, text: i.value, pic: localStorage.getItem('rbx_pic'), time: Date.now() };
            if (mode === 'global') {
                globalChan.publish('msg', d);
            } else {
                ably.channels.get('dm-' + target).publish('priv', d);
                persistDM(target, d);
                render(d);
            }
            i.value = '';
        }

        // Add subscribers for saved DM users
        function initDMList() {
            const dmUsers = JSON.parse(localStorage.getItem('nexus_dm_users') || '[]');
            dmUsers.forEach(u => addList(u));
        }
        initDMList();

        ably.channels.get('dm-' + me).subscribe('priv', (m) => {
            const sender = m.data.user;
            addList(sender, m.data.pic);
            persistDM(sender, m.data);
            if (mode === 'dm' && target === sender) render(m.data);
            else if (window.showNotification) showNotification(`New Transmission from @${sender}`);
        });
    </script>
</body>

</html>
