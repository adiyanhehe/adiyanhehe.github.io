        async function sendFriendRequest(username) {
            if (!username || username.trim() === state.me) return;
            if (!window.supabaseClient) {
                if (window.showTopNotification) window.showTopNotification('System offline', 'error');
                return;
            }

            try {
                const realUser = await window.checkIfUserExists(username.trim());
                if (!realUser) {
                    if (window.showTopNotification) window.showTopNotification(`User not found: ${username}`, 'error');
                    return;
                }

                // Check for existing request
                const { data: existing } = await window.supabaseClient
                    .from('friend_requests')
                    .select('*')
                    .or(`and(from_user.eq.${state.me},to_user.eq.${realUser}),and(from_user.eq.${realUser},to_user.eq.${state.me})`)
                    .maybeSingle();

                if (existing) {
                    if (window.showTopNotification) window.showTopNotification('Request already sent or you are already friends', 'error');
                    return;
                }

        function cycleStatus() {
            const current = localStorage.getItem('nexus_status_mode') || 'online';
            const nextIndex = (statusModes.indexOf(current) + 1) % statusModes.length;
            const next = statusModes[nextIndex];

            localStorage.setItem('nexus_status_mode', next);
            updateStatusUI(next);

            globalChannel.presence.update({
                user: state.me,
                pic: localStorage.getItem('rbx_pic'),
                statusMode: next,
                customStatus: localStorage.getItem('nexus_custom_status')
            });

        async function searchGif(query) {
            const grid = document.getElementById('gif-grid');
            if (!grid) return;

            grid.innerHTML = '<div style="grid-column:1/-1; color:var(--text-muted); font-size:0.7rem; text-align:center; padding:20px;">Loading...</div>';

            try {
                // Using Giphy API key
                const apiKey = 'mXATbjqF4qWGc5LMZS9ZDNDnEvV2uB9p';
                const url = query
                    ? `https://api.giphy.com/v1/gifs/search?api_key=${apiKey}&q=${encodeURIComponent(query)}&limit=12&rating=g`
                    : `https://api.giphy.com/v1/gifs/trending?api_key=${apiKey}&limit=12&rating=g`;

                const response = await fetch(url);
                const json = await response.json();

                if (!json.data || json.data.length === 0) {
                    grid.innerHTML = '<div style="grid-column:1/-1; color:var(--text-muted); font-size:0.7rem; text-align:center; padding:20px;">No GIFs found. Try a different search.</div>';

                    const img = document.createElement('img');
                    img.className = 'gif-item';
                    img.src = gif.images.fixed_height_small.url;
                    img.alt = gif.title || 'GIF';
                    img.title = gif.title || 'Click to send';
                    img.onclick = () => {
                        // Insert GIF URL into message
                        const input = document.getElementById('mIn');
                        input.value = gif.images.downsized.url;
                        send();
                        togglePicker('gif-picker');
                    };
                    grid.appendChild(img);
                });
            } catch (e) {

                grid.innerHTML = '<div style="grid-column:1/-1; color:var(--danger); font-size:0.7rem; text-align:center; padding:20px;">Failed to load GIFs. Please try again.</div>';

        async function loadProfileData(username) {
            try {
                // Get profile info
                const { data: profile } = await window.supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('username', username)
                    .maybeSingle();

                const nameEl = document.getElementById('profile-name');
                const usernameEl = document.getElementById('profile-username');
                const bioEl = document.getElementById('profile-bio');
                const avatarEl = document.getElementById('profile-avatar');

                if (profile) {
                    nameEl.textContent = profile.display_name || username;
                    usernameEl.textContent = '@' + username;
                    bioEl.textContent = profile.bio || 'No bio available';
                    if (profile.avatar_url) {
                        avatarEl.src = profile.avatar_url;
                    }
                } else {
                    nameEl.textContent = username;
                    usernameEl.textContent = '@' + username;
                }

                // Get friend count
                const { count: friendCount } = await window.supabaseClient
                    .from('friend_requests')
                    .select('*', { count: 'exact' })
                    .eq('status', 'accepted')
                    .or(`from_user.eq.${username},to_user.eq.${username}`);

                document.getElementById('profile-friends').textContent = friendCount || 0;

                // Get group count (simplified - just count DMs for now)
                const dmHistory = JSON.parse(localStorage.getItem(`dm_history_${username}`) || '[]');
                document.getElementById('profile-messages').textContent = dmHistory.length;

                // Get online status
                globalChannel.presence.get((err, members) => {
                    const member = members.find(m => m.data.user === username);
                    if (member) {
                        const statusDot = document.getElementById('profile-status').querySelector('.status-dot');
                        const statusText = document.getElementById('profile-status-text');
                        const statusMode = member.data.statusMode || 'online';

                        statusDot.className = 'status-dot status-' + statusMode;
                        statusText.textContent = member.data.customStatus || member.data.status || 'Active';
                    }
                });

            } catch (e) {
                console.error('Profile load error:', e);
            }
        }

        function leaveGroup(groupId) {
            const groups = JSON.parse(localStorage.getItem('nexus_groups') || '[]');
            const groupIndex = groups.findIndex(g => g.id === groupId);

            if (groupIndex !== -1) {
                const group = groups[groupIndex];
                if (group.members.length === 1) {
                    // Delete group if only one member
                    groups.splice(groupIndex, 1);
                } else {
                    // Remove user from group
                    group.members = group.members.filter(m => m !== state.me);
                }

                localStorage.setItem('nexus_groups', JSON.stringify(groups));

                if (state.mode === 'group' && state.target === groupId) {
                    setMode('friends');
                }

                if (window.showTopNotification) window.showTopNotification('Left group');
            }
        }

        function send() {
            const input = document.getElementById('mIn');
            if (!input.value.trim()) return;

            const messageId = 'msg-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
            const messageData = {
                id: messageId,
                user: state.me,
                text: input.value,
                pic: localStorage.getItem('rbx_pic'),
                time: Date.now()
            };

            if (state.mode === 'global') {
                globalChannel.publish('msg', messageData);
                // Show sent status for global messages
                setTimeout(() => renderMessageStatus(messageId, 'delivered'), 1000);
            } else if (state.mode === 'dm' && state.target) {
                // Mark as sent immediately
                renderMessageStatus(messageId, 'sent');
                
                // Send to the shared DM room
                if (state.currentDMChannel) {
                    state.currentDMChannel.publish('msg', messageData);
                }

                // Also send to recipient's personal channel for offline delivery
                ably.channels.get('dm-' + state.target).publish('msg', messageData);

                // Store in Supabase for offline delivery tracking
                storeMessageInSupabase(state.target, messageData);

                // Persist locally
                persistDM(state.target, messageData);

                // Render our own message
                renderMessage(messageData);
                
                // Update to delivered after a short delay
                setTimeout(() => renderMessageStatus(messageId, 'delivered'), 1500);
            } else if (state.mode === 'group' && state.target) {
                // Save to group messages
                const key = `group_${state.target}_messages`;
                let messages = JSON.parse(localStorage.getItem(key) || '[]');
                messages.push(messageData);
                localStorage.setItem(key, JSON.stringify(messages));

                // Show sent status
                renderMessageStatus(messageId, 'sent');
                setTimeout(() => renderMessageStatus(messageId, 'delivered'), 1000);

                // Render message
                renderMessage(messageData);
            }

            input.value = '';
        }

        // Store message in Supabase for offline delivery and status tracking
        async function storeMessageInSupabase(recipient, messageData) {
            if (!window.supabaseClient) return;
            
            try {
                await window.supabaseClient.from('messages').insert([{
                    id: messageData.id,
                    sender_id: state.me,
                    recipient_id: recipient,
                    content: messageData.text,
                    status: 'sent',
                    created_at: new Date().toISOString()
                }]);
            } catch (e) {
                console.error('Failed to store message in Supabase:', e);
            }
        }

        // ============================================
        // PROFILE PICTURE FETCHING SYSTEM
        // ============================================
        async function fetchUserProfilePic(username) {
            if (!window.supabaseClient || !username) return null;
            
            // Check localStorage cache first
            const cached = localStorage.getItem('pfp_' + username);
            if (cached) return cached;
            
            try {
                const { data, error } = await window.supabaseClient
                    .from('profiles')
                    .select('avatar_url')
                    .eq('username', username)
                    .maybeSingle();
                
                if (error) throw error;
                
                if (data && data.avatar_url) {
                    localStorage.setItem('pfp_' + username, data.avatar_url);
                    return data.avatar_url;
                }
            } catch (e) {
                console.error('Failed to fetch profile picture:', e);
            }
            return null;
        }

        // Update all visible profile pictures for a user
        async function updateProfilePicsForUser(username, picUrl) {
            if (!picUrl) return;
            
            // Update in DM list
            const pfpEl = document.getElementById('pfp-' + username);
            if (pfpEl) pfpEl.src = picUrl;
            
            // Update in friends list
            const friendPfpEl = document.getElementById('f-pfp-' + username);
            if (friendPfpEl) friendPfpEl.src = picUrl;
            
            // Update in messages
            document.querySelectorAll(`.message-avatar[onclick*="${username}"]`).forEach(el => {
                el.src = picUrl;
            });
        }

        // ============================================
        // FETCH UNDELIVERED MESSAGES
        // ============================================
        async function fetchUndeliveredMessages(recipient) {
            if (!window.supabaseClient) return;
            
            try {
                const { data, error } = await window.supabaseClient
                    .from('messages')
                    .select('*')
                    .eq('sender_id', recipient)
                    .eq('recipient_id', state.me)
                    .in('status', ['sent', 'delivered'])
                    .order('created_at', { ascending: true });
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    // Convert Supabase messages to chat format and render
                    data.forEach(msg => {
                        const messageData = {
                            id: msg.id,
                            user: msg.sender_id,
                            text: msg.content,
                            pic: localStorage.getItem('rbx_pic'),
                            time: new Date(msg.created_at).getTime()
                        };
                        
                        // Only render if not already shown
                        if (!document.getElementById(msg.id)) {
                            renderMessage(messageData);
                            // Mark as read in database
                            updateMessageStatus(msg.id, 'read');
                        }
                    });
                    
                    // Update messages status to read in Supabase
                    await window.supabaseClient
                        .from('messages')
                        .update({ status: 'read', read_at: new Date().toISOString() })
                        .in('id', data.map(m => m.id));
                }
            } catch (e) {
                console.error('Failed to fetch undelivered messages:', e);
            }
        }

        // Mark messages as read when viewing a DM conversation
        async function markMessagesAsRead(recipient) {
            if (!window.supabaseClient) return;
            
            try {
                await window.supabaseClient
                    .from('messages')
                    .update({ status: 'read', read_at: new Date().toISOString() })
                    .eq('sender_id', recipient)
                    .eq('recipient_id', state.me)
                    .eq('status', 'delivered');
                
                // Update UI for all messages from this user
                const messages = document.querySelectorAll('.message');
                messages.forEach(msg => {
                    if (msg.querySelector('.message-author')?.textContent === recipient) {
                        const statusEl = msg.querySelector('.message-status');
                        if (statusEl) {
                            statusEl.innerHTML = '✓✓';
                            statusEl.style.color = '#43b581';
                        }
                    }
                });
            } catch (e) {
                console.error('Failed to mark messages as read:', e);
            }
        }

        // ============================================
        // ENHANCED FRIEND ITEM WITH BIO AND STATUS
        // ============================================
        function createFriendItem(username, requestId, isIncoming = false) {
            const item = document.createElement('div');
            item.className = 'friend-item';

            // Get user bio and status
            let bio = '';
            let status = 'Online';
            let statusClass = 'status-online';

            if (window.supabaseClient) {
                window.supabaseClient.from('profiles').select('bio').eq('username', username).maybeSingle().then(({ data }) => {
                    if (data && data.bio) {
                        bio = data.bio;
                        item.querySelector('.friend-bio').textContent = bio;
                    }
                });
            }

            item.innerHTML = `
                <div class="friend-info">
                    <div class="friend-avatar-wrapper">
                        <img id="f-pfp-${username}" src="https://via.placeholder.com/40" alt="${username}">
                        <div class="friend-status-dot status-${statusClass}"></div>
                    </div>
                    <div class="friend-details">
                        <div class="friend-name">${username}</div>
                        <div class="friend-bio">${bio || 'No bio available'}</div>
                    </div>
                </div>
                <div class="friend-actions">
                    <button class="friend-action-btn" onclick="event.stopPropagation(); setMode('dm', '${username}')" title="Message">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                    </button>
                    ${isIncoming ? `
                        <button class="friend-action-btn accept" onclick="event.stopPropagation(); acceptFriend('${requestId}', '${username}')" title="Accept">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
                        </button>
                    ` : ''}
                    <button class="friend-action-btn decline" onclick="event.stopPropagation(); declineFriend('${requestId}')" title="Remove">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>`;

            item.onclick = () => showProfileSummary(username);

            // Fetch profile picture
            if (window.supabaseClient) {
                window.supabaseClient.from('profiles').select('avatar_url').eq('username', username).maybeSingle().then(({ data }) => {
                    if (data && data.avatar_url) {
                        document.getElementById('f-pfp-' + username).src = data.avatar_url;
                    }
                });
            }

            return item;
        }

        // ============================================
        // CONTEXT MENUS (Right-Click)
        // ============================================
        function showGroupContextMenu(e, groupId, groupName) {
            e.preventDefault();
            e.stopPropagation();

            // Remove existing context menu
            const existing = document.getElementById('context-menu');
            if (existing) existing.remove();

            const menu = document.createElement('div');
            menu.id = 'context-menu';
            menu.style.cssText = `
                position: fixed;
                left: ${e.clientX}px;
                top: ${e.clientY}px;
                background: #1a1c20;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 4px;
                z-index: 100000;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                min-width: 160px;
            `;

            menu.innerHTML = `
                <div style="padding:8px 12px; cursor:pointer; border-radius:6px; color:var(--text-main); display:flex; align-items:center; gap:8px; font-size:0.85rem;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'" onclick="renameGroup('${groupId}', '${groupName}'); closeContextMenu();">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Rename
                </div>
                <div style="padding:8px 12px; cursor:pointer; border-radius:6px; color:var(--text-main); display:flex; align-items:center; gap:8px; font-size:0.85rem;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'" onclick="showAddMemberModal('${groupId}'); closeContextMenu();">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                    Add Member
                </div>
                <div style="padding:8px 12px; cursor:pointer; border-radius:6px; color:var(--danger); display:flex; align-items:center; gap:8px; font-size:0.85rem;" onmouseover="this.style.background='rgba(218,55,60,0.1)'" onmouseout="this.style.background='transparent'" onclick="leaveGroup('${groupId}'); closeContextMenu();">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Leave Group
                </div>
            `;

            document.body.appendChild(menu);

            // Adjust position if off screen
            const rect = menu.getBoundingClientRect();
            if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 10) + 'px';
            if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 10) + 'px';

            // Close on click outside
            setTimeout(() => {
                document.addEventListener('click', closeContextMenu, { once: true });
            }, 0);
        }

        function showFriendContextMenu(e, username) {
            e.preventDefault();
            e.stopPropagation();

            const existing = document.getElementById('context-menu');
            if (existing) existing.remove();

            const menu = document.createElement('div');
            menu.id = 'context-menu';
            menu.style.cssText = `
                position: fixed;
                left: ${e.clientX}px;
                top: ${e.clientY}px;
                background: #1a1c20;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 4px;
                z-index: 100000;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                min-width: 160px;
            `;

            menu.innerHTML = `
                <div style="padding:8px 12px; cursor:pointer; border-radius:6px; color:var(--text-main); display:flex; align-items:center; gap:8px; font-size:0.85rem;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'" onclick="setMode('dm', '${username}'); closeContextMenu();">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                    Message
                </div>
                <div style="padding:8px 12px; cursor:pointer; border-radius:6px; color:var(--text-main); display:flex; align-items:center; gap:8px; font-size:0.85rem;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'" onclick="showProfileSummary('${username}'); closeContextMenu();">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    View Profile
                </div>
                <div style="padding:8px 12px; cursor:pointer; border-radius:6px; color:var(--danger); display:flex; align-items:center; gap:8px; font-size:0.85rem;" onmouseover="this.style.background='rgba(218,55,60,0.1)'" onmouseout="this.style.background='transparent'" onclick="if(confirm('Remove @${username} from friends?')){removeFriend('${username}');} closeContextMenu();">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    Remove Friend
                </div>
            `;

            document.body.appendChild(menu);

            const rect = menu.getBoundingClientRect();
            if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 10) + 'px';
            if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 10) + 'px';

            setTimeout(() => {
                document.addEventListener('click', closeContextMenu, { once: true });
            }, 0);
        }

        function closeContextMenu() {
            const menu = document.getElementById('context-menu');
            if (menu) menu.remove();
        }

        function renameGroup(groupId, currentName) {
            const newName = prompt('Enter new group name:', currentName);
            if (newName && newName.trim()) {
                const groups = JSON.parse(localStorage.getItem('nexus_groups') || '[]');
                const group = groups.find(g => g.id === groupId);
                if (group) {
                    group.name = newName.trim();
                    localStorage.setItem('nexus_groups', JSON.stringify(groups));
                    if (window.showTopNotification) window.showTopNotification(`Group renamed to "${newName}"`);
                    // Refresh the group list if visible
                    if (state.mode === 'friends') showGroupDashboard();
                }
            }
        }

        function showAddMemberModal(groupId) {
            const username = prompt('Enter username to add:');
            if (username && username.trim()) {
                const groups = JSON.parse(localStorage.getItem('nexus_groups') || '[]');
                const group = groups.find(g => g.id === groupId);
                if (group && !group.members.includes(username.trim())) {
                    group.members.push(username.trim());
                    localStorage.setItem('nexus_groups', JSON.stringify(groups));
                    if (window.showTopNotification) window.showTopNotification(`Added @${username.trim()} to ${group.name}`);
                    if (state.mode === 'friends') showGroupDashboard();
                } else if (group && group.members.includes(username.trim())) {
                    if (window.showTopNotification) window.showTopNotification('User already in group');
                }
            }
        }

        async function removeFriend(username) {
            if (!window.supabaseClient) return;
            await window.supabaseClient
                .from('friend_requests')
                .delete()
                .or(`and(from_user.eq.${state.me},to_user.eq.${username}),and(from_user.eq.${username},to_user.eq.${state.me})`);
            if (window.showTopNotification) window.showTopNotification(`Removed @${username} from friends`);
            if (state.mode === 'friends') showFriendsDashboard('all');
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function syncToWorkspace() {
            if (window.showNotification) {
                showNotification('Workspace sync initiated');
            }
        }

        // Close pickers when clicking outside
        document.addEventListener('click', (e) => {
            const pickers = document.querySelectorAll('.picker-panel');
            pickers.forEach(picker => {
                if (!picker.contains(e.target) && !e.target.closest('.input-icon-btn')) {
                    picker.style.display = 'none';
                }
            });

            // Close settings when clicking outside
            const settings = document.getElementById('settings-panel');
            if (settings && !settings.contains(e.target) && !e.target.closest('.user-slot-actions')) {
                closeSettings();
            }
        });

        // Add settings button to user slot
        document.addEventListener('DOMContentLoaded', () => {
            const userSlotActions = document.querySelector('.user-slot-actions');
            if (userSlotActions) {
                userSlotActions.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" onclick="showSettings()" title="Settings" style="cursor:pointer;"><path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7z"/></svg>
                `;
            }
        });
    </script>
