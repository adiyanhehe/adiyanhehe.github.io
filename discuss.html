<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus // Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

    <style>
        /* ============================================
           CSS VARIABLES - Discord Design System
           ============================================ */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            /* Discord Color Palette - Dark Mode */
            --bg: #000000;
            --surface: #050505;
            --panel: rgba(10, 10, 10, 0.85);
            --border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #8b8c8f;
            --accent: #00A2FF;
            --accent-hover: #33b8ff;
            --danger: #da373c;
            --success: #23a559;
            --warning: #f0b232;
            
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-default: rgba(255, 255, 255, 0.08);
            
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --text-header: #f2f3f5;
            --text-link: #00a8fc;
            
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --accent-light: rgba(88, 101, 242, 0.15);
            
            --success: #23a559;
            --warning: #f0b232;
            --danger: #da373c;
            
            /* Status Colors */
            --status-online: #23a559;
            --status-idle: #f0b232;
            --status-dnd: #da373c;
            --status-offline: #80848e;

            /* Spacing */
            --header-height: 48px;
            --sidebar-width: 240px;
            --server-rail-width: 72px;
            --member-width: 240px;

            /* Transitions */
            --transition: cubic-bezier(0.76, 0, 0.24, 1);
            --transition-fast: cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Border Radius */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 50%;
        }

        /* ============================================
           RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================
           SERVER RAIL (Leftmost icon bar)
           ============================================ */
        .server-rail {
            width: var(--server-rail-width);
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 0 12px;
            gap: 8px;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 20;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            background: #111;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s var(--transition);
            position: relative;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .server-icon:hover {
            border-radius: 16px;
            background: #222;
            color: var(--text-main);
        }

        .server-icon.active {
            border-radius: 16px;
            background: var(--accent);
            color: #fff;
        }

        .server-icon::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 25%;
            height: 50%;
            width: 4px;
            background: #fff;
            border-radius: 0 4px 4px 0;
            transform: scaleY(0);
            transition: transform 0.3s var(--transition);
        }

        .server-icon.active::before {
            transform: scaleY(1);
        }

        .server-divider {
            width: 32px;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            margin: 4px 0;
        }

        /* ============================================
           SIDEBAR (Channel/DM list)
           ============================================ */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--panel);
            border-right: 1px solid rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            padding-top: 60px;
            flex-shrink: 0;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .section-header {
            padding: 15px 20px;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .section-header span.add-btn {
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .section-header span.add-btn:hover {
            opacity: 1;
        }

        .user-link {
            padding: 10px 15px;
            margin: 2px 8px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s var(--transition-fast);
            color: var(--text-muted);
        }

        .user-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .user-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .unread-badge {
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 800;
            min-width: 20px;
            text-align: center;
            margin-left: auto;
        }

        /* Status Indicators */
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid var(--surface);
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .status-online {
            background: var(--success);
        }

        .status-idle {
            background: var(--warning);
        }

        .status-dnd {
            background: var(--danger);
        }

        .status-offline {
            background: #80848e;
        }

        /* User Profile Slot (bottom of sidebar) */
        .user-slot {
            margin-top: auto;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--border);
            transition: background 0.3s;
        }

        .user-slot:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .user-slot-avatar {
            position: relative;
            width: 36px;
            height: 36px;
            cursor: pointer;
        }

        .user-slot-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-slot-info {
            flex: 1;
            min-width: 0;
        }

        .user-slot-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-slot-status {
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-slot-actions {
            opacity: 0.6;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .user-slot-actions:hover {
            opacity: 1;
        }

        /* ============================================
           MAIN CHAT AREA
           ============================================ */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--surface);
            padding-top: 60px;
            min-width: 0;
        }

        /* Chat Header */
        .chat-header {
            position: fixed;
            top: 0;
            left: calc(var(--server-rail-width) + var(--sidebar-width));
            right: var(--member-width);
            height: var(--header-height);
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            z-index: 5;
            border-bottom: 1px solid var(--border);
        }

        .chat-title {
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-title svg {
            opacity: 0.4;
        }

        .chat-header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .header-action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .header-action-btn:hover {
            color: var(--text-main);
        }

        .exit-link {
            font-size: 0.7rem;
            text-decoration: none;
            color: #555;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .exit-link:hover {
            color: var(--text-main);
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        /* Message Bubble */
        .message {
            padding: 4px 20px;
            display: flex;
            gap: 15px;
            max-width: 100%;
            transition: background 0.1s;
            position: relative;
        }

        .message:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .message:hover::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
        }

        .message-avatar {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            margin-top: 5px;
            cursor: pointer;
            transition: filter 0.3s, transform 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            object-fit: cover;
            flex-shrink: 0;
        }

        .message-avatar:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .message-author {
            font-weight: 800;
            color: var(--text-main);
            cursor: pointer;
            font-size: 1.05rem;
            transition: text-decoration 0.2s;
        }

        .message-author:hover {
            text-decoration: underline;
        }

        .verified-badge {
            width: 16px;
            height: 16px;
            color: var(--accent);
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .message-text {
            color: #dcddde;
            font-size: 1.05rem;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message-text img {
            max-width: 300px;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 10px;
            display: block;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .message-text img:hover {
            transform: scale(1.02);
        }

        /* Message Actions (hover menu) */
        .message-actions {
            position: absolute;
            right: 10px;
            top: 2px;
            display: none;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2px;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .message:hover .message-actions {
            display: flex;
        }

        .message-action-btn {
            padding: 8px 10px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
        }

        .message-action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .message-action-btn.delete:hover {
            background: var(--danger);
            color: #fff;
        }

        /* ============================================
           INPUT AREA
           ============================================ */
        .input-area {
            padding: 0 20px 24px;
            background: transparent;
        }

        .typing-indicator {
            font-size: 0.7rem;
            color: var(--text-muted);
            height: 14px;
            margin-bottom: 4px;
            margin-left: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: 700;
            text-transform: uppercase;
        }

        .input-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            padding: 0 18px;
            align-items: center;
            gap: 15px;
            min-height: 52px;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.1);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 14px 0;
            outline: none;
            font-family: inherit;
            font-size: 1.1rem;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .input-icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 0;
            width: auto;
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .input-icon-btn:hover {
            color: var(--text-main);
        }

        .gif-btn {
            font-size: 0.8rem;
            font-weight: 900;
            background: var(--text-muted);
            color: #000;
            padding: 2px 5px;
            border-radius: 4px;
        }

        .send-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* ============================================
           MEMBER SIDEBAR (Right)
           ============================================ */
        .member-sidebar {
            width: var(--member-width);
            background: var(--panel);
            border-left: 1px solid rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding-top: 80px;
            flex-shrink: 0;
        }

        .member-sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .member-sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .member-sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .member-item {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .member-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .member-avatar-wrapper {
            position: relative;
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }

        .member-avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
        }

        .member-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .member-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .member-status-text {
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .activity-list {
            padding: 10px 20px;
            font-size: 0.75rem;
            color: #444;
        }

        /* ============================================
           FRIENDS DASHBOARD
           ============================================ */
        .friends-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #313338;
        }
        .friends-header {
            height: 48px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.2);
            gap: 20px;
        }
        .friends-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .friends-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        .friends-search-wrapper {
            margin-bottom: 20px;
        }
        .friends-search-input {
            width: 100%;
            padding: 10px 15px;
            background: #1e1f22;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 0.9rem;
        }
        .active-now-sidebar {
            width: 350px;
            border-left: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            background: #313338;
        }
        .friend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: background 0.2s;
            border: 1px solid transparent;
        }
        .friend-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .friend-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .friend-avatar-wrapper {
            position: relative;
            width: 40px;
            height: 40px;
        }

        .friend-avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .friend-status-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--surface);
            background: var(--success);
        }

        .friend-details {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .friend-name {
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .friend-username {
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.8;
        }

        .friend-bio {
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .friend-actions {
            display: flex;
            gap: 10px;
        }

        .friend-action-btn {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.3s;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .friend-action-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: transparent;
            transform: rotate(5deg) scale(1.1);
        }

        .friend-action-btn.accept:hover {
            background: var(--success);
        }

        .friend-action-btn.decline:hover {
            background: var(--danger);
        }

        /* ============================================
           PROFILE MODAL
           ============================================ */
        .profile-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .profile-card {
            background: #1a1c20;
            width: 400px;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .profile-header {
            background: linear-gradient(135deg, var(--accent), #33b8ff);
            height: 120px;
            position: relative;
        }

        .profile-avatar {
            position: absolute;
            bottom: -30px;
            left: 20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #1a1c20;
            object-fit: cover;
        }

        .profile-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
        }

        .profile-action-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .profile-action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .profile-body {
            padding: 60px 25px 25px;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .profile-username {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .profile-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .profile-bio {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #e7e9ea;
            margin-bottom: 20px;
            min-height: 60px;
        }

        .profile-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-footer {
            padding: 15px 25px 25px;
            display: flex;
            gap: 10px;
        }

        /* ============================================
           SETTINGS PANEL
           ============================================ */
        .settings-panel {
            display: none;
            position: fixed;
            top: 60px;
            right: 20px;
            width: 350px;
            background: #1a1c20;
            border: 1px solid var(--border);
            border-radius: 12px;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .settings-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-content {
            padding: 15px;
        }

        .setting-item {
            margin-bottom: 15px;
        }

        .setting-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .setting-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .setting-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .setting-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .setting-btn.primary {
            background: var(--accent);
            color: #fff;
        }

        .setting-btn.secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        /* ============================================
           GROUP CHATS
           ============================================ */
        .group-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            transition: all 0.3s var(--transition-fast);
            cursor: pointer;
        }

        .group-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border);
            transform: translateY(-2px);
        }

        .group-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .group-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #33b8ff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 1.2rem;
            position: relative;
        }

        .group-avatar::after {
            content: '👥';
            position: absolute;
            font-size: 0.8rem;
            bottom: -2px;
            right: -2px;
            background: #1a1c20;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .group-details {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .group-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .group-members {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .group-actions {
            display: flex;
            gap: 10px;
        }

        /* ============================================
           GROUP MODAL
           ============================================ */
        .group-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .group-card {
            background: #1a1c20;
            width: 450px;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .group-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 120px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .group-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .group-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
        }

        .group-body {
            padding: 25px;
        }

        .group-title {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .group-desc {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .member-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
        }

        .member-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 5px;
        }

        .member-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .member-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .group-footer {
            padding: 15px 25px 25px;
            display: flex;
            gap: 10px;
        }

        /* ============================================
           PICKER PANELS (Emoji/GIF)
           ============================================ */
        .picker-panel {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 320px;
            height: 400px;
            background: #1a1c20;
            border: 1px solid var(--border);
            border-radius: 12px;
            z-index: 10001;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: none;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }

        .picker-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .picker-grid {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .picker-item {
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            padding: 5px;
        }

        .picker-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.2);
        }

        .gif-grid {
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .gif-item {
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .gif-item:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        .gif-search-input {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            width: calc(100% - 20px);
            margin: 10px;
            padding: 8px 15px;
            border: 1px solid var(--border);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .gif-search-input::placeholder {
            color: var(--text-muted);
        }

        /* ============================================
           LOGIN GATE
           ============================================ */
        .login-gate {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000001;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .login-gate-title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 10px;
        }

        .login-gate-subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 1.1rem;
            max-width: 400px;
        }

        .login-gate-buttons {
            display: flex;
            gap: 20px;
        }

        .login-btn {
            padding: 18px 45px;
            border-radius: 100px;
            font-weight: 900;
            text-decoration: none;
            transition: all 0.4s;
            display: inline-block;
        }

        .login-btn.primary {
            background: #fff;
            color: #000;
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.15);
        }

        .login-btn.primary:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 50px rgba(255, 255, 255, 0.25);
        }

        .login-btn.secondary {
            background: transparent;
            border: 2px solid #333;
            color: #fff;
        }

        .login-btn.secondary:hover {
            border-color: #666;
            transform: scale(1.05);
        }

        /* ============================================
           LAYOUT COMPOSITION
           ============================================ */
        .app-layout {
            display: flex;
            height: 100vh;
        }

        .chat-layout {
            display: flex;
            flex: 1;
            min-width: 0;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */
        @media (max-width: 1200px) {
            .member-sidebar {
                display: none;
            }

            .chat-header {
                right: 0;
            }
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 200px;
            }

            .chat-header {
                left: calc(var(--server-rail-width) + 200px);
            }
        }

        @media (max-width: 768px) {
            .app-layout {
                flex-direction: column;
            }

            .server-rail {
                display: none;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding-top: 60px;
            }

            .chat-main {
                height: 60vh;
            }

            .chat-header {
                left: 0;
                padding: 0 15px;
            }

            .input-area {
                padding: 0 15px 20px;
            }

            .messages-container {
                padding: 15px;
            }

            .message {
                padding: 4px 15px;
            }

            .message-avatar {
                width: 36px;
                height: 36px;
            }

            .message-text {
                font-size: 0.95rem;
            }

            .picker-panel {
                width: calc(100% - 40px);
                left: 20px;
                right: 20px;
            }
        }

        /* ============================================
           PRIVACY FEATURES
           ============================================ */
        .privacy-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .privacy-badge.encrypted {
            background: rgba(0, 186, 124, 0.15);
            color: var(--success);
        }

        .privacy-badge.private {
            background: rgba(255, 51, 102, 0.15);
            color: var(--accent);
        }

        .encrypted-message {
            position: relative;
            overflow: hidden;
        }

        .encrypted-message::before {
            content: '🔒';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .blur-content {
            filter: blur(8px);
            transition: filter 0.3s;
        }

        .blur-content:hover {
            filter: blur(0);
        }

        .privacy-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
            background: #333;
            border-radius: 11px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: var(--accent);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle-switch.active::after {
            transform: translateX(18px);
        }

        .toggle-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ============================================
           UTILITY CLASSES
           ============================================ */
        .verified-check {
            color: var(--accent);
            width: 14px;
            height: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .empty-state-text {
            font-size: 0.9rem;
            max-width: 300px;
            margin: 0 auto;
            line-height: 1.5;
        }
    </style>

    <!-- Global System Integration -->
    <link rel="stylesheet" href="global.css?v=3">
    <script src="global.js?v=3" defer></script>
</head>

<body>
    <!-- ============================================

    <!-- ============================================
         APP LAYOUT
         ============================================ -->
    <div class="app-layout">
        <div class="server-rail">

                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z" />
                </svg>
            </div>
            <div class="server-divider"></div>

                <img src="jay.png" style="width: 100%; height: 100%; border-radius: inherit; object-fit: cover;" onerror="this.outerHTML='X'">
            </div>

            <div class="server-icon" onclick="setServer('reaper')" title="Reaper">R</div>
            <div class="server-icon" onclick="setServer('aahan')" title="Aahan">A</div>
            <div class="server-icon" onclick="setServer('zohamoni')" title="Zohamoni">Z</div>

            <div class="server-icon" style="color: var(--success);" onclick="showNotification('Server discovery coming soon!')" title="Explore Servers">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/></svg>
            </div>

        <div class="chat-layout">
            <div class="sidebar">
                <div id="sidebar-header" style="padding: 10px; border-bottom: 1px solid var(--border); background: var(--panel);">
                    <button onclick="promptNewDM()" style="width: 100%; padding: 8px 10px; background: #000; border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); font-size: 0.8rem; text-align: left; cursor: pointer; display: flex; align-items: center; justify-content: space-between;">

                </div>

                <div id="sidebar-home-content">

                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />

                            <path d="M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10-4.48-10-10-10zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                        Nitro
                    </div>
                    <div class="user-link" id="btn-shop" onclick="setMode('shop')">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.6;">
                            <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/>
                        </svg>
                        Shop
                    </div>
                    <div class="user-link" id="btn-quests" style="position: relative;" onclick="setMode('quests')">

                        </svg>
                        Quests
                        <span style="position: absolute; right: 10px; background: var(--accent); color: #fff; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; font-weight: 900;">NEW</span>

                    <span class="add-btn" onclick="createGroup()" title="Create Group Chat" style="font-size:1.1rem;">👥</span>

                <div class="section-header">
                    Actions
                </div>

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.6;"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>

                </div>

                <!-- User Profile Slot -->
                <div class="user-slot" id="user-slot" style="background: #080808; padding: 8px 10px;">

                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />

                <div class="messages-container" id="msgs"></div>

                <!-- Picker Panels -->
                <div id="emoji-picker" class="picker-panel">
                    <div class="picker-header">Select Emoji</div>
                    <div class="picker-grid" id="emoji-grid"></div>
                </div>
                <div id="gif-picker" class="picker-panel">
                    <div class="picker-header">GIF Search</div>
                    <input type="text" class="gif-search-input" id="gif-search" placeholder="Search Giphy..."
                        oninput="searchGif(this.value)">
                    <div class="picker-grid gif-grid" id="gif-grid"></div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="typing-indicator" id="typing-area"></div>
                    <div class="input-wrapper">
                        <button class="input-icon-btn" title="Attach File">+</button>
                        <input type="text" id="mIn" placeholder="Message #global-hub"
                            onkeydown="reportTyping(); if(event.key === 'Enter') send()">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <button class="input-icon-btn" onclick="togglePicker('emoji-picker')"
                                title="Emoji">😊</button>
                            <button class="input-icon-btn gif-btn" onclick="togglePicker('gif-picker')"
                                title="GIF">GIF</button>
                            <button class="send-btn" onclick="send()">Send</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Member Sidebar (Right) -->
            <div class="member-sidebar">
                <div class="section-header">
                    Online — <span id="member-count">0</span>
                </div>
                <div id="online-list"></div>

                <div class="section-header" style="margin-top: 20px;">
                    Recent Activity
                </div>
                <div class="activity-list" id="notify-list">No new transmissions.</div>
            </div>
        </div>
    </div>

    <!-- ============================================
         JAVASCRIPT - Messaging System Logic
         ============================================ -->
    <script>
        // ============================================
        // CONFIGURATION & STATE
        // ============================================
        const ABLY_KEY = 'I2GocA.2XM7TQ:nuJQeyu7st5NRAjpGZKS00fjwc4qbCRGioyS_ERGTdc';
        const ably = new Ably.Realtime(ABLY_KEY);
        const globalChannel = ably.channels.get('global-hub');

        // Application State
        let state = {
            me: null,
            mode: 'friends',
            target: null,
            currentDMChannel: null,
            unreadCounts: JSON.parse(localStorage.getItem('unread_counts') || '{}'),
            typingTimeout: null
        };

        // ============================================
        // INITIALIZATION
        // ============================================
        window.addEventListener('DOMContentLoaded', () => {
            // Check authentication
            const user = localStorage.getItem('rbx_user');
            if (!user) {
                document.getElementById('login-gate').style.display = 'flex';
                return;
            }

            state.me = user;

            // Initialize components
            syncSelf();
            // Start with friends mode but ensure it displays properly
            setTimeout(() => {
                setMode('friends');
            }, 100);
            initPickers();
            initDMList();
            initGroupList();
            setupPresence();
            setupMessageListeners();
            setupDMListeners();

            // GSAP entrance animations
            gsap.from('.sidebar', { x: -300, opacity: 0, duration: 1, ease: 'power4.out' });
            gsap.from('.chat-header', { y: -50, opacity: 0, duration: 1, delay: 0.2, ease: 'expo.out' });
            gsap.from('.input-area', { y: 100, opacity: 0, duration: 1, delay: 0.3, ease: 'expo.out' });

            // Check for DM parameter in URL
            const urlParams = new URLSearchParams(window.location.search);
            const dmUser = urlParams.get('dm');
            if (dmUser) {
                setMode('dm', dmUser);
            }
        });

        // ============================================
        // PRESENCE SYSTEM (Online Status)
        // ============================================
        function setupPresence() {
            const myStatusMode = localStorage.getItem('nexus_status_mode') || 'online';

            globalChannel.presence.enter({
                user: state.me,
                pic: localStorage.getItem('rbx_pic'),
                status: 'Online',
                statusMode: myStatusMode
            });

            globalChannel.presence.subscribe(() => {
                updateOnlineList();
            });
        }

        function updateOnlineList() {
            globalChannel.presence.get((err, members) => {
                const list = document.getElementById('online-list');
                list.innerHTML = '';
                document.getElementById('member-count').innerText = members.length;

                // Hide all status dots first
                document.querySelectorAll('[id^="status-"]').forEach(s => s.style.display = 'none');

                members.forEach(m => {
                    const statusMode = m.data.statusMode || 'online';
                    const statusClass = 'status-' + statusMode;

                    // Update status dot in DM list
                    const statusDot = document.getElementById('status-' + m.data.user);
                    if (statusDot) {
                        statusDot.style.display = 'block';
                        statusDot.className = 'status-dot ' + statusClass;
                    }

                    const isVerified = window.isVerified && window.isVerified(m.data.user);
                    const memberEl = document.createElement('div');
                    memberEl.className = 'member-item';
                    memberEl.innerHTML = `
                        <div class="member-avatar-wrapper">
                            <img src="${m.data.pic || 'https://via.placeholder.com/32'}" alt="${m.data.user}">
                            <div class="status-dot ${statusClass}"></div>
                        </div>
                        <div class="member-info">
                            <div class="member-name">
                                ${m.data.user}
                                ${isVerified ? '<svg class="verified-check" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : ''}
                            </div>
                            <div class="member-status-text">${m.data.customStatus || m.data.status || 'Active'}</div>
                        </div>`;
                    memberEl.onclick = () => showProfileSummary(m.data.user);
                    list.appendChild(memberEl);
                });
            });
        }

        // ============================================
        // MESSAGE SYSTEM
        // ============================================
        function setupMessageListeners() {
            // Global channel messages
            globalChannel.subscribe('msg', (m) => {
                if (state.mode === 'global') renderMessage(m.data);
                if (m.data.user !== state.me) addDMContact(m.data.user, m.data.pic);
            });

            // Load global channel history
            globalChannel.history({ limit: 30 }, (err, page) => {
                if (!err) {
                    page.items.reverse().forEach(m => renderMessage(m.data));
                }
            });

            // Typing indicators
            globalChannel.subscribe('typing', (m) => {
                if (m.data.user !== state.me) showTypingIndicator(m.data.user);
            });
        }

        function setupDMListeners() {
            // Listen for DM pings on personal channel - only for current user
            const personalChannel = ably.channels.get('dm-' + state.me);

            // Subscribe to all DM messages
            personalChannel.subscribe('msg', (m) => {
                const sender = m.data.user;

                // Ignore if message is from ourselves
                if (sender === state.me) return;

                // Add contact to DM list if not exists
                addDMContact(sender, m.data.pic);

                // If we're in DM with this user, render the message
                if (state.mode === 'dm' && state.target === sender) {
                    renderMessage(m.data);
                    // Clear unread for this user
                    state.unreadCounts[sender] = 0;
                    localStorage.setItem('unread_counts', JSON.stringify(state.unreadCounts));
                    updateUnreadUI(sender);
                } else {
                    // Increment unread count
                    state.unreadCounts[sender] = (state.unreadCounts[sender] || 0) + 1;
                    localStorage.setItem('unread_counts', JSON.stringify(state.unreadCounts));
                    updateUnreadUI(sender);

                    // Show notification
                    if (window.showNotification) {
                        showNotification(`New message from @${sender}`);
                    }
                }
            });

            // Also subscribe to ping for backward compatibility
            personalChannel.subscribe('ping', (m) => {
                const sender = m.data.user;
                if (sender === state.me) return;
                addDMContact(sender, m.data.pic);
            });

            // ============================================
            // FRIEND REQUEST LISTENER
            // ============================================
            // Listen for friend request notifications
            const friendRequestChannel = ably.channels.get('friend-requests-' + state.me);
            friendRequestChannel.subscribe('new_request', (m) => {
                const fromUser = m.data.from_user;
                
                // Show notification
                if (window.showTopNotification) {
                    window.showTopNotification(`New friend request from @${fromUser}`);
                } else if (window.showNotification) {
                    showNotification(`New friend request from @${fromUser}`);
                }
                
                // Refresh friends dashboard if open
                if (state.mode === 'friends') {
                    showFriendsDashboard('pending');
                }
                
                // Store in localStorage for persistence
                let pendingRequests = JSON.parse(localStorage.getItem('pending_friend_requests') || '[]');
                if (!pendingRequests.find(r => r.from_user === fromUser)) {
                    pendingRequests.push(m.data);
                    localStorage.setItem('pending_friend_requests', JSON.stringify(pendingRequests));
                }
            });
        }

        function renderMessage(data) {
            const container = document.getElementById('msgs');
            const isMe = data.user === state.me;
            const messageId = 'msg-' + (data.time || Math.random().toString(36).substr(2, 9));
            const isVerifiedUser = window.isVerified && window.isVerified(data.user);
            const isAdminUser = window.isAdmin && window.isAdmin(state.me);
            const timeStr = new Date(data.time || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Skip system messages and old duplicate messages
            if (data.system || data.type === 'system') return;
            if (data.text && data.text.startsWith('Welcome to') && data.user === 'System') return;

            // DM Privacy Check: Only show DM messages if user is participant
            if (state.mode === 'dm' && data._dmRoom) {
                const expectedRoom = ['dm_room', state.me, state.target].sort().join('_');
                if (data._dmRoom !== expectedRoom) return; // Not in this DM room
                if (data.user !== state.me && data.user !== state.target) return; // Not a participant
            }

            // Check for duplicate message
            if (document.getElementById(messageId)) return;

            // Skip very old messages (older than 24 hours for global, keep DMs)
            if (state.mode === 'global' && data.time) {
                const msgAge = Date.now() - data.time;
                if (msgAge > 24 * 60 * 60 * 1000) return; // Skip messages older than 24 hours
            }

            // Process message text (mentions, images)
            let processedText = processMessageText(data.text);

            const messageEl = document.createElement('div');
            messageEl.className = 'message';
            messageEl.id = messageId;

            const avatarId = 'avatar-' + Math.random().toString(36).substr(2, 9);

            // Get profile picture from localStorage cache or use placeholder
            const cachedPic = localStorage.getItem('pfp_' + data.user);
            const picUrl = cachedPic || data.pic || 'https://via.placeholder.com/42';

            messageEl.innerHTML = `
                <img id="${avatarId}" class="message-avatar" src="${picUrl}" alt="${data.user}" onclick="showProfileSummary('${data.user}')">
                <div class="message-content">
                    <div class="message-meta">
                        <span class="message-author" onclick="showProfileSummary('${data.user}')">${data.user}</span>
                        ${isVerifiedUser ? '<svg class="verified-check" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : ''}
                        <span class="message-time">${timeStr}</span>
                    </div>
                    <div class="message-text">${processedText}</div>
                </div>
                <div class="message-actions">
                    ${(isMe || isAdminUser) ? `
                        <button class="message-action-btn" onclick="editMessage('${messageId}', '${encodeURIComponent(JSON.stringify(data))}')" title="Edit">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="message-action-btn delete" onclick="deleteMessage('${messageId}')" title="Delete">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    ` : ''}
                    <button class="message-action-btn" onclick="saveMessage('${messageId}', '${encodeURIComponent(JSON.stringify(data))}')" title="Save">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                    </button>
                </div>`;

            // Back-fill profile picture if missing or use cached version
            if (!data.pic) {
                // Check localStorage cache first
                const cachedAvatar = localStorage.getItem('pfp_' + data.user);
                if (cachedAvatar && document.getElementById(avatarId)) {
                    document.getElementById(avatarId).src = cachedAvatar;
                } else if (window.supabaseClient) {
                    // Fetch from Supabase and cache it
                    window.supabaseClient.from('profiles').select('avatar_url').eq('username', data.user).maybeSingle().then(({ data: profile }) => {
                        if (profile && profile.avatar_url) {
                            localStorage.setItem('pfp_' + data.user, profile.avatar_url);
                            const avatarEl = document.getElementById(avatarId);
                            if (avatarEl) avatarEl.src = profile.avatar_url;
                        }
                    });
                }
            } else {
                // Cache the provided profile picture
                localStorage.setItem('pfp_' + data.user, data.pic);
            }

            container.appendChild(messageEl);
            container.scrollTop = container.scrollHeight;
        }

        function processMessageText(text) {
            let processed = text;

            // Handle mentions
            if (processed.includes(`@${state.me}`)) {
                processed = processed.replace(`@${state.me}`,
                    `<span style="background:rgba(255, 162, 0, 0.15); color:#FFD700; padding:1px 6px; border-radius:4px; font-weight:700;">@${state.me}</span>`);
            }

            // Auto-embed images
            const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
            processed = processed.replace(imgRegex, (match) => {
                return `<img src="${match}" style="max-width:300px; border-radius:8px; margin-top:10px; cursor:pointer;" onclick="window.open('${match}', '_blank')">`;
            });

            return processed;
        }

        // ============================================
        // MESSAGE ACTIONS
        // ============================================
        function deleteMessage(id) {
            if (confirm('Permanently delete this message?')) {
                const msgEl = document.getElementById(id);
                if (msgEl) {
                    gsap.to(msgEl, {
                        backgroundColor: '#320000',
                        scale: 0.8,
                        opacity: 0,
                        duration: 0.6,
                        onComplete: () => msgEl.remove()
                    });
                }
            }
        }

        function editMessage(id, dataRaw) {
            const data = JSON.parse(decodeURIComponent(dataRaw));
            const newText = prompt('Edit your message:', data.text);
            if (newText && newText !== data.text) {
                const textEl = document.getElementById(id)?.querySelector('.message-text');
                if (textEl) {
                    textEl.innerHTML = newText + ' <em style="opacity:0.5;">(edited)</em>';
                }
            }
        }

        function saveMessage(id, dataRaw) {
            const data = JSON.parse(decodeURIComponent(dataRaw));
            let saved = JSON.parse(localStorage.getItem('nexus_saved_messages') || '[]');
            saved.push(data);
            localStorage.setItem('nexus_saved_messages', JSON.stringify(saved));

            // Visual feedback
            const msgEl = document.getElementById(id);
            if (msgEl) {
                const saveBtn = msgEl.querySelector('.message-action-btn:last-child svg');
                if (saveBtn) {
                    saveBtn.setAttribute('fill', 'var(--accent)');
                    gsap.to(saveBtn, { scale: 1.5, duration: 0.3, yoyo: true, repeat: 1 });
                }
            }

            if (window.showNotification) showNotification('Message saved to bookmarks');
        }

        // ============================================
        // MESSAGE STATUS SYSTEM (Sent, Delivered, Read)
        // ============================================
        async function updateMessageStatus(messageId, status, userId = null) {
            if (!window.supabaseClient || !messageId) return;
            
            try {
                const { data, error } = await window.supabaseClient
                    .from('message_status')
                    .upsert({
                        message_id: messageId,
                        user_id: userId || state.me,
                        status: status,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'message_id,user_id' });
                
                if (error) console.error('Message status update failed:', error);
            } catch (e) {
                console.error('Message status error:', e);
            }
        }

        async function getMessageStatus(messageId) {
            if (!window.supabaseClient || !messageId) return null;
            
            try {
                const { data, error } = await window.supabaseClient
                    .from('message_status')
                    .select('*')
                    .eq('message_id', messageId)
                    .eq('user_id', state.me)
                    .maybeSingle();
                
                if (error) throw error;
                return data;
            } catch (e) {
                console.error('Get message status error:', e);
                return null;
            }
        }

        function renderMessageStatus(messageId, status) {
            const messageEl = document.getElementById(messageId);
            if (!messageEl) return;
            
            const existingStatus = messageEl.querySelector('.message-status');
            if (existingStatus) existingStatus.remove();
            
            const statusEl = document.createElement('span');
            statusEl.className = 'message-status';
            statusEl.style.cssText = 'font-size:0.7rem; color:var(--text-muted); margin-left:8px; opacity:0.6;';
            
            switch(status) {
                case 'sent':
                    statusEl.innerHTML = '✓';
                    break;
                case 'delivered':
                    statusEl.innerHTML = '✓✓';
                    break;
                case 'read':
                    statusEl.innerHTML = '✓✓';
                    statusEl.style.color = '#43b581';
                    break;
            }
            
            const metaEl = messageEl.querySelector('.message-meta');
            if (metaEl) metaEl.appendChild(statusEl);
        }

        // ============================================
        // ENHANCED SEND WITH STATUS TRACKING
        // ============================================

        // ============================================
        // TYPING INDICATORS
        // ============================================
        function reportTyping() {
            if (state.mode === 'global') {
                globalChannel.publish('typing', { user: state.me });
            } else if (state.mode === 'dm' && state.currentDMChannel) {
                state.currentDMChannel.publish('typing', { user: state.me });
            }
        }

        function showTypingIndicator(username) {
            const indicator = document.getElementById('typing-area');
            if (!indicator) return;

            indicator.textContent = `${username} is typing...`;
            indicator.style.opacity = '1';

            clearTimeout(state.typingTimeout);
            state.typingTimeout = setTimeout(() => {
                indicator.style.opacity = '0';
            }, 3000);
        }

        // ============================================
        // MODE SWITCHING
        // ============================================
        function setMode(mode, target = null) {
            state.mode = mode;
            state.target = target;

            const msgsContainer = document.getElementById('msgs');
            msgsContainer.innerHTML = '';

            // Update sidebar active states
            document.querySelectorAll('.user-link').forEach(link => link.classList.remove('active'));

            if (mode === 'friends') {
                document.getElementById('btn-friends')?.classList.add('active');
                document.getElementById('chat-title').innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.4;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span>Friends</span>`;
                showFriendsDashboard();
            } else if (mode === 'nitro') {
                document.getElementById('btn-nitro')?.classList.add('active');
                document.getElementById('chat-title').textContent = 'Nitro';
                showNitroDashboard();
            } else if (mode === 'shop') {
                document.getElementById('btn-shop')?.classList.add('active');
                document.getElementById('chat-title').textContent = 'Shop';
                showShopDashboard();
            } else if (mode === 'quests') {
                document.getElementById('btn-quests')?.classList.add('active');
                document.getElementById('chat-title').textContent = 'Quests';
                showQuestsDashboard();
            } else if (mode === 'global') {
                if (state.currentDMChannel) {
                    state.currentDMChannel.unsubscribe();
                    state.currentDMChannel = null;
                }
                document.getElementById('btn-global').classList.add('active');
                document.getElementById('chat-title').innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                    Global Hub`;
                document.querySelector('.input-area').style.display = 'block';
                document.getElementById('mIn').placeholder = 'Message #global-hub';

                // Reload global history
                globalChannel.history({ limit: 30 }, (err, page) => {
                    if (!err) page.items.reverse().forEach(m => renderMessage(m.data));
                });
            } else if (mode === 'dm') {
                const dmEl = document.getElementById('u-' + target);
                if (dmEl) dmEl.classList.add('active');

                document.getElementById('chat-title').textContent = '@ ' + target;
                document.querySelector('.input-area').style.display = 'block';
                document.getElementById('mIn').placeholder = 'Message @' + target;

                // Join private DM room
                if (state.currentDMChannel) state.currentDMChannel.unsubscribe();
                const roomName = ['dm_room', state.me, target].sort().join('_');
                state.currentDMChannel = ably.channels.get(roomName);

                state.currentDMChannel.subscribe('msg', (m) => {
                    persistDM(target, m.data);
                    if (state.mode === 'dm' && state.target === target) {
                        renderMessage(m.data);
                        // Mark as read immediately when receiving in active conversation
                        if (m.data.id) renderMessageStatus(m.data.id, 'read');
                    }
                });

                state.currentDMChannel.subscribe('typing', (m) => {
                    if (m.data.user !== state.me) showTypingIndicator(m.data.user);
                });

                loadDMHistory(target);
                
                // Mark all messages from this user as read
                markMessagesAsRead(target);
                
                // Check Supabase for any undelivered messages
                fetchUndeliveredMessages(target);
            } else if (mode === 'saved') {
                document.getElementById('chat-title').textContent = '★ Bookmarks';
                document.querySelector('.input-area').style.display = 'none';
                const saved = JSON.parse(localStorage.getItem('nexus_saved_messages') || '[]');
                saved.forEach(renderMessage);
            }

            gsap.from('#chat-title', { opacity: 0, x: -20, duration: 0.5 });
        }

        // ============================================
        // DM CONTACT MANAGEMENT
        // ============================================
        function addDMContact(username, pic) {
            if (document.getElementById('u-' + username)) return;

            const dmList = document.getElementById('dm-list');
            const contactEl = document.createElement('div');
            contactEl.id = 'u-' + username;
            contactEl.className = 'user-link';
            contactEl.style.cssText = 'padding:8px 15px; margin:2px 8px; border-radius:4px; display:flex; align-items:center; gap:12px; cursor:pointer;';

            // Check localStorage cache for profile picture first
            const cachedPfp = localStorage.getItem('pfp_' + username);
            const pfpSrc = cachedPfp || pic || 'https://via.placeholder.com/32';

            contactEl.innerHTML = `
                <div style="position:relative; width:32px; height:32px; flex-shrink:0;">
                    <img id="pfp-${username}" src="${pfpSrc}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                    <div id="status-${username}" class="status-dot" style="display:none;"></div>
                </div>
                <div style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; font-size:0.9rem; color:#888;">${username}</div>
                <div id="unread-${username}" class="unread-badge" style="display:none;">0</div>
                <div onclick="event.stopPropagation(); removeDM('${username}')" style="opacity:0; transition:0.2s; cursor:pointer;" onmouseover="this.style.opacity=0.5" onmouseout="this.style.opacity=0">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </div>`;

            contactEl.onclick = () => {
                state.unreadCounts[username] = 0;

            if (!cachedPfp && window.supabaseClient) {

            // Remove from persistent list

            dmUsers = dmUsers.filter(u => u !== username);
            localStorage.setItem('nexus_dm_users', JSON.stringify(dmUsers));

            if (state.mode === 'dm' && state.target === username) {
                setMode('global');

        // ============================================
        function persistDM(username, data) {
            const key = `dm_history_${username}`;
            let history = JSON.parse(localStorage.getItem(key) || '[]');
            history.push(data);
            localStorage.setItem(key, JSON.stringify(history));

            // Track active DMs
            let dmUsers = JSON.parse(localStorage.getItem('nexus_dm_users') || '[]');
            if (!dmUsers.includes(username)) {
                dmUsers.push(username);
                localStorage.setItem('nexus_dm_users', JSON.stringify(dmUsers));
            }
        }

        function loadDMHistory(username) {
            // Only load DM history if we're actually in DM mode with this specific user
            if (state.mode !== 'dm' || state.target !== username) return;

            // Verify this is a DM between current user and target
            const expectedRoomName = ['dm_room', state.me, username].sort().join('_');

            const history = JSON.parse(localStorage.getItem(`dm_history_${username}`) || '[]');

            // Filter to only show messages where current user is participant
            const filteredHistory = history.filter(msg =>
                msg.user === state.me || msg.user === username
            );

            filteredHistory.forEach(renderMessage);
        }
