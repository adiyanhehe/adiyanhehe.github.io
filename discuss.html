<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Nexus // Messages</title>
    <!-- Matched web.html font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg: #030303;
            --surface: rgba(255, 255, 255, 0.02);
            --panel: #0a0a0a;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b8c8f;
            --accent: #5e6ad2;
            --transition: cubic-bezier(0.76, 0, 0.24, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media (min-width: 1024px) {

            body,
            a,
            button,
            input,
            select,
            textarea {
                cursor: none !important;
            }
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- DISCORD LAYOUT --- */
        .server-sidebar {
            width: 72px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            border-right: 1px solid rgba(255,255,255,0.05);
            margin-top: 75px;
        }
        .server-icon {
            width: 48px;
            height: 48px;
            background: #111;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .server-icon:hover, .server-icon.active {
            border-radius: 16px;
            background: var(--accent);
            color: #fff;
        }
        .server-icon::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 25%;
            height: 50%;
            width: 4px;
            background: #fff;
            border-radius: 0 4px 4px 0;
            transform: scaleY(0);
            transition: 0.3s;
        }
        .server-icon.active::before { transform: scaleY(1); }

        .sidebar {
            width: 240px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            margin-top: 75px;
        }

        .side-head {
            padding: 15px 20px;
            font-weight: 900;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .user-link {
            padding: 8px 12px;
            margin: 2px 8px;
            border-radius: 4px;
            cursor: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.2s;
            color: var(--text-muted);
        }
        .user-link:hover, .user-link.active {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .user-link.active { background: rgba(255,255,255,0.1); }
        
        .unread-badge {
            background: #ff4757;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 800;
            min-width: 20px;
            text-align: center;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--surface);
            margin-top: 75px;
        }

        .member-sidebar {
            width: 240px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            margin-top: 75px;
        }

        /* --- CHAT FLOW (DISCORD STYLE) --- */
        .bubble {
            background: transparent !important;
            border: none !important;
            padding: 5px 20px !important;
            display: flex;
            gap: 15px;
            max-width: 100% !important;
            margin-bottom: 2px;
            transition: 0.1s;
        }
        .bubble:hover { background: rgba(255,255,255,0.02) !important; }
        .bubble img.msg-pfp {
            width: 40px; height: 40px; border-radius: 50%; margin-top: 5px; cursor: pointer;
        }
        .msg-content { flex: 1; }
        .msg-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .msg-user { font-weight: 700; color: #fff; cursor: pointer; }
        .msg-user:hover { text-decoration: underline; }
        .msg-time { font-size: 0.7rem; color: #555; }
        .msg-text { color: #dcddde; font-size: 0.95rem; line-height: 1.3; }
        
        .chat-head {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            z-index: 5;
        }

        #chat-title {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: -0.2px;
        }

        .chat-head a {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.3s;
            cursor: none;
        }

        .chat-head a:hover {
            color: var(--text-main);
        }

        #msgs {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 65%;
            padding: 15px 20px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.45;
            font-weight: 400;
        }

        .me {
            align-self: flex-end;
            background: #fff;
            color: #000;
            border-bottom-right-radius: 4px;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.05);
        }

        .not-me {
            align-self: flex-start;
            background: #111;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .input-box {
            padding: 20px 30px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 15px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
        }

        input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px 25px;
            border-radius: 100px;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            transition: 0.3s;
            cursor: none;
        }

        input:focus {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 0 30px;
            border-radius: 100px;
            font-weight: 800;
            cursor: none;
            font-family: inherit;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: transform 0.3s;
            letter-spacing: 1px;
        }

        button:hover {
            transform: scale(1.05);
            background: var(--accent);
            color: #fff;
        }

        /* --- FRIENDS DASHBOARD --- */
        .friends-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .friends-nav {
            padding: 0 20px;
            height: 48px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 10, 0.4);
        }

        .f-tab {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .f-tab:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .f-tab.active { background: rgba(255,255,255,0.1); color: #fff; }
        .f-tab.add { background: #248046; color: #fff; }
        .f-tab.add:hover { background: #1a6334; }

        .friends-list {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .friend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-top: 1px solid var(--border);
            transition: 0.2s;
            cursor: pointer;
        }

        .friend-item:hover {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border-top-color: transparent;
        }

        .friend-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .friend-actions {
            display: flex;
            gap: 8px;
        }

        .f-action-btn {
            width: 36px;
            height: 36px;
            background: #1e1f22;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: 0.2s;
        }

        .f-action-btn:hover { background: #313338; color: #fff; }
        .f-action-btn.accept:hover { background: #248046; color: #fff; }
        .f-action-btn.decline:hover { background: #da373c; color: #fff; }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 35vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .main {
                height: 65vh;
            }

            .chat-head {
                padding: 15px;
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .input-box {
                padding: 15px;
                flex-direction: column;
            }

            button {
                padding: 15px;
            }

            #msgs {
                padding: 15px;
                gap: 10px;
            }

            .bubble {
                max-width: 85%;
                font-size: 0.95rem;
            }
        }
    </style>
    <!-- Global Control Center via Super Admin -->
    <link rel="stylesheet" href="global.css?v=3">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="global.js?v=3" defer></script>
</head>

<body>
    <!-- CUSTOM CURSOR -->

    <div id="login-gate"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000001; align-items:center; justify-content:center; flex-direction:column; text-align:center; backdrop-filter:blur(10px);">
        <div style="font-size:4rem; font-weight:900; letter-spacing:-3px; margin-bottom:10px;">CHAT</div>
        <p style="color:#888; margin-bottom:40px; font-size:1.1rem; max-width:400px;">Access the global hub and
            communicate with the network.</p>
        <div style="display:flex; gap:20px;">
            <a href="auth.html?mode=register&redirect=discuss.html"

                class="interactable">Register</a>

                class="interactable">Log In</a>
        </div>
    </div>

    <header class="header">
        <a href="index.html" class="logo interactable">ADIYAN</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Home</a>

            <button class="interactable theme-toggle" onclick="toggleTheme(event)">🌙</button>
        </nav>
    </header>

    <!-- DISCORD STYLE LAYOUT -->
    <div class="server-sidebar">
        <div class="server-icon active" title="Direct Messages">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
        </div>
        <div style="width:32px; height:2px; background:rgba(255,255,255,0.05); margin:4px 0;"></div>
        <div class="server-icon" title="Nexus Hub">N</div>
        <div class="server-icon" title="Code Research">C</div>
        <div class="server-icon" title="Global Sync">G</div>
    </div>

    <div class="sidebar">
        <div class="side-head">Private Messages</div>
        <div class="user-link interactable active" id="btn-friends" onclick="setMode('friends')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.6;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            Friends
        </div>
        <div class="user-link interactable" id="btn-global" onclick="setMode('global')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.6;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            Global Hub
        </div>
        
        <div class="side-head" style="margin-top:10px;">Direct Contacts <span onclick="promptNewDM()" style="cursor:pointer; opacity:0.5;">+</span></div>
        <div id="dm-list"></div>
        
        <div class="user-link interactable" onclick="setStatus()" style="margin-top:auto; border-top:1px solid var(--border); opacity:0.5; font-size:0.75rem;">📡 SET STATUS</div>
    </div>

    <div class="main">
        <div class="chat-head">
            <span id="chat-title" style="display:flex; align-items:center; gap:10px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.4;"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                Global Hub
            </span>
            <div style="display:flex; gap:15px; align-items:center;">
                <svg onclick="syncToWorkspace()" title="Sync to Workspace" class="interactable" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="cursor:pointer; opacity:0.6;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                <a href="index.html" class="interactable" style="font-size:0.7rem; text-decoration:none; color:#555; text-transform:uppercase; font-weight:800; letter-spacing:1px;">Exit Hub</a>
            </div>
        </div>
        <div id="msgs"></div>
        <div class="input-box">
            <div style="background:rgba(255,255,255,0.03); width:100%; border-radius:8px; display:flex; padding:5px 15px; align-items:center; gap:15px;">
                <button style="background:none; border:none; color:#555; padding:0; width:auto; font-size:1.5rem;">+</button>
                <input type="text" id="mIn" placeholder="Message #global-hub" class="interactable" style="border:none; padding:10px 0;">
                <div style="display:flex; gap:15px; color:#555;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                </div>
            </div>
        </div>

    <div class="member-sidebar">
        <div class="side-head">Online — <span id="member-count">0</span></div>
        <div id="online-list"></div>
        
        <div class="side-head" style="margin-top:20px;">Recent Activity</div>
        <div id="notify-list" style="padding:10px 20px; font-size:0.75rem; color:#444;">No new transmissions.</div>
    </div>

    <script>
        // --- CUSTOM CURSOR LOGIC ---
        const cursorDot = document.getElementById('cursor-dot');
        const cursorBg = document.getElementById('cursor-bg');
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let dotX = mouseX, dotY = mouseY; let bgX = mouseX, bgY = mouseY;
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

        gsap.ticker.add(() => {
            dotX += (mouseX - dotX) * 0.2; dotY += (mouseY - dotY) * 0.2;
            gsap.set(cursorDot, { x: dotX, y: dotY });
            bgX += (mouseX - bgX) * 0.1; bgY += (mouseY - bgY) * 0.1;
            gsap.set(cursorBg, { x: bgX, y: bgY });
        });



        // --- ABLY CHAT LOGIC ---
        const ably = new Ably.Realtime('I2GocA.2XM7TQ:nuJQeyu7st5NRAjpGZKS00fjwc4qbCRGioyS_ERGTdc');
        const globalChan = ably.channels.get('global-hub');

        let me = localStorage.getItem('rbx_user');
        if (!me) { me = "Guest" + Math.floor(Math.random() * 1000); localStorage.setItem('rbx_user', me); }
        let mode = 'friends'; let target = null;
        let unreadCounts = JSON.parse(localStorage.getItem('unread_counts') || '{}');

        window.onload = () => {
            const user = localStorage.getItem('rbx_user');
            if (!user) {
                document.getElementById('login-gate').style.display = 'flex';
                return;
            }
            me = user;
            
            // Set initial mode
            setMode('friends');

            // INITIAL GSAP ANIMATIONS
            gsap.from('.sidebar', { x: -300, opacity: 0, duration: 1, ease: 'power4.out' });
            gsap.from('.side-head', { y: -20, opacity: 0, duration: 0.8, delay: 0.4, ease: 'power2.out' });
            gsap.from('.chat-head', { y: -50, opacity: 0, duration: 1, delay: 0.2, ease: 'expo.out' });
            gsap.from('.input-box', { y: 100, opacity: 0, duration: 1, delay: 0.3, ease: 'expo.out' });

            globalChan.subscribe('msg', (m) => {
                if (mode === 'global') render(m.data);
                if (m.data.user !== me) addList(m.data.user, m.data.pic);
            });
            globalChan.history({ limit: 30 }, (err, page) => {
                if (!err) page.items.reverse().forEach(m_item => render(m_item.data));
            });

            // --- PRESENCE LOGIC ---
            globalChan.presence.enter({ user: me, pic: localStorage.getItem('rbx_pic'), status: 'Online' });
            globalChan.presence.subscribe(() => {
                globalChan.presence.get((err, members) => {
                    const list = document.getElementById('online-list');
                    list.innerHTML = '';
                    document.getElementById('member-count').innerText = members.length;
                    
                    // Hide all status dots first
                    document.querySelectorAll('[id^="status-"]').forEach(s => s.style.display = 'none');
                    
                    members.forEach(m => {
                        // Toggle dot in DM list
                        const sDot = document.getElementById('status-' + m.data.user);
                        if(sDot) sDot.style.display = 'block';

                        const isVer = window.isVerified && window.isVerified(m.data.user);
                        const d = document.createElement('div');
                        d.className = 'user-link interactable';
                        d.innerHTML = `
                            <div style="position:relative;">
                                <img src="${m.data.pic || 'https://via.placeholder.com/32'}" style="width:32px; height:32px; border-radius:50%; object-fit:cover;">
                                <div style="width:10px; height:10px; background:#43b581; border:2px solid var(--panel); border-radius:50%; position:absolute; bottom:0; right:0;"></div>
                            </div>
                            <div style="display:flex; flex-direction:column;">
                                <span style="font-weight:700; font-size:0.85rem; color:#fff; display:flex; align-items:center; gap:4px;">
                                    ${m.data.user}
                                    ${isVer ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="#00A2FF"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : ''}
                                </span>
                                <span style="font-size:0.65rem; color:#888;">${m.data.status || 'Active'}</span>
                            </div>`;
                        d.onclick = () => showProfileSummary(m.data.user);
                        list.appendChild(d);
                    });
                });
            });

            // --- AUTO-DM FROM URL ---
            const urlParams = new URLSearchParams(window.location.search);
            const dmUser = urlParams.get('dm');
            if (dmUser) setMode('dm', dmUser);

            ably.channels.get('dm-' + me).subscribe('priv', (m) => {
                const sender = m.data.user;
                addList(sender, m.data.pic);
                persistDM(sender, m.data);
                if (mode === 'dm' && target === sender) {
                    render(m.data);
                } else {
                    unreadCounts[sender] = (unreadCounts[sender] || 0) + 1;
                    localStorage.setItem('unread_counts', JSON.stringify(unreadCounts));
                    updateUnreadUI(sender);
                    if (window.showNotification) showNotification(`New Transmission from @${sender}`);
                }
            });
        };

        function updateUnreadUI(u) {
            const count = unreadCounts[u] || 0;
            const badge = document.getElementById('unread-' + u);
            if (badge) {
                badge.innerText = count;
                badge.style.display = count > 0 ? 'block' : 'none';
            }
        }

        function addList(u, p) {
            if (document.getElementById('u-' + u)) return;
            const d = document.createElement('div');
            d.id = 'u-' + u;
            d.className = 'user-link interactable';
            d.style.padding = '8px 15px';
            d.style.margin = '2px 8px';
            d.style.borderRadius = '4px';
            d.style.display = 'flex';
            d.style.alignItems = 'center';
            d.style.gap = '12px';
            d.style.cursor = 'pointer';
            
            d.innerHTML = `
                <div style="position:relative; width:32px; height:32px; flex-shrink:0;">
                    <img id="pfp-${u}" src="${p || 'https://via.placeholder.com/32'}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                    <div id="status-${u}" style="width:10px; height:10px; background:#43b581; border:2px solid var(--panel); border-radius:50%; position:absolute; bottom:0; right:0; display:none;"></div>
                </div>
                <div style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; font-size:0.9rem; color:#888;">${u}</div>
                <div id="unread-${u}" class="unread-badge" style="display:none;">0</div>
                <div onclick="event.stopPropagation(); removeDM('${u}')" style="opacity:0; transition:0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="cursor:pointer;"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </div>`;
            
            d.onclick = () => {
                unreadCounts[u] = 0;
                localStorage.setItem('unread_counts', JSON.stringify(unreadCounts));
                updateUnreadUI(u);
                setMode('dm', u);
            };

            // Fetch real PFP if possible
            if (!p && window.supabaseClient) {
                window.supabaseClient.from('profiles').select('avatar_url').eq('username', u).maybeSingle().then(({data}) => {
                    if (data && data.avatar_url) document.getElementById('pfp-' + u).src = data.avatar_url;
                });
            }

            d.onmouseenter = () => { d.querySelector('div:last-child').style.opacity = 0.5; };
            d.onmouseleave = () => { d.querySelector('div:last-child').style.opacity = 0; };

            document.getElementById('dm-list').appendChild(d);
            updateUnreadUI(u);
            gsap.from(d, { x: -20, opacity: 0, duration: 0.5, ease: "power2.out" });
        }

        function removeDM(u) {
            let dmUsers = JSON.parse(localStorage.getItem('nexus_dm_users') || '[]');
            dmUsers = dmUsers.filter(user => user !== u);
            localStorage.setItem('nexus_dm_users', JSON.stringify(dmUsers));
            document.getElementById('u-' + u).remove();
            if(mode === 'dm' && target === u) setMode('global');
        }

        function render(d) {
            const b = document.getElementById('msgs');
            const isMe = d.user === me;
            const msgId = 'm-' + (d.time || Math.random());
            
            const div = document.createElement('div');
            div.className = 'bubble';
            div.id = msgId;

            const isVerifiedUser = window.isVerified && window.isVerified(d.user);
            const isAdminUser = window.isAdmin && window.isAdmin(me);
            const timeStr = new Date(d.time || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            div.innerHTML = `
                <img src="${d.pic || 'https://via.placeholder.com/40'}" class="msg-pfp" onclick="showProfileSummary('${d.user}')">
                <div class="msg-content">
                    <div class="msg-meta" style="display:flex; align-items:center; gap:8px;">
                        <span class="msg-user" onclick="showProfileSummary('${d.user}')">${d.user}</span>
                        ${isVerifiedUser ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="#00A2FF"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : ''}
                        <span class="msg-time" style="font-size:0.7rem; color:#555;">${timeStr}</span>
                    </div>
                    <div class="msg-text" id="${msgId}-text" style="color:#dcddde; font-size:0.95rem;">${d.text}</div>
                    <div class="msg-actions" style="position:absolute; right:20px; top:-10px; display:none; background:#111; border:1px solid #333; border-radius:4px; padding:2px 8px; gap:8px; z-index:100;">
                        ${(isMe || isAdminUser) ? `
                            <div class="interactable" onclick="editMsg('${msgId}', '${encodeURIComponent(JSON.stringify(d))}')" style="cursor:pointer; opacity:0.6;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
                            <div class="interactable" onclick="deleteMsg('${msgId}')" style="cursor:pointer; opacity:0.6;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>
                        ` : ''}
                        <div class="interactable" onclick="saveMsg('${msgId}', '${encodeURIComponent(JSON.stringify(d))}')" style="cursor:pointer; opacity:0.6;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>
                    </div>
                </div>`;

            div.onmouseenter = () => { if(div.querySelector('.msg-actions')) div.querySelector('.msg-actions').style.display = 'flex'; };
            div.onmouseleave = () => { if(div.querySelector('.msg-actions')) div.querySelector('.msg-actions').style.display = 'none'; };

            b.appendChild(div);
            window.requestAnimationFrame(() => b.scrollTop = b.scrollHeight);
        }

        function deleteMsg(id) {
            if (confirm("Permanently delete this transmission?")) {
                document.getElementById(id).style.background = '#320000';
                gsap.to(`#${id}`, { scale: 0.8, opacity: 0, duration: 0.6, onComplete: () => document.getElementById(id).remove() });
                // Push deletion event (could push to an 'admin-actions' channel)
            }
        }

        function editMsg(id, dataRaw) {
            const data = JSON.parse(decodeURIComponent(dataRaw));
            const newText = prompt("Revise transmission data:", data.text);
            if (newText && newText !== data.text) {
                document.getElementById(id + '-text').innerText = newText + " (revised)";
                // Push edit event
            }
        }

        function saveMsg(id, dataRaw) {
            const data = JSON.parse(decodeURIComponent(dataRaw));
            let saved = JSON.parse(localStorage.getItem('nexus_saved_msgs') || '[]');
            saved.push(data);
            localStorage.setItem('nexus_saved_msgs', JSON.stringify(saved));

            const icon = document.getElementById(id).querySelector('svg');
            icon.setAttribute('fill', 'var(--accent)');
            gsap.to(icon, { scale: 1.5, duration: 0.3, yoyo: true, repeat: 1 });
        }

        // --- DM PERSISTENCE ---
        function persistDM(u, d) {
            const key = `dm_history_${u}`;
            let history = JSON.parse(localStorage.getItem(key) || '[]');
            history.push(d);
            localStorage.setItem(key, JSON.stringify(history));

            // Track active DMs
            let dmUsers = JSON.parse(localStorage.getItem('nexus_dm_users') || '[]');
            if (!dmUsers.includes(u)) {
                dmUsers.push(u);
                localStorage.setItem('nexus_dm_users', JSON.stringify(dmUsers));
            }
        }

        function loadDMHistory(u) {
            const history = JSON.parse(localStorage.getItem(`dm_history_${u}`) || '[]');
            history.forEach(render);
        }

        async function promptNewDM() {
            const u = prompt("Enter username of the recipient:");
            if (u && u.trim() !== me) {
                const exists = await window.checkIfUserExists(u.trim());
                if(!exists) {
                    if (window.showTopNotification) window.showTopNotification(`USER NOT FOUND: ${u}`, 'error');
                    return;
                }
                addList(u.trim());
                setMode('dm', u.trim());
            }
        }

        window.sendFriendRequest = async function(u) {
            if (!u || u.trim() === me) return;
            if (!window.supabaseClient) { alert("Cloud System Offline"); return; }
            
            try {
                // Check if user exists
                const exists = await window.checkIfUserExists(u.trim());
                if(!exists) {
                    if (window.showTopNotification) window.showTopNotification(`USER NOT FOUND: ${u}`, 'error');
                    return;
                }

                // Check if already friends or request pending
                const { data: existing } = await window.supabaseClient
                    .from('friend_requests')
                    .select('*')
                    .or(`and(from_user.eq.${me},to_user.eq.${u}),and(from_user.eq.${u},to_user.eq.${me})`)
                    .maybeSingle();

                if (existing) {
                    if (window.showTopNotification) window.showTopNotification(`ALREADY CONNECTED OR PENDING WITH @${u}`, 'error');
                    return;
                }

                await window.supabaseClient.from('friend_requests').insert([{
                    from_user: me,
                    to_user: u.trim(),
                    status: 'pending'
                }]);
                if (window.showTopNotification) window.showTopNotification(`FRIEND REQUEST SENT TO @${u}`);
                if (mode === 'friends') showFriendsDashboard('pending');
            } catch (e) {
                console.error("Cloud Error:", e);
                if (window.showTopNotification) window.showTopNotification(`REQUEST FAILED.`, 'error');
            }
        }

        async function acceptFriend(id, u) {
            if (!window.supabaseClient) return;
            await window.supabaseClient.from('friend_requests').update({ status: 'accepted' }).eq('id', id);
            if (window.showTopNotification) window.showTopNotification(`YOU ARE NOW FRIENDS WITH @${u}`);
            showFriendsDashboard('all');
        }

        async function declineFriend(id) {
            if (!window.supabaseClient) return;
            await window.supabaseClient.from('friend_requests').delete().eq('id', id);
            showFriendsDashboard('pending');
        }

        function setStatus() {
            const s = prompt("Broadcast your current status to the network:");
            if (s) {
                globalChan.presence.update({ user: me, pic: localStorage.getItem('rbx_pic'), status: s });
                if (window.showNotification) showNotification(`Status updated to: ${s}`);
            }
        }

        function setMode(m, u = null) {
            mode = m; target = u;
            document.getElementById('msgs').innerHTML = '';
            document.querySelectorAll('.user-link').forEach(l => l.classList.remove('active'));

            if (m === 'friends') {
                document.getElementById('btn-friends').classList.add('active');
                document.getElementById('chat-title').innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.4; margin-right:8px;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span>Friends</span>
                `;
                showFriendsDashboard();
            } else if (m === 'global') {
                document.getElementById('btn-global').classList.add('active');
                document.getElementById('chat-title').innerText = '# Global Hub';
                document.querySelector('.input-box').style.display = 'flex';
                globalChan.history({ limit: 30 }, (err, page) => {
                    if (!err) page.items.reverse().forEach(m_item => render(m_item.data));
                });
            } else if (m === 'dm') {
                const el = document.getElementById('u-' + u);
                if (el) el.classList.add('active');
                document.getElementById('chat-title').innerText = '@ ' + u;
                document.querySelector('.input-box').style.display = 'flex';
                loadDMHistory(u);
            } else if (m === 'saved') {
                document.getElementById('chat-title').innerText = '★ Bookmarks';
                document.querySelector('.input-box').style.display = 'none';
                const savedArr = JSON.parse(localStorage.getItem('nexus_saved_msgs') || '[]');
                savedArr.forEach(render);
            }
            
            gsap.from('#chat-title', { opacity: 0, x: -20, duration: 0.5 });
        }

        async function showFriendsDashboard(tab = 'all') {
            const main = document.getElementById('msgs');
            const inputArea = document.querySelector('.input-box');
            inputArea.style.display = 'none';
            main.innerHTML = `
                <div class="friends-container">
                    <div class="friends-nav">
                        <div class="f-tab ${tab === 'all' ? 'active' : ''}" onclick="showFriendsDashboard('all')">All</div>
                        <div class="f-tab ${tab === 'pending' ? 'active' : ''}" onclick="showFriendsDashboard('pending')">Pending</div>
                        <div class="f-tab add" onclick="showFriendsDashboard('add')">Add Friend</div>
                    </div>
                    <div id="friends-view" class="friends-list">
                        <div style="text-align:center; padding:50px; opacity:0.5;">Synchronizing with Network...</div>
                    </div>
                </div>
            `;

            const view = document.getElementById('friends-view');
            if (!window.supabaseClient) {
                view.innerHTML = '<div style="text-align:center; padding:50px; color:#ff4757;">Cloud Sync Offline. Please login.</div>';
                return;
            }

            if (tab === 'add') {
                view.innerHTML = `
                    <div style="padding:20px;">
                        <h3 style="margin-bottom:10px; font-size:1.1rem;">ADD FRIEND</h3>
                        <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:20px;">You can add friends with their Nexus username.</p>
                        <div style="background:#1e1f22; padding:15px; border-radius:8px; display:flex; gap:10px;">
                            <input type="text" id="friend-search" placeholder="Enter a Username" style="border:none; background:transparent; padding:0;">
                            <button onclick="window.sendFriendRequest(document.getElementById('friend-search').value)" style="padding:10px 20px; font-size:0.8rem;">Send Request</button>
                        </div>
                    </div>
                `;
            } else if (tab === 'all') {
                const { data } = await window.supabaseClient
                    .from('friend_requests')
                    .select('*')
                    .eq('status', 'accepted')
                    .or(`from_user.eq.${me},to_user.eq.${me}`);
                
                if (!data || data.length === 0) {
                    view.innerHTML = '<div style="text-align:center; padding:50px; opacity:0.5;">Wumpus is waiting for friends.</div>';
                    return;
                }

                view.innerHTML = `<h4 style="font-size:0.75rem; text-transform:uppercase; color:var(--text-muted); padding-bottom:15px;">All Friends — ${data.length}</h4>`;
                for (let f of data) {
                    const other = f.from_user === me ? f.to_user : f.from_user;
                    const item = document.createElement('div');
                    item.className = 'friend-item';
                    item.innerHTML = `
                        <div class="friend-info">
                            <img id="f-pfp-${other}" src="https://via.placeholder.com/32" style="width:32px; height:32px; border-radius:50%;">
                            <div style="display:flex; flex-direction:column;">
                                <span style="font-weight:700; font-size:0.9rem;">${other}</span>
                                <span style="font-size:0.7rem; color:var(--text-muted);">Nexus Member</span>
                            </div>
                        </div>
                        <div class="friend-actions">
                            <div class="f-action-btn" onclick="event.stopPropagation(); setMode('dm', '${other}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
                            <div class="f-action-btn decline" onclick="event.stopPropagation(); declineFriend('${f.id}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></div>
                        </div>
                    `;
                    item.onclick = () => window.showProfileSummary(other);
                    view.appendChild(item);
                    
                    // Fetch PFP
                    window.supabaseClient.from('profiles').select('avatar_url').eq('username', other).maybeSingle().then(({data}) => {
                        if (data && data.avatar_url) document.getElementById('f-pfp-' + other).src = data.avatar_url;
                    });
                }
            } else if (tab === 'pending') {
                const { data } = await window.supabaseClient
                    .from('friend_requests')
                    .select('*')
                    .eq('status', 'pending')
                    .or(`from_user.eq.${me},to_user.eq.${me}`);

                if (!data || data.length === 0) {
                    view.innerHTML = '<div style="text-align:center; padding:50px; opacity:0.5;">No pending requests.</div>';
                    return;
                }

                view.innerHTML = `<h4 style="font-size:0.75rem; text-transform:uppercase; color:var(--text-muted); padding-bottom:15px;">Pending — ${data.length}</h4>`;
                data.forEach(f => {
                    const isIncoming = f.to_user === me;
                    const name = isIncoming ? f.from_user : f.to_user;
                    const item = document.createElement('div');
                    item.className = 'friend-item';
                    item.innerHTML = `
                        <div class="friend-info">
                            <img id="f-pfp-${name}" src="https://via.placeholder.com/32" style="width:32px; height:32px; border-radius:50%;">
                            <div style="display:flex; flex-direction:column;">
                                <span style="font-weight:700; font-size:0.9rem;">${name}</span>
                                <span style="font-size:0.7rem; color:var(--text-muted);">${isIncoming ? 'Incoming Friend Request' : 'Outgoing Friend Request'}</span>
                            </div>
                        </div>
                        <div class="friend-actions">
                            ${isIncoming ? `<div class="f-action-btn accept" onclick="acceptFriend('${f.id}', '${name}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg></div>` : ''}
                            <div class="f-action-btn decline" onclick="declineFriend('${f.id}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></div>
                        </div>
                    `;
                    view.appendChild(item);

                    // Fetch PFP
                    window.supabaseClient.from('profiles').select('avatar_url').eq('username', name).maybeSingle().then(({data}) => {
                        if (data && data.avatar_url) document.getElementById('f-pfp-' + name).src = data.avatar_url;
                    });
                });
            }
        }

        function send() {
            const i = document.getElementById('mIn'); if (!i.value.trim()) return;
            const d = { user: me, text: i.value, pic: localStorage.getItem('rbx_pic'), time: Date.now() };
            if (mode === 'global') {
                globalChan.publish('msg', d);
            } else {
                ably.channels.get('dm-' + target).publish('priv', d);
                persistDM(target, d);
                render(d);
            }
            i.value = '';
        }

        // Add subscribers for saved DM users
        function initDMList() {
            const dmUsers = JSON.parse(localStorage.getItem('nexus_dm_users') || '[]');
            dmUsers.forEach(u => addList(u));
        }
        initDMList();

        initDMList();
    </script>
</body>

</html>
