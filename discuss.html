<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus // Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

    <style>
        /* ============================================
           CSS VARIABLES - Design System Foundation
           ============================================ */
        :root {
            /* Colors */
            --bg: #000000;
            --surface: #050505;
            --panel: rgba(10, 10, 10, 0.85);
            --border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #8b8c8f;
            --accent: #00A2FF;
            --accent-hover: #33b8ff;
            --danger: #da373c;
            --success: #23a559;
            --warning: #f0b232;

            /* Spacing */
            --header-height: 60px;
            --sidebar-width: 240px;
            --server-rail-width: 72px;
            --member-width: 240px;

            /* Transitions */
            --transition: cubic-bezier(0.76, 0, 0.24, 1);
            --transition-fast: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============================================
           RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================
           SERVER RAIL (Leftmost icon bar)
           ============================================ */
        .server-rail {
            width: var(--server-rail-width);
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 0 12px;
            gap: 8px;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 20;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            background: #111;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s var(--transition);
            position: relative;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .server-icon:hover {
            border-radius: 16px;
            background: #222;
            color: var(--text-main);
        }

        .server-icon.active {
            border-radius: 16px;
            background: var(--accent);
            color: #fff;
        }

        .server-icon::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 25%;
            height: 50%;
            width: 4px;
            background: #fff;
            border-radius: 0 4px 4px 0;
            transform: scaleY(0);
            transition: transform 0.3s var(--transition);
        }

        .server-icon.active::before {
            transform: scaleY(1);
        }

        .server-divider {
            width: 32px;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            margin: 4px 0;
        }

        /* ============================================
           SIDEBAR (Channel/DM list)
           ============================================ */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--panel);
            border-right: 1px solid rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            padding-top: 80px;
            flex-shrink: 0;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .section-header {
            padding: 15px 20px;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .section-header span.add-btn {
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .section-header span.add-btn:hover {
            opacity: 1;
        }

        .user-link {
            padding: 10px 15px;
            margin: 2px 8px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s var(--transition-fast);
            color: var(--text-muted);
        }

        .user-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .user-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .unread-badge {
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 800;
            min-width: 20px;
            text-align: center;
            margin-left: auto;
        }

        /* Status Indicators */
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid var(--surface);
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .status-online {
            background: var(--success);
        }

        .status-idle {
            background: var(--warning);
        }

        .status-dnd {
            background: var(--danger);
        }

        .status-offline {
            background: #80848e;
        }

        /* User Profile Slot (bottom of sidebar) */
        .user-slot {
            margin-top: auto;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--border);
            transition: background 0.3s;
        }

        .user-slot:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .user-slot-avatar {
            position: relative;
            width: 36px;
            height: 36px;
            cursor: pointer;
        }

        .user-slot-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-slot-info {
            flex: 1;
            min-width: 0;
        }

        .user-slot-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-slot-status {
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-slot-actions {
            opacity: 0.6;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .user-slot-actions:hover {
            opacity: 1;
        }

        /* ============================================
           MAIN CHAT AREA
           ============================================ */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--surface);
            padding-top: 60px;
            min-width: 0;
        }

        /* Chat Header */
        .chat-header {
            position: fixed;
            top: 0;
            left: calc(var(--server-rail-width) + var(--sidebar-width));
            right: var(--member-width);
            height: var(--header-height);
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            z-index: 5;
            border-bottom: 1px solid var(--border);
        }

        .chat-title {
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-title svg {
            opacity: 0.4;
        }

        .chat-header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .header-action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .header-action-btn:hover {
            color: var(--text-main);
        }

        .exit-link {
            font-size: 0.7rem;
            text-decoration: none;
            color: #555;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .exit-link:hover {
            color: var(--text-main);
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        /* Message Bubble */
        .message {
            padding: 4px 20px;
            display: flex;
            gap: 15px;
            max-width: 100%;
            transition: background 0.1s;
            position: relative;
        }

        .message:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .message:hover::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
        }

        .message-avatar {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            margin-top: 5px;
            cursor: pointer;
            transition: filter 0.3s, transform 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            object-fit: cover;
            flex-shrink: 0;
        }

        .message-avatar:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .message-author {
            font-weight: 800;
            color: var(--text-main);
            cursor: pointer;
            font-size: 1.05rem;
            transition: text-decoration 0.2s;
        }

        .message-author:hover {
            text-decoration: underline;
        }

        .verified-badge {
            width: 16px;
            height: 16px;
            color: var(--accent);
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .message-text {
            color: #dcddde;
            font-size: 1.05rem;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message-text img {
            max-width: 300px;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 10px;
            display: block;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .message-text img:hover {
            transform: scale(1.02);
        }

        /* Message Actions (hover menu) */
        .message-actions {
            position: absolute;
            right: 10px;
            top: 2px;
            display: none;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2px;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .message:hover .message-actions {
            display: flex;
        }

        .message-action-btn {
            padding: 8px 10px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
        }

        .message-action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .message-action-btn.delete:hover {
            background: var(--danger);
            color: #fff;
        }

        /* ============================================
           INPUT AREA
           ============================================ */
        .input-area {
            padding: 0 20px 24px;
            background: transparent;
        }

        .typing-indicator {
            font-size: 0.7rem;
            color: var(--text-muted);
            height: 14px;
            margin-bottom: 4px;
            margin-left: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: 700;
            text-transform: uppercase;
        }

        .input-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            padding: 0 18px;
            align-items: center;
            gap: 15px;
            min-height: 52px;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.1);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 14px 0;
            outline: none;
            font-family: inherit;
            font-size: 1.1rem;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .input-icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 0;
            width: auto;
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .input-icon-btn:hover {
            color: var(--text-main);
        }

        .gif-btn {
            font-size: 0.8rem;
            font-weight: 900;
            background: var(--text-muted);
            color: #000;
            padding: 2px 5px;
            border-radius: 4px;
        }

        .send-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* ============================================
           MEMBER SIDEBAR (Right)
           ============================================ */
        .member-sidebar {
            width: var(--member-width);
            background: var(--panel);
            border-left: 1px solid rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding-top: 80px;
            flex-shrink: 0;
        }

        .member-sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .member-sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .member-sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .member-item {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .member-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .member-avatar-wrapper {
            position: relative;
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }

        .member-avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
        }

        .member-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .member-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .member-status-text {
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .activity-list {
            padding: 10px 20px;
            font-size: 0.75rem;
            color: #444;
        }

        /* ============================================
           FRIENDS DASHBOARD
           ============================================ */
        .friends-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .friends-nav {
            padding: 0 20px;
            height: 48px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 10, 0.4);
        }

        .friend-tab {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.3s var(--transition-fast);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .friend-tab:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .friend-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 5px 15px rgba(0, 162, 255, 0.3);
        }

        .friend-tab.add-friend {
            background: var(--success);
            color: #fff;
            margin-left: auto;
        }

        .friend-tab.add-friend:hover {
            background: #1a8a3c;
            transform: scale(1.05);
        }

        .friends-list {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .friend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            transition: all 0.3s var(--transition-fast);
            cursor: pointer;
        }

        .friend-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .friend-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .friend-avatar-wrapper {
            position: relative;
            width: 40px;
            height: 40px;
        }

        .friend-avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .friend-status-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--surface);
            background: var(--success);
        }

        .friend-details {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .friend-name {
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .friend-username {
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.8;
        }

        .friend-bio {
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .friend-actions {
            display: flex;
            gap: 10px;
        }

        .friend-action-btn {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.3s;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .friend-action-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: transparent;
            transform: rotate(5deg) scale(1.1);
        }

        .friend-action-btn.accept:hover {
            background: var(--success);
        }

        .friend-action-btn.decline:hover {
            background: var(--danger);
        }

        /* ============================================
           PROFILE MODAL
           ============================================ */
        .profile-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .profile-card {
            background: #1a1c20;
            width: 400px;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .profile-header {
            background: linear-gradient(135deg, var(--accent), #33b8ff);
            height: 120px;
            position: relative;
        }

        .profile-avatar {
            position: absolute;
            bottom: -30px;
            left: 20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #1a1c20;
            object-fit: cover;
        }

        .profile-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
        }

        .profile-action-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .profile-action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .profile-body {
            padding: 60px 25px 25px;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .profile-username {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .profile-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .profile-bio {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #e7e9ea;
            margin-bottom: 20px;
            min-height: 60px;
        }

        .profile-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .stat-label {

    <script>
        // ============================================
        // CONFIGURATION & STATE
        // ============================================
        const ABLY_KEY = 'I2GocA.2XM7TQ:nuJQeyu7st5NRAjpGZKS00fjwc4qbCRGioyS_ERGTdc';
        const ably = new Ably.Realtime(ABLY_KEY);
        const globalChannel = ably.channels.get('global-hub');

        // Application State
        let state = {
            me: null,
            mode: 'friends',
            target: null,
            currentDMChannel: null,
            unreadCounts: JSON.parse(localStorage.getItem('unread_counts') || '{}'),
            typingTimeout: null
        };

        // ============================================
        // INITIALIZATION
        // ============================================
        window.addEventListener('DOMContentLoaded', () => {
            // Check authentication
            const user = localStorage.getItem('rbx_user');
            if (!user) {
                document.getElementById('login-gate').style.display = 'flex';
                return;
            }

            state.me = user;

            // Initialize components
            syncSelf();
            // Start with friends mode but ensure it displays properly
            setTimeout(() => {
                setMode('friends');
            }, 100);
            initPickers();
            initDMList();
            setupPresence();
            setupMessageListeners();
            setupDMListeners();

            // GSAP entrance animations
            gsap.from('.sidebar', { x: -300, opacity: 0, duration: 1, ease: 'power4.out' });
            gsap.from('.chat-header', { y: -50, opacity: 0, duration: 1, delay: 0.2, ease: 'expo.out' });
            gsap.from('.input-area', { y: 100, opacity: 0, duration: 1, delay: 0.3, ease: 'expo.out' });

            // Check for DM parameter in URL
            const urlParams = new URLSearchParams(window.location.search);
            const dmUser = urlParams.get('dm');
            if (dmUser) {
                setMode('dm', dmUser);
            }
        });

        // ============================================
        // PRESENCE SYSTEM (Online Status)
        // ============================================
        function setupPresence() {
            const myStatusMode = localStorage.getItem('nexus_status_mode') || 'online';

            globalChannel.presence.enter({
                user: state.me,
                pic: localStorage.getItem('rbx_pic'),
                status: 'Online',
                statusMode: myStatusMode
            });

            globalChannel.presence.subscribe(() => {
                updateOnlineList();
            });
        }

        function updateOnlineList() {
            globalChannel.presence.get((err, members) => {
                const list = document.getElementById('online-list');
                list.innerHTML = '';
                document.getElementById('member-count').innerText = members.length;

                // Hide all status dots first
                document.querySelectorAll('[id^="status-"]').forEach(s => s.style.display = 'none');

                members.forEach(m => {
                    const statusMode = m.data.statusMode || 'online';
                    const statusClass = 'status-' + statusMode;

                    // Update status dot in DM list
                    const statusDot = document.getElementById('status-' + m.data.user);
                    if (statusDot) {
                        statusDot.style.display = 'block';
                        statusDot.className = 'status-dot ' + statusClass;
                    }

                    const isVerified = window.isVerified && window.isVerified(m.data.user);
                    const memberEl = document.createElement('div');
                    memberEl.className = 'member-item';
                    memberEl.innerHTML = `
                        <div class="member-avatar-wrapper">
                            <img src="${m.data.pic || 'https://via.placeholder.com/32'}" alt="${m.data.user}">
                            <div class="status-dot ${statusClass}"></div>
                        </div>
                        <div class="member-info">
                            <div class="member-name">
                                ${m.data.user}
                                ${isVerified ? '<svg class="verified-check" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : ''}
                            </div>
                            <div class="member-status-text">${m.data.customStatus || m.data.status || 'Active'}</div>
                        </div>`;
                    memberEl.onclick = () => showProfileSummary(m.data.user);
                    list.appendChild(memberEl);
                });
            });
        }

        // ============================================
        // MESSAGE SYSTEM
        // ============================================
        function setupMessageListeners() {
            // Global channel messages
            globalChannel.subscribe('msg', (m) => {
                if (state.mode === 'global') renderMessage(m.data);
                if (m.data.user !== state.me) addDMContact(m.data.user, m.data.pic);
            });

            // Load global channel history
            globalChannel.history({ limit: 30 }, (err, page) => {
                if (!err) {
                    page.items.reverse().forEach(m => renderMessage(m.data));
                }
            });

            // Typing indicators
            globalChannel.subscribe('typing', (m) => {
                if (m.data.user !== state.me) showTypingIndicator(m.data.user);
            });
        }

        function setupDMListeners() {
            // Listen for DM pings on personal channel - only for current user
            const personalChannel = ably.channels.get('dm-' + state.me);

            // Subscribe to all DM messages
            personalChannel.subscribe('msg', (m) => {
                const sender = m.data.user;

                // Ignore if message is from ourselves
                if (sender === state.me) return;

                // Add contact to DM list if not exists
                addDMContact(sender, m.data.pic);

                // If we're in DM with this user, render the message
                if (state.mode === 'dm' && state.target === sender) {
                    renderMessage(m.data);
                    // Clear unread for this user
                    state.unreadCounts[sender] = 0;
                    localStorage.setItem('unread_counts', JSON.stringify(state.unreadCounts));
                    updateUnreadUI(sender);
                } else {
                    // Increment unread count
                    state.unreadCounts[sender] = (state.unreadCounts[sender] || 0) + 1;
                    localStorage.setItem('unread_counts', JSON.stringify(state.unreadCounts));
                    updateUnreadUI(sender);

                    // Show notification
                    if (window.showNotification) {
                        showNotification(`New message from @${sender}`);
                    }
                }
            });

            // Also subscribe to ping for backward compatibility
            personalChannel.subscribe('ping', (m) => {
                const sender = m.data.user;
                if (sender === state.me) return;
                addDMContact(sender, m.data.pic);
            });

            // ============================================
            // FRIEND REQUEST LISTENER
            // ============================================
            // Listen for friend request notifications
            const friendRequestChannel = ably.channels.get('friend-requests-' + state.me);
            friendRequestChannel.subscribe('new_request', (m) => {
                const fromUser = m.data.from_user;
                
                // Show notification
                if (window.showTopNotification) {
                    window.showTopNotification(`New friend request from @${fromUser}`);
                } else if (window.showNotification) {
                    showNotification(`New friend request from @${fromUser}`);
                }
                
                // Refresh friends dashboard if open
                if (state.mode === 'friends') {
                    showFriendsDashboard('pending');
                }
                
                // Store in localStorage for persistence
                let pendingRequests = JSON.parse(localStorage.getItem('pending_friend_requests') || '[]');
                if (!pendingRequests.find(r => r.from_user === fromUser)) {
                    pendingRequests.push(m.data);
                    localStorage.setItem('pending_friend_requests', JSON.stringify(pendingRequests));
                }
            });
        }

        function renderMessage(data) {
            const container = document.getElementById('msgs');
            const isMe = data.user === state.me;
            const messageId = 'msg-' + (data.time || Math.random().toString(36).substr(2, 9));
            const isVerifiedUser = window.isVerified && window.isVerified(data.user);
            const isAdminUser = window.isAdmin && window.isAdmin(state.me);
            const timeStr = new Date(data.time || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Skip system messages and old duplicate messages
            if (data.system || data.type === 'system') return;
            if (data.text && data.text.startsWith('Welcome to') && data.user === 'System') return;

            // DM Privacy Check: Only show DM messages if user is participant
            if (state.mode === 'dm' && data._dmRoom) {
                const expectedRoom = ['dm_room', state.me, state.target].sort().join('_');
                if (data._dmRoom !== expectedRoom) return; // Not in this DM room
                if (data.user !== state.me && data.user !== state.target) return; // Not a participant
            }

            // Check for duplicate message
            if (document.getElementById(messageId)) return;

            // Skip very old messages (older than 24 hours for global, keep DMs)
            if (state.mode === 'global' && data.time) {
                const msgAge = Date.now() - data.time;
                if (msgAge > 24 * 60 * 60 * 1000) return; // Skip messages older than 24 hours
            }

            // Process message text (mentions, images)
            let processedText = processMessageText(data.text);

            const messageEl = document.createElement('div');
            messageEl.className = 'message';
            messageEl.id = messageId;

            const avatarId = 'avatar-' + Math.random().toString(36).substr(2, 9);

            // Get profile picture from localStorage cache or use placeholder
            const cachedPic = localStorage.getItem('pfp_' + data.user);
            const picUrl = cachedPic || data.pic || 'https://via.placeholder.com/42';

            messageEl.innerHTML = `
                <img id="${avatarId}" class="message-avatar" src="${picUrl}" alt="${data.user}" onclick="showProfileSummary('${data.user}')">
                <div class="message-content">
                    <div class="message-meta">
                        <span class="message-author" onclick="showProfileSummary('${data.user}')">${data.user}</span>
                        ${isVerifiedUser ? '<svg class="verified-check" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : ''}
                        <span class="message-time">${timeStr}</span>
                    </div>
                    <div class="message-text">${processedText}</div>
                </div>
                <div class="message-actions">
                    ${(isMe || isAdminUser) ? `
                        <button class="message-action-btn" onclick="editMessage('${messageId}', '${encodeURIComponent(JSON.stringify(data))}')" title="Edit">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="message-action-btn delete" onclick="deleteMessage('${messageId}')" title="Delete">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    ` : ''}
                    <button class="message-action-btn" onclick="saveMessage('${messageId}', '${encodeURIComponent(JSON.stringify(data))}')" title="Save">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                    </button>
                </div>`;

            // Back-fill profile picture if missing or use cached version
            if (!data.pic) {
                // Check localStorage cache first
                const cachedAvatar = localStorage.getItem('pfp_' + data.user);
                if (cachedAvatar && document.getElementById(avatarId)) {
                    document.getElementById(avatarId).src = cachedAvatar;
                } else if (window.supabaseClient) {
                    // Fetch from Supabase and cache it
                    window.supabaseClient.from('profiles').select('avatar_url').eq('username', data.user).maybeSingle().then(({ data: profile }) => {
                        if (profile && profile.avatar_url) {
                            localStorage.setItem('pfp_' + data.user, profile.avatar_url);
                            const avatarEl = document.getElementById(avatarId);
                            if (avatarEl) avatarEl.src = profile.avatar_url;
                        }
                    });
                }
            } else {
                // Cache the provided profile picture
                localStorage.setItem('pfp_' + data.user, data.pic);
            }

            container.appendChild(messageEl);
            container.scrollTop = container.scrollHeight;
        }

        function processMessageText(text) {
            let processed = text;

            // Handle mentions
            if (processed.includes(`@${state.me}`)) {
                processed = processed.replace(`@${state.me}`,
                    `<span style="background:rgba(255, 162, 0, 0.15); color:#FFD700; padding:1px 6px; border-radius:4px; font-weight:700;">@${state.me}</span>`);
            }

            // Auto-embed images
            const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
            processed = processed.replace(imgRegex, (match) => {
                return `<img src="${match}" style="max-width:300px; border-radius:8px; margin-top:10px; cursor:pointer;" onclick="window.open('${match}', '_blank')">`;
            });

            return processed;
        }

        // ============================================
        // MESSAGE ACTIONS
        // ============================================
        function deleteMessage(id) {
            if (confirm('Permanently delete this message?')) {
                const msgEl = document.getElementById(id);
                if (msgEl) {
                    gsap.to(msgEl, {
                        backgroundColor: '#320000',
                        scale: 0.8,
                        opacity: 0,
                        duration: 0.6,
                        onComplete: () => msgEl.remove()
                    });
                }
            }
        }

        function editMessage(id, dataRaw) {
            const data = JSON.parse(decodeURIComponent(dataRaw));
            const newText = prompt('Edit your message:', data.text);
            if (newText && newText !== data.text) {
                const textEl = document.getElementById(id)?.querySelector('.message-text');
                if (textEl) {
                    textEl.innerHTML = newText + ' <em style="opacity:0.5;">(edited)</em>';
                }
            }
        }

        function saveMessage(id, dataRaw) {
            const data = JSON.parse(decodeURIComponent(dataRaw));
            let saved = JSON.parse(localStorage.getItem('nexus_saved_messages') || '[]');
            saved.push(data);
            localStorage.setItem('nexus_saved_messages', JSON.stringify(saved));

            // Visual feedback
            const msgEl = document.getElementById(id);
            if (msgEl) {
                const saveBtn = msgEl.querySelector('.message-action-btn:last-child svg');
                if (saveBtn) {
                    saveBtn.setAttribute('fill', 'var(--accent)');
                    gsap.to(saveBtn, { scale: 1.5, duration: 0.3, yoyo: true, repeat: 1 });
                }
            }

            if (window.showNotification) showNotification('Message saved to bookmarks');
        }

        // ============================================
        // SEND MESSAGES
        // ============================================
        function send() {
            const input = document.getElementById('mIn');
            if (!input.value.trim()) return;

            const messageData = {
                user: state.me,
                text: input.value,
                pic: localStorage.getItem('rbx_pic'),
                time: Date.now()
            };

            if (state.mode === 'global') {
                globalChannel.publish('msg', messageData);
                // Render our own global message immediately
                renderMessage(messageData);
            } else if (state.mode === 'dm' && state.target) {
                // Send to the shared DM room
                if (state.currentDMChannel) {
                    state.currentDMChannel.publish('msg', messageData);
                }
                
                // Also send to recipient's personal channel for notification
                ably.channels.get('dm-' + state.target).publish('msg', messageData);
                
                // Persist locally
                persistDM(state.target, messageData);
                
                // IMPORTANT: Render our own message immediately so we see it
                renderMessage(messageData);
            }

            input.value = '';
        }

        // ============================================
        // TYPING INDICATORS
        // ============================================
        function reportTyping() {
            if (state.mode === 'global') {
                globalChannel.publish('typing', { user: state.me });
            } else if (state.mode === 'dm' && state.currentDMChannel) {
                state.currentDMChannel.publish('typing', { user: state.me });
            }
        }

        function showTypingIndicator(username) {
            const indicator = document.getElementById('typing-area');
            if (!indicator) return;

            indicator.textContent = `${username} is typing...`;
            indicator.style.opacity = '1';

            clearTimeout(state.typingTimeout);
            state.typingTimeout = setTimeout(() => {
                indicator.style.opacity = '0';
            }, 3000);
        }

        // ============================================
        // MODE SWITCHING
        // ============================================
        function setMode(mode, target = null) {
            state.mode = mode;
            state.target = target;

            const msgsContainer = document.getElementById('msgs');
            msgsContainer.innerHTML = '';

            // Update sidebar active states
            document.querySelectorAll('.user-link').forEach(link => link.classList.remove('active'));

            if (mode === 'friends') {
                if (state.currentDMChannel) {
                    state.currentDMChannel.unsubscribe();
                    state.currentDMChannel = null;
                }
                document.getElementById('btn-friends').classList.add('active');
                document.getElementById('chat-title').innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.4;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span>Friends</span>`;
                showFriendsDashboard();
            } else if (mode === 'global') {
                if (state.currentDMChannel) {
                    state.currentDMChannel.unsubscribe();
                    state.currentDMChannel = null;
                }
                document.getElementById('btn-global').classList.add('active');
                document.getElementById('chat-title').innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                    Global Hub`;
                document.querySelector('.input-area').style.display = 'block';
                document.getElementById('mIn').placeholder = 'Message #global-hub';

                // Reload global history
                globalChannel.history({ limit: 30 }, (err, page) => {
                    if (!err) page.items.reverse().forEach(m => renderMessage(m.data));
                });
            } else if (mode === 'dm') {
                const dmEl = document.getElementById('u-' + target);
                if (dmEl) dmEl.classList.add('active');

                document.getElementById('chat-title').textContent = '@ ' + target;
                document.querySelector('.input-area').style.display = 'block';
                document.getElementById('mIn').placeholder = 'Message @' + target;

                // Join private DM room
                if (state.currentDMChannel) state.currentDMChannel.unsubscribe();
                const roomName = ['dm_room', state.me, target].sort().join('_');
                state.currentDMChannel = ably.channels.get(roomName);

                state.currentDMChannel.subscribe('msg', (m) => {
                    persistDM(target, m.data);
                    if (state.mode === 'dm' && state.target === target) {
                        renderMessage(m.data);
                    }
                });

                state.currentDMChannel.subscribe('typing', (m) => {
                    if (m.data.user !== state.me) showTypingIndicator(m.data.user);
                });

                loadDMHistory(target);
            } else if (mode === 'saved') {
                document.getElementById('chat-title').textContent = '★ Bookmarks';
                document.querySelector('.input-area').style.display = 'none';
                const saved = JSON.parse(localStorage.getItem('nexus_saved_messages') || '[]');
                saved.forEach(renderMessage);
            }

            gsap.from('#chat-title', { opacity: 0, x: -20, duration: 0.5 });
        }

        // ============================================
        // DM CONTACT MANAGEMENT
        // ============================================
        function addDMContact(username, pic) {
            if (document.getElementById('u-' + username)) return;

            const dmList = document.getElementById('dm-list');
            const contactEl = document.createElement('div');
            contactEl.id = 'u-' + username;
            contactEl.className = 'user-link';
            contactEl.style.cssText = 'padding:8px 15px; margin:2px 8px; border-radius:4px; display:flex; align-items:center; gap:12px; cursor:pointer;';

            contactEl.innerHTML = `
                <div style="position:relative; width:32px; height:32px; flex-shrink:0;">
                    <img id="pfp-${username}" src="${pic || 'https://via.placeholder.com/32'}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                    <div id="status-${username}" class="status-dot" style="display:none;"></div>
                </div>
                <div style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; font-size:0.9rem; color:#888;">${username}</div>
                <div id="unread-${username}" class="unread-badge" style="display:none;">0</div>
                <div onclick="event.stopPropagation(); removeDM('${username}')" style="opacity:0; transition:0.2s; cursor:pointer;" onmouseover="this.style.opacity=0.5" onmouseout="this.style.opacity=0">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </div>`;

            contactEl.onclick = () => {
                state.unreadCounts[username] = 0;
                localStorage.setItem('unread_counts', JSON.stringify(state.unreadCounts));
                updateUnreadUI(username);
                setMode('dm', username);
            };

            // Fetch real profile picture if available
            if (!pic && window.supabaseClient) {
                window.supabaseClient.from('profiles').select('avatar_url').eq('username', username).maybeSingle().then(({ data }) => {
                    if (data && data.avatar_url) {
                        document.getElementById('pfp-' + username).src = data.avatar_url;
                    }
                });
            }

            dmList.appendChild(contactEl);
            updateUnreadUI(username);
            gsap.from(contactEl, { x: -20, opacity: 0, duration: 0.5, ease: "power2.out" });
        }

        function removeDM(username) {
            const el = document.getElementById('u-' + username);
            if (el) {
                gsap.to(el, { x: 20, opacity: 0, duration: 0.3, onComplete: () => el.remove() });
            }

            // Remove from persistent list
            let dmUsers = JSON.parse(localStorage.getItem('nexus_dm_users') || '[]');
            dmUsers = dmUsers.filter(u => u !== username);
            localStorage.setItem('nexus_dm_users', JSON.stringify(dmUsers));

            if (state.mode === 'dm' && state.target === username) {
                setMode('global');
            }
        }

        function initDMList() {
            const dmUsers = JSON.parse(localStorage.getItem('nexus_dm_users') || '[]');
            dmUsers.forEach(u => addDMContact(u));
        }

        function updateUnreadUI(username) {
            const count = state.unreadCounts[username] || 0;
            const badge = document.getElementById('unread-' + username);
            if (badge) {
                badge.textContent = count;
                badge.style.display = count > 0 ? 'block' : 'none';
            }
        }

        // ============================================
        // DM PERSISTENCE
        // ============================================
        function persistDM(username, data) {
            const key = `dm_history_${username}`;
            let history = JSON.parse(localStorage.getItem(key) || '[]');
            history.push(data);
            localStorage.setItem(key, JSON.stringify(history));

            // Track active DMs
            let dmUsers = JSON.parse(localStorage.getItem('nexus_dm_users') || '[]');
            if (!dmUsers.includes(username)) {
                dmUsers.push(username);
                localStorage.setItem('nexus_dm_users', JSON.stringify(dmUsers));
            }
        }

        function loadDMHistory(username) {
            // Only load DM history if we're actually in DM mode with this specific user
            if (state.mode !== 'dm' || state.target !== username) return;

            // Verify this is a DM between current user and target
            const expectedRoomName = ['dm_room', state.me, username].sort().join('_');

            const history = JSON.parse(localStorage.getItem(`dm_history_${username}`) || '[]');

            // Filter to only show messages where current user is participant
            const filteredHistory = history.filter(msg =>
                msg.user === state.me || msg.user === username
            );

            filteredHistory.forEach(renderMessage);
        }

        function promptNewDM() {
            const username = prompt('Enter the username to message:');
            if (username && username.trim() !== state.me) {
                // Check if user exists
                if (window.checkIfUserExists) {
                    window.checkIfUserExists(username.trim()).then(realUser => {
                        if (realUser) {
                            addDMContact(realUser);
                            setMode('dm', realUser);
                        } else {
                            if (window.showTopNotification) {
                                window.showTopNotification(`User not found: ${username}`, 'error');
                            }
                        }
                    });
                } else {
                    addDMContact(username.trim());
                    setMode('dm', username.trim());
                }
            }
        }

        // ============================================
        // FRIENDS SYSTEM
        // ============================================
        async function showFriendsDashboard(tab = 'all') {
            const container = document.getElementById('msgs');
            const inputArea = document.querySelector('.input-area');
            inputArea.style.display = 'none';

            container.innerHTML = `
                <div class="friends-container">
                    <div class="friends-nav">
                        <div class="friend-tab ${tab === 'all' ? 'active' : ''}" onclick="showFriendsDashboard('all')">All</div>
                        <div class="friend-tab ${tab === 'pending' ? 'active' : ''}" onclick="showFriendsDashboard('pending')">Pending</div>
                        <div class="friend-tab add-friend" onclick="showFriendsDashboard('add')">Add Friend</div>
                    </div>
                    <div class="friends-list" id="friends-view">
                        <div class="empty-state">
                            <div class="empty-state-icon">🔄</div>
                            <div class="empty-state-title">Synchronizing...</div>
                            <div class="empty-state-text">Connecting to the network</div>
                        </div>
                    </div>
                </div>`;

            const view = document.getElementById('friends-view');

            if (!window.supabaseClient) {
                view.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">System Offline</div><div class="empty-state-text">Please log in to access friends.</div></div>';
                return;
            }

            if (tab === 'add') {
                view.innerHTML = `
                    <div style="padding:20px;">
                        <h3 style="margin-bottom:10px; font-size:1.1rem;">Add Friend</h3>
                        <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:20px;">Enter a Nexus username to send a friend request.</p>
                        <div style="background:#1e1f22; padding:15px; border-radius:8px; display:flex; gap:10px;">
                            <input type="text" id="friend-search" placeholder="Enter username" style="flex:1; border:none; background:transparent; padding:0; color:var(--text-main); font-family:inherit; font-size:0.95rem;">
                            <button onclick="sendFriendRequest(document.getElementById('friend-search').value)" style="padding:10px 20px; background:var(--accent); color:#fff; border:none; border-radius:6px; font-weight:600; cursor:pointer;">Send Request</button>
                        </div>
                    </div>`;
            } else if (tab === 'all') {
                const { data } = await window.supabaseClient
                    .from('friend_requests')
                    .select('*')
                    .eq('status', 'accepted')
                    .or(`from_user.eq.${state.me},to_user.eq.${state.me}`);

                if (!data || data.length === 0) {
                    view.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👻</div><div class="empty-state-title">No Friends Yet</div><div class="empty-state-text">Start connecting with others in the Nexus!</div></div>';

                view.innerHTML = `<div style="padding:15px 0; font-size:0.75rem; text-transform:uppercase; color:var(--text-muted); font-weight:700;">All Friends — ${data.length}</div>`;

                for (const friend of data) {
                    const otherUser = friend.from_user === state.me ? friend.to_user : friend.from_user;
                    const item = createFriendItem(otherUser, friend.id);
                    view.appendChild(item);
                }
            } else if (tab === 'pending') {
                const { data } = await window.supabaseClient
                    .from('friend_requests')
                    .select('*')
                    .eq('status', 'pending')
                    .or(`from_user.eq.${state.me},to_user.eq.${state.me}`);

                if (!data || data.length === 0) {
                    view.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-title">No Pending Requests</div><div class="empty-state-text">When someone sends you a request, it will appear here.</div></div>';

                data.forEach(request => {
                    const isIncoming = request.to_user === state.me;
                    const otherUser = isIncoming ? request.from_user : request.to_user;
                    const item = createFriendItem(otherUser, request.id, isIncoming);
                    view.appendChild(item);

        async function sendFriendRequest(username) {
            if (!username || username.trim() === state.me) return;
            if (!window.supabaseClient) {
                if (window.showTopNotification) window.showTopNotification('System offline', 'error');
                return;
            }

            try {
                const realUser = await window.checkIfUserExists(username.trim());
                if (!realUser) {
                    if (window.showTopNotification) window.showTopNotification(`User not found: ${username}`, 'error');
                    return;
                }

                // Check for existing request
                const { data: existing } = await window.supabaseClient
                    .from('friend_requests')
                    .select('*')
                    .or(`and(from_user.eq.${state.me},to_user.eq.${realUser}),and(from_user.eq.${realUser},to_user.eq.${state.me})`)
                    .maybeSingle();

                if (existing) {
                    if (window.showTopNotification) window.showTopNotification('Request already sent or you are already friends', 'error');
                    return;
                }

                await window.supabaseClient.from('friend_requests').insert([{
                    from_user: state.me,
                    to_user: realUser,
                    status: 'pending'
                }]);

                if (window.showTopNotification) window.showTopNotification(`Friend request sent to @${realUser}`);
                showFriendsDashboard('pending');
            } catch (e) {
                console.error('Friend request failed:', e);
                if (window.showTopNotification) window.showTopNotification('Failed to send request', 'error');
            }
        }

        async function acceptFriend(requestId, username) {
            if (!window.supabaseClient) return;
            await window.supabaseClient.from('friend_requests').update({ status: 'accepted' }).eq('id', requestId);
            if (window.showTopNotification) window.showTopNotification(`You are now friends with @${username}!`);
            showFriendsDashboard('all');
        }

        async function declineFriend(requestId) {
            if (!window.supabaseClient) return;
            await window.supabaseClient.from('friend_requests').delete().eq('id', requestId);
            showFriendsDashboard('pending');
        }

            const nextIndex = (statusModes.indexOf(current) + 1) % statusModes.length;
            const next = statusModes[nextIndex];

            localStorage.setItem('nexus_status_mode', next);
            updateStatusUI(next);

            globalChannel.presence.update({
                user: state.me,
                pic: localStorage.getItem('rbx_pic'),
                statusMode: next,
                customStatus: localStorage.getItem('nexus_custom_status')

        async function loadProfileData(username) {
            try {
                // Get profile info
                const { data: profile } = await window.supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('username', username)
                    .maybeSingle();

                const nameEl = document.getElementById('profile-name');
                const usernameEl = document.getElementById('profile-username');
                const bioEl = document.getElementById('profile-bio');
                const avatarEl = document.getElementById('profile-avatar');

                if (profile) {
                    nameEl.textContent = profile.display_name || username;
                    usernameEl.textContent = '@' + username;
                    bioEl.textContent = profile.bio || 'No bio available';
                    if (profile.avatar_url) {
                        avatarEl.src = profile.avatar_url;
                    }
                } else {
                    nameEl.textContent = username;
                    usernameEl.textContent = '@' + username;
                }

                // Get friend count
                const { count: friendCount } = await window.supabaseClient
                    .from('friend_requests')
                    .select('*', { count: 'exact' })
                    .eq('status', 'accepted')
                    .or(`from_user.eq.${username},to_user.eq.${username}`);

                document.getElementById('profile-friends').textContent = friendCount || 0;

                // Get group count (simplified - just count DMs for now)
                const dmHistory = JSON.parse(localStorage.getItem(`dm_history_${username}`) || '[]');
                document.getElementById('profile-messages').textContent = dmHistory.length;

                // Get online status
                globalChannel.presence.get((err, members) => {
                    const member = members.find(m => m.data.user === username);
                    if (member) {
                        const statusDot = document.getElementById('profile-status').querySelector('.status-dot');
                        const statusText = document.getElementById('profile-status-text');
                        const statusMode = member.data.statusMode || 'online';

                        statusDot.className = 'status-dot status-' + statusMode;
                        statusText.textContent = member.data.customStatus || member.data.status || 'Active';
                    }
                });

            } catch (e) {
                console.error('Profile load error:', e);
            }
        }

        }

        function createGroup() {
            const name = prompt('Group name:');
            if (!name) return;

            const groups = JSON.parse(localStorage.getItem('nexus_groups') || '[]');
            const newGroup = {
                id: 'group_' + Date.now(),
                name: name,
                members: [state.me],
                created_at: Date.now()
            };

            groups.push(newGroup);
            localStorage.setItem('nexus_groups', JSON.stringify(groups));

            if (window.showTopNotification) window.showTopNotification(`Group "${name}" created!`);
            showGroupDashboard();
        }

        function joinGroup(groupId) {
            const groups = JSON.parse(localStorage.getItem('nexus_groups') || '[]');
            const group = groups.find(g => g.id === groupId);

            if (!group) return;

            state.mode = 'group';
            state.target = groupId;

            const msgsContainer = document.getElementById('msgs');
            msgsContainer.innerHTML = '';

            document.getElementById('chat-title').textContent = '👥 ' + group.name;
            document.querySelector('.input-area').style.display = 'block';
            document.getElementById('mIn').placeholder = `Message ${group.name}`;

            // Load group messages
            const messages = JSON.parse(localStorage.getItem(`group_${groupId}_messages`) || '[]');
            messages.forEach(renderMessage);
        }

        function openGroupModal(groupId) {
            const groups = JSON.parse(localStorage.getItem('nexus_groups') || '[]');
            const group = groups.find(g => g.id === groupId);

            if (!group) return;

            const modal = document.createElement('div');
            modal.className = 'group-modal';
            modal.id = 'group-modal';
            modal.innerHTML = `
                <div class="group-card">
                    <div class="group-header">
                        <div class="group-actions">
                            <button class="profile-action-btn" onclick="closeGroupModal()">Close</button>
                        </div>
                        <div class="group-icon">${group.name.charAt(0)}</div>
                    </div>
                    <div class="group-body">
                        <div class="group-title">${group.name}</div>
                        <div class="group-desc">Group chat with ${group.members.length} members</div>
                        <div class="member-list">
                            ${group.members.map(member => `
                                <div class="member-row">
                                    <div style="display:flex; align-items:center;">
                                        <img class="member-avatar" src="https://via.placeholder.com/24" alt="${member}">
                                        <span>${member}</span>
                                    </div>
                                    <div style="font-size:0.7rem; color:var(--text-muted);">${member === state.me ? 'You' : 'Member'}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="group-footer">
                            <button class="profile-action-btn" style="flex:1; background:var(--accent); color:#fff;" onclick="joinGroup('${groupId}'); closeGroupModal();">Join Group</button>
                            <button class="profile-action-btn" style="flex:1; background:transparent; border:1px solid var(--border);" onclick="leaveGroup('${groupId}'); closeGroupModal();">Leave Group</button>
                        </div>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            modal.style.display = 'flex';
            gsap.from('.group-card', { scale: 0.8, opacity: 0, duration: 0.4, ease: 'back.out(1.7)' });
        }

        function closeGroupModal() {
            const modal = document.getElementById('group-modal');
            if (modal) {
                gsap.to('.group-card', { scale: 0.8, opacity: 0, duration: 0.3, onComplete: () => modal.remove() });
            }
        }

        function leaveGroup(groupId) {
            const groups = JSON.parse(localStorage.getItem('nexus_groups') || '[]');
            const groupIndex = groups.findIndex(g => g.id === groupId);

            if (groupIndex !== -1) {
                const group = groups[groupIndex];
                if (group.members.length === 1) {
                    // Delete group if only one member
                    groups.splice(groupIndex, 1);
                } else {
                    // Remove user from group
                    group.members = group.members.filter(m => m !== state.me);
                }

                localStorage.setItem('nexus_groups', JSON.stringify(groups));

                if (state.mode === 'group' && state.target === groupId) {
                    setMode('friends');
                }

                if (window.showTopNotification) window.showTopNotification('Left group');
            }
        }

        // ============================================
        // ENHANCED MESSAGE SENDING FOR GROUPS
        // ============================================
        function send() {
            const input = document.getElementById('mIn');
            if (!input.value.trim()) return;

            const messageData = {
                user: state.me,
                text: input.value,
                pic: localStorage.getItem('rbx_pic'),
                time: Date.now()
            };

            if (state.mode === 'global') {
                globalChannel.publish('msg', messageData);
            } else if (state.mode === 'dm' && state.target) {
                // Send to the shared DM room
                if (state.currentDMChannel) {
                    state.currentDMChannel.publish('msg', messageData);
                }

                // Also send ping to recipient's personal channel
                ably.channels.get('dm-' + state.target).publish('msg', messageData);

                // Persist locally
                persistDM(state.target, messageData);

                // Render our own message
                renderMessage(messageData);
            } else if (state.mode === 'group' && state.target) {
                // Save to group messages
                const key = `group_${state.target}_messages`;
                let messages = JSON.parse(localStorage.getItem(key) || '[]');
                messages.push(messageData);
                localStorage.setItem(key, JSON.stringify(messages));

                // Render message
                renderMessage(messageData);
            }

            input.value = '';
        }

        // ============================================
        // ENHANCED FRIEND ITEM WITH BIO AND STATUS
        // ============================================
        function createFriendItem(username, requestId, isIncoming = false) {
            const item = document.createElement('div');
            item.className = 'friend-item';

            // Get user bio and status
            let bio = '';
            let status = 'Online';
            let statusClass = 'status-online';

            if (window.supabaseClient) {
                window.supabaseClient.from('profiles').select('bio').eq('username', username).maybeSingle().then(({ data }) => {
                    if (data && data.bio) {
                        bio = data.bio;
                        item.querySelector('.friend-bio').textContent = bio;
                    }
                });
            }

            item.innerHTML = `
                <div class="friend-info">
                    <div class="friend-avatar-wrapper">
                        <img id="f-pfp-${username}" src="https://via.placeholder.com/40" alt="${username}">
                        <div class="friend-status-dot status-${statusClass}"></div>
                    </div>
                    <div class="friend-details">
                        <div class="friend-name">${username}</div>
                        <div class="friend-bio">${bio || 'No bio available'}</div>
                    </div>
                </div>
                <div class="friend-actions">
                    <button class="friend-action-btn" onclick="event.stopPropagation(); setMode('dm', '${username}')" title="Message">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                    </button>
                    ${isIncoming ? `
                        <button class="friend-action-btn accept" onclick="event.stopPropagation(); acceptFriend('${requestId}', '${username}')" title="Accept">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
                        </button>
                    ` : ''}
                    <button class="friend-action-btn decline" onclick="event.stopPropagation(); declineFriend('${requestId}')" title="Remove">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>`;

            item.onclick = () => showProfileSummary(username);

            // Fetch profile picture
            if (window.supabaseClient) {
                window.supabaseClient.from('profiles').select('avatar_url').eq('username', username).maybeSingle().then(({ data }) => {
                    if (data && data.avatar_url) {
                        document.getElementById('f-pfp-' + username).src = data.avatar_url;
                    }
                });
            }

            return item;
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function syncToWorkspace() {
            if (window.showNotification) {
                showNotification('Workspace sync initiated');
            }
        }

        // Close pickers when clicking outside
        document.addEventListener('click', (e) => {
            const pickers = document.querySelectorAll('.picker-panel');
            pickers.forEach(picker => {
                if (!picker.contains(e.target) && !e.target.closest('.input-icon-btn')) {
                    picker.style.display = 'none';
                }
            });

            // Close settings when clicking outside
            const settings = document.getElementById('settings-panel');
            if (settings && !settings.contains(e.target) && !e.target.closest('.user-slot-actions')) {
                closeSettings();
            }
        });

        // Add settings button to user slot
        document.addEventListener('DOMContentLoaded', () => {
            const userSlotActions = document.querySelector('.user-slot-actions');
            if (userSlotActions) {
                userSlotActions.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" onclick="showSettings()" title="Settings" style="cursor:pointer;"><path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7z"/></svg>
                `;
            }
        });
    </script>
</body>

</html>
