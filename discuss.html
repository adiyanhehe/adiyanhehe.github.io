<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Nexus // Messages</title>
    <!-- Matched web.html font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg: #030303;
            --surface: rgba(255, 255, 255, 0.02);
            --panel: #0a0a0a;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b8c8f;
            --accent: #5e6ad2;
            --transition: cubic-bezier(0.76, 0, 0.24, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media (min-width: 1024px) {

            body,
            a,
            button,
            input,
            select,
            textarea {
                cursor: none !important;
            }
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- DISCORD LAYOUT --- */
        .server-sidebar {
            width: 72px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            border-right: 1px solid rgba(255,255,255,0.05);
            margin-top: 75px;
        }
        .server-icon {
            width: 48px;
            height: 48px;
            background: #111;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .server-icon:hover, .server-icon.active {
            border-radius: 16px;
            background: var(--accent);
            color: #fff;
        }
        .server-icon::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 25%;
            height: 50%;
            width: 4px;
            background: #fff;
            border-radius: 0 4px 4px 0;
            transform: scaleY(0);
            transition: 0.3s;
        }
        .server-icon.active::before { transform: scaleY(1); }

        .sidebar {
            width: 240px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            margin-top: 75px;
        }

        .side-head {
            padding: 15px 20px;
            font-weight: 900;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .user-link {
            padding: 8px 12px;
            margin: 2px 8px;
            border-radius: 4px;
            cursor: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.2s;
            color: var(--text-muted);
        }
        .user-link:hover, .user-link.active {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .user-link.active { background: rgba(255,255,255,0.1); }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--surface);
            margin-top: 75px;
        }

        .member-sidebar {
            width: 240px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            margin-top: 75px;
        }

        /* --- CHAT FLOW (DISCORD STYLE) --- */
        .bubble {
            background: transparent !important;
            border: none !important;
            padding: 5px 20px !important;
            display: flex;
            gap: 15px;
            max-width: 100% !important;
            margin-bottom: 2px;
            transition: 0.1s;
        }
        .bubble:hover { background: rgba(255,255,255,0.02) !important; }
        .bubble img.msg-pfp {
            width: 40px; height: 40px; border-radius: 50%; margin-top: 5px; cursor: pointer;
        }
        .msg-content { flex: 1; }
        .msg-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .msg-user { font-weight: 700; color: #fff; cursor: pointer; }
        .msg-user:hover { text-decoration: underline; }
        .msg-time { font-size: 0.7rem; color: #555; }
        .msg-text { color: #dcddde; font-size: 0.95rem; line-height: 1.3; }
        
        .chat-head {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            z-index: 5;
        }

        #chat-title {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: -0.2px;
        }

        .chat-head a {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.3s;
            cursor: none;
        }

        .chat-head a:hover {
            color: var(--text-main);
        }

        #msgs {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 65%;
            padding: 15px 20px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.45;
            font-weight: 400;
        }

        .me {
            align-self: flex-end;
            background: #fff;
            color: #000;
            border-bottom-right-radius: 4px;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.05);
        }

        .not-me {
            align-self: flex-start;
            background: #111;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .input-box {
            padding: 20px 30px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 15px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
        }

        input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px 25px;
            border-radius: 100px;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            transition: 0.3s;
            cursor: none;
        }

        input:focus {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 0 30px;
            border-radius: 100px;
            font-weight: 800;
            cursor: none;
            font-family: inherit;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: transform 0.3s;
            letter-spacing: 1px;
        }

        button:hover {
            transform: scale(1.05);
            background: var(--accent);
            color: #fff;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 35vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .main {
                height: 65vh;
            }

            .chat-head {
                padding: 15px;
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .input-box {
                padding: 15px;
                flex-direction: column;
            }

            button {
                padding: 15px;
            }

            #msgs {
                padding: 15px;
                gap: 10px;
            }

            .bubble {
                max-width: 85%;
                font-size: 0.95rem;
            }
        }
    </style>
    <!-- Global Control Center via Super Admin -->
    <link rel="stylesheet" href="global.css?v=3">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="global.js?v=3" defer></script>
</head>

<body>
    <!-- CUSTOM CURSOR -->
    <div id="cursor-dot"></div>
    <div id="login-gate"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000001; align-items:center; justify-content:center; flex-direction:column; text-align:center; backdrop-filter:blur(10px);">
        <div style="font-size:4rem; font-weight:900; letter-spacing:-3px; margin-bottom:10px;">CHAT</div>
        <p style="color:#888; margin-bottom:40px; font-size:1.1rem; max-width:400px;">Access the global hub and
            communicate with the network.</p>
        <div style="display:flex; gap:20px;">
            <a href="auth.html?mode=register&redirect=discuss.html"
                style="background:#fff; color:#000; padding:18px 45px; border-radius:100px; font-weight:900; text-decoration:none; transition:0.4s; box-shadow:0 15px 40px rgba(255,255,255,0.15);"
                class="interactable">Register</a>
            <a href="auth.html?mode=login&redirect=discuss.html"
                style="background:transparent; border:2px solid #333; color:#fff; padding:18px 45px; border-radius:100px; font-weight:900; text-decoration:none; transition:0.4s;"
                class="interactable">Log In</a>
        </div>
    </div>

    <header class="header">
        <a href="index.html" class="logo interactable">ADIYAN</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="threads.html" class="nav-item">Threads</a>
            <a href="discuss.html" class="nav-item active">Discuss</a>
            <div id="auth-nav"></div>
            <button class="interactable theme-toggle" onclick="toggleTheme(event)">🌙</button>
        </nav>
    </header>

    <!-- DISCORD STYLE LAYOUT -->
    <div class="server-sidebar">
        <div class="server-icon active" title="Direct Messages">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
        </div>
        <div style="width:32px; height:2px; background:rgba(255,255,255,0.05); margin:4px 0;"></div>
        <div class="server-icon" title="Nexus Hub">N</div>
        <div class="server-icon" title="Code Research">C</div>
        <div class="server-icon" title="Global Sync">G</div>
    </div>

    <div class="sidebar">
        <div class="side-head">Private Messages</div>
        <div class="user-link interactable active" onclick="setMode('global')"># Global Hub</div>
        <div class="user-link interactable" onclick="setMode('saved')" style="color:var(--accent);">★ Bookmarks</div>
        
        <div class="side-head" style="margin-top:10px;">Direct Contacts <span onclick="promptNewDM()" style="cursor:pointer; opacity:0.5;">+</span></div>
        <div id="dm-list"></div>
        
        <div class="user-link interactable" onclick="setStatus()" style="margin-top:auto; border-top:1px solid var(--border); opacity:0.5; font-size:0.75rem;">📡 SET STATUS</div>
    </div>

    <div class="main">
        <div class="chat-head">
            <span id="chat-title" style="display:flex; align-items:center; gap:10px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.4;"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                Global Hub
            </span>
            <div style="display:flex; gap:15px; align-items:center;">
                <svg onclick="syncToWorkspace()" title="Sync to Workspace" class="interactable" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="cursor:pointer; opacity:0.6;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                <a href="index.html" class="interactable" style="font-size:0.7rem; text-decoration:none; color:#555; text-transform:uppercase; font-weight:800; letter-spacing:1px;">Exit Hub</a>
            </div>
        </div>
        <div id="msgs"></div>
        <div class="input-box">
            <div style="background:rgba(255,255,255,0.03); width:100%; border-radius:8px; display:flex; padding:5px 15px; align-items:center; gap:15px;">
                <button style="background:none; border:none; color:#555; padding:0; width:auto; font-size:1.5rem;">+</button>
                <input type="text" id="mIn" placeholder="Message #global-hub" class="interactable" style="border:none; padding:10px 0;">
                <div style="display:flex; gap:15px; color:#555;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <div class="member-sidebar">
        <div class="side-head">Online — <span id="member-count">0</span></div>
        <div id="online-list"></div>
        
        <div class="side-head" style="margin-top:20px;">Recent Activity</div>
        <div id="notify-list" style="padding:10px 20px; font-size:0.75rem; color:#444;">No new transmissions.</div>
    </div>

    <script>
        // --- CUSTOM CURSOR LOGIC ---
        const cursorDot = document.getElementById('cursor-dot');
        const cursorBg = document.getElementById('cursor-bg');
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let dotX = mouseX, dotY = mouseY; let bgX = mouseX, bgY = mouseY;
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

        gsap.ticker.add(() => {
            dotX += (mouseX - dotX) * 0.2; dotY += (mouseY - dotY) * 0.2;
            gsap.set(cursorDot, { x: dotX, y: dotY });
            bgX += (mouseX - bgX) * 0.1; bgY += (mouseY - bgY) * 0.1;
            gsap.set(cursorBg, { x: bgX, y: bgY });
        });



        // --- ABLY CHAT LOGIC ---
        const ably = new Ably.Realtime('I2GocA.2XM7TQ:nuJQeyu7st5NRAjpGZKS00fjwc4qbCRGioyS_ERGTdc');
        const globalChan = ably.channels.get('global-hub');

        let me = localStorage.getItem('rbx_user');
        if (!me) { me = "Guest" + Math.floor(Math.random() * 1000); localStorage.setItem('rbx_user', me); }
        let mode = 'global'; let target = null;

        window.onload = () => {
            const user = localStorage.getItem('rbx_user');
            if (!user) {
                document.getElementById('login-gate').style.display = 'flex';
                return;
            }
            me = user;

            // INITIAL GSAP ANIMATIONS
            gsap.from('.sidebar', { x: -300, opacity: 0, duration: 1, ease: 'power4.out' });
            gsap.from('.side-head', { y: -20, opacity: 0, duration: 0.8, delay: 0.4, ease: 'power2.out' });
            gsap.from('.chat-head', { y: -50, opacity: 0, duration: 1, delay: 0.2, ease: 'expo.out' });
            gsap.from('.input-box', { y: 100, opacity: 0, duration: 1, delay: 0.3, ease: 'expo.out' });

            globalChan.subscribe('msg', (m) => {
                if (mode === 'global') render(m.data);
                if (m.data.user !== me) addList(m.data.user, m.data.pic);
            });
            globalChan.history({ limit: 30 }, (err, page) => {
                if (!err) page.items.reverse().forEach(m_item => render(m_item.data));
            });

            // --- PRESENCE LOGIC ---
            globalChan.presence.enter({ user: me, pic: localStorage.getItem('rbx_pic'), status: 'Online' });
            globalChan.presence.subscribe(() => {
                globalChan.presence.get((err, members) => {
                    const list = document.getElementById('online-list');
                    list.innerHTML = '';
                    document.getElementById('member-count').innerText = members.length;
                    members.forEach(m => {
                        const isVer = window.isVerified && window.isVerified(m.data.user);
                        const d = document.createElement('div');
                        d.className = 'user-link interactable';
                        d.innerHTML = `
                            <div style="position:relative;">
                                <img src="${m.data.pic || 'https://via.placeholder.com/32'}" style="width:32px; height:32px; border-radius:50%; object-fit:cover;">
                                <div style="width:10px; height:10px; background:#43b581; border:2px solid var(--panel); border-radius:50%; position:absolute; bottom:0; right:0;"></div>
                            </div>
                            <div style="display:flex; flex-direction:column;">
                                <span style="font-weight:700; font-size:0.85rem; color:#fff; display:flex; align-items:center; gap:4px;">
                                    ${m.data.user}
                                    ${isVer ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="#00A2FF"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : ''}
                                </span>
                                <span style="font-size:0.65rem; color:#888;">${m.data.status || 'Active'}</span>
                            </div>`;
                        d.onclick = () => showProfileSummary(m.data.user);
                        list.appendChild(d);
                    });
                });
            });

            // --- AUTO-DM FROM URL ---
            const urlParams = new URLSearchParams(window.location.search);
            const dmUser = urlParams.get('dm');
            if (dmUser) setMode('dm', dmUser);

            ably.channels.get('dm-' + me).subscribe('priv', (m) => {
                const sender = m.data.user;
                addList(sender, m.data.pic);
                persistDM(sender, m.data);
                if (mode === 'dm' && target === sender) render(m.data);
                else if (window.showNotification) showNotification(`New Transmission from @${sender}`);
            });
        };

        function addList(u, p) {
            if (document.getElementById('u-' + u)) return;
            const d = document.createElement('div');
            d.id = 'u-' + u; d.className = 'user-link interactable'; d.onclick = () => setMode('dm', u);
            d.innerHTML = `<img src="${p || 'https://via.placeholder.com/30'}" style="width:30px; height:30px; border-radius:50%; object-fit:cover;"> ${u}`;
            document.getElementById('dm-list').appendChild(d);
            gsap.from(d, { x: -50, opacity: 0, duration: 0.8, ease: "power3.out" });
        }

        function render(d) {
            const b = document.getElementById('msgs');
            const isMe = d.user === me;
            const msgId = 'm-' + (d.time || Math.random());
            
            const div = document.createElement('div');
            div.className = 'bubble';
            div.id = msgId;

            const isVerifiedUser = window.isVerified && window.isVerified(d.user);
            const isAdminUser = window.isAdmin && window.isAdmin(me);
            const timeStr = new Date(d.time || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            div.innerHTML = `
                <img src="${d.pic || 'https://via.placeholder.com/40'}" class="msg-pfp" onclick="showProfileSummary('${d.user}')">
                <div class="msg-content">
                    <div class="msg-meta" style="display:flex; align-items:center; gap:8px;">
                        <span class="msg-user" onclick="showProfileSummary('${d.user}')">${d.user}</span>
                        ${isVerifiedUser ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="#00A2FF"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : ''}
                        <span class="msg-time" style="font-size:0.7rem; color:#555;">${timeStr}</span>
                    </div>
                    <div class="msg-text" id="${msgId}-text" style="color:#dcddde; font-size:0.95rem;">${d.text}</div>
                    <div class="msg-actions" style="position:absolute; right:20px; top:-10px; display:none; background:#111; border:1px solid #333; border-radius:4px; padding:2px 8px; gap:8px; z-index:100;">
                        ${(isMe || isAdminUser) ? `
                            <div class="interactable" onclick="editMsg('${msgId}', '${encodeURIComponent(JSON.stringify(d))}')" style="cursor:pointer; opacity:0.6;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
                            <div class="interactable" onclick="deleteMsg('${msgId}')" style="cursor:pointer; opacity:0.6;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>
                        ` : ''}
                        <div class="interactable" onclick="saveMsg('${msgId}', '${encodeURIComponent(JSON.stringify(d))}')" style="cursor:pointer; opacity:0.6;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>
                    </div>
                </div>`;

            div.onmouseenter = () => { if(div.querySelector('.msg-actions')) div.querySelector('.msg-actions').style.display = 'flex'; };
            div.onmouseleave = () => { if(div.querySelector('.msg-actions')) div.querySelector('.msg-actions').style.display = 'none'; };

            b.appendChild(div);
            window.requestAnimationFrame(() => b.scrollTop = b.scrollHeight);
        }

        function deleteMsg(id) {
            if (confirm("Permanently delete this transmission?")) {
                document.getElementById(id).style.background = '#320000';
                gsap.to(`#${id}`, { scale: 0.8, opacity: 0, duration: 0.6, onComplete: () => document.getElementById(id).remove() });
                // Push deletion event (could push to an 'admin-actions' channel)
            }
        }

        function editMsg(id, dataRaw) {
            const data = JSON.parse(decodeURIComponent(dataRaw));
            const newText = prompt("Revise transmission data:", data.text);
            if (newText && newText !== data.text) {
                document.getElementById(id + '-text').innerText = newText + " (revised)";
                // Push edit event
            }
        }

        function saveMsg(id, dataRaw) {
            const data = JSON.parse(decodeURIComponent(dataRaw));
            let saved = JSON.parse(localStorage.getItem('nexus_saved_msgs') || '[]');
            saved.push(data);
            localStorage.setItem('nexus_saved_msgs', JSON.stringify(saved));

            const icon = document.getElementById(id).querySelector('svg');
            icon.setAttribute('fill', 'var(--accent)');
            gsap.to(icon, { scale: 1.5, duration: 0.3, yoyo: true, repeat: 1 });
        }

        // --- DM PERSISTENCE ---
        function persistDM(u, d) {
            const key = `dm_history_${u}`;
            let history = JSON.parse(localStorage.getItem(key) || '[]');
            history.push(d);
            localStorage.setItem(key, JSON.stringify(history));

            // Track active DMs
            let dmUsers = JSON.parse(localStorage.getItem('nexus_dm_users') || '[]');
            if (!dmUsers.includes(u)) {
                dmUsers.push(u);
                localStorage.setItem('nexus_dm_users', JSON.stringify(dmUsers));
            }
        }

        function loadDMHistory(u) {
            const history = JSON.parse(localStorage.getItem(`dm_history_${u}`) || '[]');
            history.forEach(render);
        }

        async function promptNewDM() {
            const u = prompt("Enter username of the recipient:");
            if (u && u.trim() !== me) {
                const exists = await window.checkIfUserExists(u.trim());
                if(!exists) {
                    if (window.showTopNotification) window.showTopNotification(`USER NOT FOUND: ${u}`, 'error');
                    return;
                }
                addList(u.trim());
                setMode('dm', u.trim());
            }
        }

        window.sendFriendRequest = async function(u) {
            if (window.supabaseClient) {
                try {
                    await window.supabaseClient.from('friend_requests').insert([{
                        from_user: me,
                        to_user: u,
                        status: 'pending'
                    }]);
                    if (window.showTopNotification) window.showTopNotification(`FRIEND REQUEST SENT TO @${u}`);
                } catch (e) {
                    console.error("Cloud Error:", e);
                    if (window.showTopNotification) window.showTopNotification(`REQUEST FAILED. Check network stability.`, 'error');
                }
            }
        }

        function setStatus() {
            const s = prompt("Broadcast your current status to the network:");
            if (s) {
                globalChan.presence.update({ user: me, pic: localStorage.getItem('rbx_pic'), status: s });
                if (window.showNotification) showNotification(`Status updated to: ${s}`);
            }
        }

        function setMode(m, u = null) {
            mode = m; target = u;
            document.getElementById('msgs').innerHTML = '';
            document.getElementById('chat-title').innerText = m === 'global' ? '# Global Hub' : (m === 'saved' ? '★ Bookmarks' : '@ ' + u);

            if (m === 'saved') {
                const saved = JSON.parse(localStorage.getItem('nexus_saved_msgs') || '[]');
                saved.forEach(render);
            } else if (m === 'global') {
                globalChan.history({ limit: 30 }, (err, page) => {
                    if (!err) page.items.reverse().forEach(m_item => render(m_item.data));
                });
            } else if (m === 'dm') {
                loadDMHistory(u);
            }
            gsap.from('#chat-title', { opacity: 0, x: -20, duration: 0.5 });
        }

        function send() {
            const i = document.getElementById('mIn'); if (!i.value.trim()) return;
            const d = { user: me, text: i.value, pic: localStorage.getItem('rbx_pic'), time: Date.now() };
            if (mode === 'global') {
                globalChan.publish('msg', d);
            } else {
                ably.channels.get('dm-' + target).publish('priv', d);
                persistDM(target, d);
                render(d);
            }
            i.value = '';
        }

        // Add subscribers for saved DM users
        function initDMList() {
            const dmUsers = JSON.parse(localStorage.getItem('nexus_dm_users') || '[]');
            dmUsers.forEach(u => addList(u));
        }
        initDMList();

        initDMList();
    </script>
</body>

</html>
