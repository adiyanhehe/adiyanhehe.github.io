<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus | CONTROL CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Load Core Dependencies Synchronously to ensure availability -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #030303;
            --surface: rgba(255, 255, 255, 0.02);
            --panel: #0a0a0a;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b8c8f;
            --accent: #ff3366;
            --transition: cubic-bezier(0.76, 0, 0.24, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; cursor: auto !important; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Outfit', sans-serif; overflow: hidden; display: flex; height: 100vh; }
        
        .preloader { position: fixed; inset: 0; background: #000; z-index: 10000000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
        .gate { position: fixed; inset: 0; background: #000; z-index: 9999999; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px; }
        .nav-btn { background: transparent; color: var(--text-muted); border: none; padding: 15px 0; border-bottom: 1px solid var(--border); text-align: left; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .nav-btn.active { color: #fff; border-bottom-color: #fff; }
        
        .main { flex: 1; padding: 60px; overflow-y: auto; }
        .section-view { display: none; }
        .section-view.active { display: block; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 30px; border-radius: 12px; margin-bottom: 20px; }
        
        .btn { background: #fff; color: #000; border: none; padding: 12px 25px; border-radius: 100px; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; }
        .btn:hover { background: var(--accent); color: #fff; }
        
        #toast { position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 15px 40px; border-radius: 100px; font-weight: 900; transition: 0.5s; z-index: 10000003; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; text-align: left; }
    </style>
    <script src="global.js"></script>
</head>
<body>

    <div class="preloader" id="preloader">
        <h1 style="letter-spacing:10px; font-weight:900;">NEXUS_COMMAND</h1>
        <p style="opacity:0.2; font-size:0.7rem; margin-top:10px;">ESTABLISHING_CORE_HANDSHAKE...</p>
    </div>

    <div class="gate" id="gate">
        <h2 style="font-size:3rem; font-weight:900; color:var(--accent); margin-bottom:10px;">CORE_RESTRICTED</h2>
        <p style="color:#666; margin-bottom:30px;">Direct access restricted to authorized CORE_ADMINS only.</p>
        <button class="btn" style="margin-bottom:10px; min-width:260px;" onclick="window.loginNexus('google')">Sign In with Google</button>
        <button class="btn" style="background:#5865F2; color:#fff; min-width:260px;" onclick="window.loginNexus('discord')">Sign In with Discord</button>
        <button class="btn" style="background:transparent; color:#666; margin-top:20px;" onclick="location.href='index.html'">ABORT_EXIT</button>
    </div>

    <div class="sidebar">
        <h2 style="font-weight:900; color:var(--accent); margin-bottom:40px;">COMMAND</h2>
        <button class="nav-btn" onclick="show('threads')">Threads</button>
        <button class="nav-btn" onclick="show('users')">Users</button>
        <button class="nav-btn" onclick="show('reports')">Reports</button>
        <button class="nav-btn" onclick="show('config')">Config</button>
        <button class="nav-btn" style="margin-top:auto;" onclick="location.href='index.html'">EXIT_CORE</button>
    </div>

    <div class="main">
        <div id="v-threads" class="section-view active">
            <h2 style="font-size:3rem; font-weight:900; margin-bottom:30px;">THREADS.</h2>
            <div class="card"><table id="t-threads"><thead><tr><th>User</th><th>Content</th><th>Action</th></tr></thead><tbody id="l-threads"></tbody></table></div>
        </div>
        <div id="v-users" class="section-view">
            <h2 style="font-size:3rem; font-weight:900; margin-bottom:30px;">ENTITIES.</h2>
            <div class="card"><table id="t-users"><thead><tr><th>User</th><th>Verified</th><th>Admin</th><th>Actions</th></tr></thead><tbody id="l-users"></tbody></table></div>
        </div>
        <div id="v-reports" class="section-view">
            <h2 style="font-size:3rem; font-weight:900; margin-bottom:30px;">INCIDENTS.</h2>
            <div class="card"><table id="t-reports"><thead><tr><th>Target</th><th>Reporter</th><th>Reason</th><th>Action</th></tr></thead><tbody id="l-reports"></tbody></table></div>
        </div>
        <div id="v-config" class="section-view">
            <h2 style="font-size:3rem; font-weight:900; margin-bottom:30px;">SYSTEM.</h2>
            <div class="card">
                <input type="text" id="bc-text" placeholder="Global Directive Content...">
                <button class="btn" onclick="broadcast()">Execute Broadcast</button>
                <button class="btn" style="background:var(--accent); color:#fff; margin-left:10px;" onclick="lockdown()">Lockdown site</button>
            </div>
        </div>
    </div>

    <div id="toast">Directive Processed.</div>

    <script>
        const API_KEY = 'I2GocA.2XM7TQ:nuJQeyu7st5NRAjpGZKS00fjwc4qbCRGioyS_ERGTdc';
        let ably = null;

        // --- AUTH FLOW ---
        async function init() {
            try {
                // Ensure Supabase Client exists
                if (!window.supabaseClient) { 
                    if (window.supabase && typeof window.supabase.createClient === 'function') {
                        window.supabaseClient = window.supabase.createClient('https://qpbjxurwrzsatwfiqcdd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwYmp4dXJ3cnpzYXR3ZmlxY2RkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNTEzNjQsImV4cCI6MjA4NjgyNzM2NH0.2fee2Tke8VDwYCl8ba7wR8iLdOleHAhtO3oP17NhEOA');
                    } else {
                        setTimeout(init, 500); return;
                    }
                }

                // Remove preloader fast
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(() => document.getElementById('preloader').remove(), 500);

                const { data: { session } } = await window.supabaseClient.auth.getSession();
                const user = localStorage.getItem('rbx_user');
                const email = session?.user?.email;

                if (window.isAdmin && window.isAdmin(user, email)) {
                    document.getElementById('gate').style.display = 'none';
                    startDash();
                } else {
                    document.getElementById('gate').style.display = 'flex';
                }

                // Auth Listener for real-time unlock
                window.supabaseClient.auth.onAuthStateChange((ev) => { if (ev === 'SIGNED_IN') location.reload(); });
            } catch (e) {
                console.error(e); document.getElementById('preloader')?.remove();
                document.getElementById('gate').style.display = 'flex';
            }
        }

        function startDash() {
            ably = new Ably.Realtime(API_KEY);
            refresh();
            setInterval(refresh, 60000);
        }

        function show(id) {
            document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(event && event.target) event.target.classList.add('active');
        }

        function refresh() { fetchThreads(); fetchUsers(); fetchReports(); }

        async function fetchThreads() {
            const { data } = await window.supabaseClient.from('threads').select('*').order('timestamp', { ascending: false }).limit(20);
            const l = document.getElementById('l-threads'); l.innerHTML = '';
            if(data) data.forEach(t => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><b>@${t.author}</b></td><td>${t.content}</td><td><button class="btn" style="padding:5px 12px; background:#440000; color:#fff;" onclick="delThread('${t.id}')">Erase</button></td>`;
                l.appendChild(tr);
            });
        }

        async function fetchUsers() {
            const { data } = await window.supabaseClient.from('profiles').select('*').order('created_at', { ascending: false }).limit(100);
            const l = document.getElementById('l-users'); l.innerHTML = '';
            if(data) data.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>@${u.username}</td><td>${u.is_verified ? '✅' : '❌'}</td><td>${u.is_admin ? '<span style="color:var(--accent);">CORE</span>' : 'ENTITY'}</td><td><button class="btn" style="padding:5px 10px;" onclick="promote('${u.id}', ${!u.is_admin})">${u.is_admin ? 'Demote' : 'Promote'}</button></td>`;
                l.appendChild(tr);
            });
        }

        async function fetchReports() {
            const { data } = await window.supabaseClient.from('reports').select('*').limit(20);
            const l = document.getElementById('l-reports'); l.innerHTML = '';
            if(data) data.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>@${r.data?.offender}</td><td>@${r.reporter}</td><td>${r.data?.content || ''}</td><td><button class="btn" onclick="purge('${r.data?.offender}')">WIPE_USER</button></td>`;
                l.appendChild(tr);
            });
        }

        async function delThread(id) { await window.supabaseClient.from('threads').delete().eq('id', id); refresh(); toast("Thread Deleted."); }
        async function promote(id, st) { await window.supabaseClient.from('profiles').update({ is_admin: st }).eq('id', id); refresh(); toast("Level Updated."); }
        async function purge(u) { if(confirm(`Purge @${u}?`)) { await window.supabaseClient.from('threads').delete().eq('author', u); toast("Entities Wiped."); } }

        function broadcast() { const v = document.getElementById('bc-text').value; if(v && ably) ably.channels.get('site-global-config').publish('config_update', { action: 'announcement', value: v }); toast("Broadcast Dispatched."); }
        function lockdown() { if(confirm("Initiate Shutdown?")) ably.channels.get('site-global-config').publish('config_update', { action: 'maintenance', value: true }); }
        
        function toast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.bottom = '40px'; setTimeout(() => t.style.bottom = '-80px', 3000); }

        window.onload = init;
    </script>
</body>
</html>
