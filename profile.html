<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile // Nexus Network</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Poppins:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Design System -->
    <link rel="stylesheet" href="discuss.css">
    <style>
        .profile-workspace {
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .profile-banner {
            height: 200px;
            border-radius: var(--radius-xl);
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
            position: relative;
            margin-bottom: 70px;
            border: 1px solid var(--border-strong);
            box-shadow: var(--shadow-md);
        }

        .profile-avatar-wrap {
            position: absolute;
            bottom: -50px;
            left: 40px;
            z-index: 10;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            border: 8px solid var(--bg-panel);
            background: var(--bg-panel-strong);
            box-shadow: var(--shadow-lg);
            object-fit: cover;
        }

        .profile-header-meta {
            padding-left: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
        }

        .profile-name-stack h1 {
            font-size: 2.2rem;
            margin: 0;
            font-family: var(--font-display);
            font-weight: 900;
        }

        .profile-handle {
            color: var(--accent);
            font-weight: 700;
            font-size: 1rem;
        }

        .profile-bio {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 32px;
            max-width: 600px;
        }

        .profile-stats {
            display: flex;
            gap: 24px;
            padding: 24px;
            background: var(--bg-panel-soft);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-soft);
        }

        /* Tabs */
        .profile-tabs {
            display: flex;
            gap: 32px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .profile-tab {
            padding: 12px 4px;
            font-weight: 700;
            cursor: pointer;
            color: var(--text-soft);
            position: relative;
            transition: var(--transition);
        }

        .profile-tab.active {
            color: var(--text-main);
        }

        .profile-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
        }

        /* Modal Overrides */
        .edit-modal-box {
            width: 440px;
            background: var(--bg-panel-strong);
            padding: 32px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-strong);
            box-shadow: var(--shadow-lg);
        }
        
        .modal-input {
            width: 100%;
            background: var(--bg-panel-soft);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            color: var(--text-main);
            margin-bottom: 20px;
            outline: none;
            transition: var(--transition);
        }
        
        .modal-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(123, 140, 255, 0.15);
        }
        
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .messenger-app.profile-layout {
            grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
        }

        @media (max-width: 1180px) {
            .messenger-app.profile-layout {
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow-y: auto;
            }
            .profile-layout .sidebar {
                display: none; /* Hide sidebar on mobile profile for now or create a mobile nav */
            }
        }
    </style>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="messenger-app profile-layout">
    <script src="global.js"></script>

    <!-- Sidebar Injected from Pulse System -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="brand-lockup" style="margin-bottom: 32px;">
                <div class="brand-mark">NX</div>
                <div>
                    <p class="eyebrow">User Record</p>
                    <h1>Profile</h1>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-button" onclick="location.href='discuss.html'">
                    <span class="nav-button-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
                    <span class="nav-button-copy"><strong>Pulse</strong><small>Messages</small></span>
                </button>
                <button class="nav-button" onclick="location.href='threads.html'">
                    <span class="nav-button-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10z"/></svg></span>
                    <span class="nav-button-copy"><strong>Threads</strong><small>Feed</small></span>
                </button>
                <button class="nav-button active" onclick="window.goToMyProfile()">
                    <span class="nav-button-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                    <span class="nav-button-copy"><strong>Identity</strong><small>Settings</small></span>
                </button>
            </nav>
        </div>
    </aside>

    <section class="workspace" style="overflow-y: auto;">
        <div class="profile-workspace">
            <!-- Banner -->
            <div id="banner-ui" class="profile-banner">
                <div class="profile-avatar-wrap">
                    <img id="pfp-ui" class="profile-avatar" src="jay.png">
                </div>
            </div>

            <!-- Meta Header -->
            <div class="profile-header-stack">
                <div class="profile-header-meta">
                    <div class="profile-name-stack">
                        <h1 id="name-ui">Entity ...</h1>
                        <span id="handle-ui" class="profile-handle">@nexus_guest</span>
                    </div>
                    <div id="action-slot">
                        <!-- Follow or Edit button -->
                    </div>
                </div>

                <div id="bio-ui" class="profile-bio">
                    Synchronizing identity from Nexus cloud...
                </div>

                <div class="profile-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="stat-followers">0</span>
                        <span class="stat-label">Followers</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-following">0</span>
                        <span class="stat-label">Following</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-reputation">0</span>
                        <span class="stat-label">Reputation</span>
                    </div>
                </div>

                <nav class="profile-tabs">
                    <div class="profile-tab active">Broadcasts</div>
                    <div class="profile-tab">Connections</div>
                </nav>

                <div id="posts-feed">
                    <!-- Posts load here -->
                </div>
            </div>
        </div>
    </section>

    <!-- Unified Edit Modal -->
    <div id="edit-modal" class="modal-backdrop hidden" style="display: none;">
        <div class="edit-modal-box">
            <h2 style="margin-top: 0; font-family: var(--font-display);">Edit Identity</h2>
            <p style="color: var(--text-soft); font-size: 0.9rem; margin-bottom: 24px;">Update your global profile metadata.</p>
            
            <label class="stat-label">Display Name</label>
            <input type="text" id="m-name" class="modal-input" placeholder="Display Name">
            
            <label class="stat-label">Avatar URL</label>
            <input type="text" id="m-pfp" class="modal-input" placeholder="https://...">
            
            <label class="stat-label">Transmission (Bio)</label>
            <textarea id="m-bio" class="modal-input" rows="3" placeholder="Identify your status..."></textarea>
            
            <div style="display: flex; gap: 12px; margin-top: 8px;">
                <button class="send-button" style="flex: 1;" onclick="saveIdentity()">Update Record</button>
                <button class="nav-button" style="background: var(--bg-panel-soft);" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let user = params.get('user');
        if (user) user = user.toLowerCase();
        const me_raw = localStorage.getItem('rbx_user');
        const me = me_raw ? me_raw.toLowerCase() : null;

        async function initProfile() {
            // 1. Wait for Supabase
            let attempts = 0;
            while (!window.supabaseClient && attempts < 20) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }

            // 2. Resolve 'me' identifier
            let currentMe = localStorage.getItem('rbx_user');
            if (!currentMe && window.supabaseClient) {
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                if (session) currentMe = session.user.email.split('@')[0];
            }
            if (currentMe) currentMe = currentMe.toLowerCase();

            if (!user) {
                user = currentMe;
                if (!user) { location.href = 'index.html'; return; }
                location.href = `profile.html?user=${encodeURIComponent(user)}`;
                return;
            }

            renderIdentity();
            await fetchCloudData();
            await fetchSocialStats();
            await loadUserPosts();
        }

        function renderIdentity() {
            document.getElementById('name-ui').innerText = user;
            document.getElementById('handle-ui').innerText = '@' + user.toLowerCase();
            setupActions();
        }

        function setupActions() {
            const slot = document.getElementById('action-slot');
            if (user === me) {
                slot.innerHTML = `<button class="nav-button active" onclick="openEditModal()">Edit Profile</button>`;
            } else if (me) {
                slot.innerHTML = `<button id="follow-btn" class="send-button" onclick="toggleFollow()">Follow</button>`;
                checkFollowStatus();
            }
        }

        async function fetchCloudData() {
            if (!window.supabaseClient) { setTimeout(fetchCloudData, 500); return; }
            const { data } = await window.supabaseClient.from('profiles').select('*').eq('username', user).maybeSingle();
            if (data) {
                document.getElementById('name-ui').innerText = data.display_name || user;
                if (data.bio) document.getElementById('bio-ui').innerText = data.bio;
                if (data.avatar_url) document.getElementById('pfp-ui').src = data.avatar_url;
                if (data.banner_url) document.getElementById('banner-ui').style.background = `url(${data.banner_url}) center/cover`;
            }
        }

        async function fetchSocialStats() {
            const { count: followers } = await window.supabaseClient.from('follows').select('*', { count: 'exact', head: true }).eq('following', user);
            const { count: following } = await window.supabaseClient.from('follows').select('*', { count: 'exact', head: true }).eq('follower', user);
            
            document.getElementById('stat-followers').innerText = followers || 0;
            document.getElementById('stat-following').innerText = following || 0;
        }

        async function loadUserPosts() {
            const feed = document.getElementById('posts-feed');
            const { data } = await window.supabaseClient.from('threads').select('*').eq('author', user).order('timestamp', { ascending: false });
            
            if (!data || data.length === 0) {
                feed.innerHTML = `<div style="padding: 60px; text-align: center; color: var(--text-soft);">No transmissions found in archive.</div>`;
                return;
            }

            feed.innerHTML = data.map(t => `
                <div class="thread-item" style="padding: 24px; background: var(--bg-panel-soft); border-radius: var(--radius-xl); border: 1px solid var(--border); margin-bottom: 16px;">
                    <div style="font-size: 1.1rem; margin-bottom: 8px;">${t.content}</div>
                    <div style="font-size: 0.75rem; color: var(--text-soft);">${new Date(t.timestamp).toLocaleString()}</div>
                </div>
            `).join('');
        }

        window.openEditModal = () => {
            const modal = document.getElementById('edit-modal');
            modal.style.display = 'flex';
            modal.classList.remove('hidden');
        };

        window.closeEditModal = () => {
            document.getElementById('edit-modal').style.display = 'none';
        };

        async function saveIdentity() {
            const dName = document.getElementById('m-name').value;
            const pfp = document.getElementById('m-pfp').value;
            const bio = document.getElementById('m-bio').value;

            const { error } = await window.supabaseClient.from('profiles').update({
                display_name: dName,
                avatar_url: pfp,
                bio: bio,
                updated_at: new Date().toISOString()
            }).eq('username', me);

            if (error) alert("Sync failed: " + error.message);
            else location.reload();
        }

        async function checkFollowStatus() {
            const { data } = await window.supabaseClient.from('follows').select('*').eq('follower', me).eq('following', user).maybeSingle();
            const btn = document.getElementById('follow-btn');
            if (data) {
                btn.innerText = 'Unfollow';
                btn.style.background = 'var(--bg-panel-soft)';
                btn.style.color = 'var(--text-main)';
            }
        }

        async function toggleFollow() {
            const btn = document.getElementById('follow-btn');
            const isFollowing = btn.innerText === 'Unfollow';
            
            if (isFollowing) {
                await window.supabaseClient.from('follows').delete().eq('follower', me).eq('following', user);
            } else {
                await window.supabaseClient.from('follows').insert([{ follower: me, following: user }]);
            }
            location.reload();
        }

        initProfile();
    </script>
</body>
</html>
