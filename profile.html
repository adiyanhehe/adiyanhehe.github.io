<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identity // Nexus Network</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="global.js" defer></script>
    
    <style>
        :root {
            --bg: #020306;
            --surface: #0a0b10;
            --panel: rgba(12, 14, 22, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00A2FF;
            --accent-glow: rgba(0, 162, 255, 0.3);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4);
            --radius-lg: 32px;
            --radius-md: 18px;
            --font: 'Outfit', sans-serif;
            --glass: blur(40px);
        }

        * { margin:0; padding:0; box-sizing:border-box; outline: none; }
        body { background: var(--bg); color: var(--text-main); font-family: var(--font); overflow-x: hidden; height: 100vh; display: flex; }

        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(255, 255, 255, 0.02); z-index: 999999; pointer-events: none; animation: scan 8s linear infinite; }
        @keyframes scan { from { top: -10%; } to { top: 110%; } }

        /* Sidebar Re-themed */
        .sidebar { width: 300px; height: 100%; background: rgba(5, 6, 12, 0.95); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 25px; z-index: 1000; backdrop-filter: var(--glass); }
        .nav-btn { padding: 18px 25px; border-radius: 20px; color: var(--text-muted); text-decoration: none; font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); cursor: pointer; text-transform: uppercase; letter-spacing: 2px; background: transparent; border:none; width: 100%; text-align: left;}
        .nav-btn:hover { color: #fff; background: rgba(255,255,255,0.04); transform: translateX(8px); }
        .nav-btn.active { color: #fff; background: var(--accent); box-shadow: 0 10px 40px var(--accent-glow); transform: scale(1.02); }
        .nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; }

        /* Main Workspace */
        .main { flex: 1; height: 100%; overflow-y: auto; position: relative; scroll-behavior: smooth; }
        .profile-container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }

        /* High-End Profile Block */
        .identity-header { position: relative; margin-bottom: 50px; }
        .banner { height: 240px; border-radius: 40px; background: linear-gradient(135deg, #001, #004); position: relative; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 20px 80px rgba(0,0,0,0.5); }
        .banner-ambient { position: absolute; inset:0; background: radial-gradient(circle at 70% 30%, var(--accent-glow), transparent); opacity: 0.5; }
        
        .pfp-wrap { position: absolute; bottom: -75px; left: 40px; z-index: 10; }
        .pfp-img { width: 150px; height: 150px; border-radius: 40px; border: 10px solid var(--bg); background: var(--surface); object-fit: cover; box-shadow: 0 30px 60px rgba(0,0,0,1); }
        .status-dot { width: 34px; height: 34px; background: #00ffaa; border: 6px solid var(--bg); border-radius: 50%; position: absolute; bottom: 8px; right: 8px; box-shadow: 0 0 25px rgba(0,255,170,0.5); display: none; z-index: 11; }

        .profile-meta-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 100px; margin-bottom: 30px; position: relative; }
        .name-stack h1 { font-size: 3rem; font-weight: 950; letter-spacing: -2px; margin-bottom: 2px; }
        .name-stack p { color: var(--accent); font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; }
        
        /* Stats System */
        .stat-grid { display: flex; gap: 30px; background: var(--panel); border: 1px solid var(--border); padding: 30px 40px; border-radius: var(--radius-lg); backdrop-filter: var(--glass); margin-bottom: 40px; transition: 0.4s; }
        .stat-grid:hover { border-color: var(--accent); transform: translateY(-5px); }
        .stat { display: flex; flex-direction: column; gap: 5px; }
        .stat span:first-child { font-size: 1.8rem; font-weight: 950; color: #fff; letter-spacing: -1px; }
        .stat span:last-child { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }

        /* Description */
        .bio-box { font-size: 1.15rem; line-height: 1.6; color: rgba(255,255,255,0.7); margin-bottom: 50px; max-width: 700px; font-weight: 300; }

        /* Tabs */
        .tabs { display: flex; gap: 40px; margin-bottom: 40px; border-bottom: 1px solid var(--border); }
        .tab { padding: 15px 5px; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); cursor: pointer; position: relative; transition: 0.3s; }
        .tab.active { color: #fff; }
        .tab.active::after { content:''; position:absolute; bottom: -1px; left:0; width:100%; height:3px; background: var(--accent); filter: drop-shadow(0 0 10px var(--accent)); border-radius: 5px; }

        /* Feed Items */
        .feed-item { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 35px; margin-bottom: 24px; backdrop-filter: var(--glass); transition: 0.3s; animation: reveal 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; opacity: 0; }
        .feed-item:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.03); }
        @keyframes reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Buttons */
        .btn { padding: 16px 32px; border-radius: 18px; font-weight: 950; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1); display: inline-flex; align-items:center; gap:12px; border: 1px solid var(--border); background:rgba(255,255,255,0.05); color:#fff; }
        .btn:hover { background: #fff; color: #000; transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn.primary:hover { background: #fff; color: #000; }

        /* Modal REBUILD */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(60px); opacity: 0; transition: 0.4s; }
        .modal.open { display: flex; opacity: 1; }
        .modal-inner { background: #000; border: 2px solid var(--border); padding: 60px; border-radius: 40px; width: 600px; max-width: 95vw; transform: scale(0.9) translateY(40px); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .modal.open .modal-inner { transform: scale(1) translateY(0); }

        input, textarea { background: rgba(255,255,255,0.02); border: 2px solid var(--border); color: #fff; padding: 22px; border-radius: 18px; width: 100%; transition: 0.4s; font-family: inherit; font-size: 1.1rem; margin-bottom: 25px; }
        input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow); background: rgba(255,255,255,0.05); }
        label { display: block; font-size: 0.75rem; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px; }

        .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 950; text-transform: uppercase; letter-spacing: 2px; }
        .b-blue { background: rgba(0, 100, 255, 0.2); color: #0088ff; box-shadow: 0 0 10px rgba(0,162,255,0.3); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <aside class="sidebar">
        <div style="margin-bottom: 60px;">
            <div style="font-weight: 950; font-size: 1.5rem; letter-spacing: -2px; margin-bottom: 5px;">NEXUS<span style="color:var(--accent);">.</span>ID</div>
            <p style="font-size: 0.65rem; font-weight: 900; opacity: 0.4; text-transform: uppercase; letter-spacing: 3px;">System Identity Card</p>
        </div>
        <nav>
            <button class="nav-btn" onclick="location.href='index.html'"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Network Hub</button>
            <button class="nav-btn" onclick="location.href='discuss.html'"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Direct Pulse</button>
            <button class="nav-btn" onclick="location.href='threads.html'"><svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10z"/></svg> Broadcasts</button>
            <button class="nav-btn active"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Identity</button>
        </nav>
        <div style="margin-top: auto;">
            <button class="btn" style="width: 100%; border-radius: 18px;" onclick="window.logoutNexus?.()">Terminate Session</button>
        </div>
    </aside>

    <main class="main">
        <div class="profile-container">
            <section class="identity-header">
                <div id="banner-ui" class="banner">
                    <div class="banner-ambient"></div>
                </div>
                <div class="pfp-wrap">
                    <img id="pfp-ui" class="pfp-img" src="jay.png">
                    <div id="psm-status-dot" class="status-dot"></div>
                </div>

                <div class="profile-meta-row">
                    <div class="name-stack">
                        <div style="display:flex; align-items:center; gap:15px; margin-bottom:5px;">
                            <h1 id="name-ui">Awaiting Sync...</h1>
                            <div id="role-badge"></div>
                        </div>
                        <p id="handle-ui">@nexus_node</p>
                    </div>
                    <div id="action-slot"></div>
                </div>

                <div id="bio-ui" class="bio-box">
                    Establishing connection to Nexus Cloud Protocol...
                </div>

                <div class="stat-grid">
                    <div class="stat"><span id="stat-followers">0</span><span>Followers</span></div>
                    <div class="stat" style="width:1px; height:40px; background:var(--border); align-self:center;"></div>
                    <div class="stat"><span id="stat-following">0</span><span>Following</span></div>
                    <div class="stat" style="width:1px; height:40px; background:var(--border); align-self:center;"></div>
                    <div class="stat"><span id="stat-reputation">0</span><span>Reputation</span></div>
                </div>

                <nav class="tabs">
                    <div class="tab active" onclick="switchTab('posts', this)">Transmissions</div>
                    <div class="tab" onclick="switchTab('connections', this)">Connections</div>
                    <div class="tab" onclick="switchTab('about', this)">System Data</div>
                </nav>

                <div id="feed-root">
                    <!-- Dynamic Stream -->
                </div>
            </section>
        </div>
    </main>

    <!-- Identity Update Neural Interface -->
    <div id="edit-modal" class="modal">
        <div class="modal-inner">
            <h2 style="font-size: 2.5rem; font-weight: 950; letter-spacing: -2px; margin-bottom: 30px;">Update Identity</h2>
            
            <label>Communication Name</label>
            <input type="text" id="m-name" placeholder="User Alpha">
            
            <label>Visual Signature (Avatar URL)</label>
            <input type="text" id="m-pfp" placeholder="https://nexus.cloud/img.png">
            
            <label>Header Array (Banner URL)</label>
            <input type="text" id="m-banner" placeholder="https://nexus.cloud/banner.png">
            
            <label>Bio-Data (Transmission)</label>
            <textarea id="m-bio" rows="3" placeholder="Identify your status within the network..."></textarea>
            
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <button class="btn primary" style="flex: 1;" onclick="saveIdentity()">Sync to Cloud</button>
                <button class="btn" style="flex: 0.5;" onclick="closeM()">Abort</button>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let user = params.get('user')?.toLowerCase();

        const state = { me: null, profile: null, view: 'posts', sessionId: null };

        async function boot() {
            try {
                await window.supabaseReady;
            } catch(e) {
                if (!window.supabaseClient && window.supabase) {
                    window.supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
                }
                if (!window.supabaseClient) {
                    alert('PROTOCOL ERROR: Cloud link fractured. Manual refresh required.');
                    return;
                }
            }
            start();
        }

        async function start() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (session) {
                state.sessionId = session.user.id;
                const { data: p } = await window.supabaseClient.from('profiles').select('username').eq('id', session.user.id).maybeSingle();
                state.me = (p?.username || session.user.email.split('@')[0]).toLowerCase();
            }

            if (!user) {
                if (!state.me) { location.href='index.html'; return; }
                location.href = `profile.html?user=${encodeURIComponent(state.me)}`;
                return;
            }

            // Verify requested user actually exists before rendering (bug S11)
            if (window.checkIfUserExists) {
                const exists = await window.checkIfUserExists(user);
                if (!exists) {
                    document.querySelector('.profile-container').innerHTML = 
                        `<div style="padding:100px; text-align:center; font-weight:900; opacity:0.5;">USER NOT FOUND: @${esc(user)}</div>`;
                    return;
                }
            }

            await syncProfile();
            await syncStats();
            renderFeed();
        }

        async function syncProfile() {
            const { data, error } = await window.supabaseClient.from('profiles').select('*').eq('username', user).maybeSingle();
            if (data) {
                state.profile = data;
                document.getElementById('name-ui').innerText = data.display_name || user;
                document.getElementById('handle-ui').innerText = '@' + user;
                document.getElementById('bio-ui').innerText = data.bio || "This entity has not yet transmitted bio-data.";
                if (data.avatar_url) document.getElementById('pfp-ui').src = data.avatar_url;
                if (data.banner_url) document.getElementById('banner-ui').style.background = `url(${data.banner_url}) center/cover`;
                
                const rb = document.getElementById('role-badge');
                if (data.role === 'admin' || data.is_admin) rb.innerHTML = `<span class="badge b-blue">OVERSEER</span>`;
                else if (data.role === 'moderator') rb.innerHTML = `<span class="badge" style="background:rgba(0,255,170,0.1); color:#00ffaa;">GUARDIAN</span>`;
                
                setupActions();
            }
        }

        function setupActions() {
            const slot = document.getElementById('action-slot');
            if (state.me === user) {
                slot.innerHTML = `<button class="btn primary" onclick="openM()">Edit Identity</button>`;
            } else if (state.me) {
                slot.innerHTML = `
                    <button id="follow-btn" class="btn primary" onclick="toggleFollow()">Connect</button>
                    <button class="btn" onclick="location.href='discuss.html?dm=${encodeURIComponent(user)}'">Message</button>
                `;
                checkFollow();
            } else {
                slot.innerHTML = `<button class="btn primary" onclick="location.href='auth.html'">Login to Connect</button>`;
            }
        }

        async function renderFeed() {
            const root = document.getElementById('feed-root');
            root.innerHTML = `<div style="padding:100px; text-align:center; opacity:0.5;">Scanning transmission history...</div>`;
            
            if (state.view === 'posts') {
                const { data } = await window.supabaseClient.from('threads').select('*').eq('author', user).order('timestamp', { ascending: false });
                if (!data || data.length === 0) {
                    root.innerHTML = `<div style="padding:100px; text-align:center; opacity:0.3; font-weight:900; letter-spacing:2px;">NO CLOUD SIGNALS DETECTED</div>`;
                    return;
                }
                root.innerHTML = data.map(t => `
                    <div class="feed-item">
                        <div style="font-size:1.2rem; line-height:1.6; margin-bottom:20px;">${esc(t.content)}</div>
                        ${t.media_url ? `<img src="${t.media_url}" style="width:100%; border-radius:20px; border:1px solid var(--border); margin-bottom:20px;">` : ''}
                        <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); padding-top:20px;">
                            <div style="font-size:0.7rem; color:var(--text-muted); font-weight:800;">TIMESTAMP: ${new Date(t.timestamp).toLocaleString()}</div>
                            <div style="display:flex; gap:20px; font-weight:950; font-size:0.75rem;">
                                <span style="color:var(--accent)">${t.likes || 0} LIKES</span>
                                <span style="opacity:0.5">${t.replies || 0} REPLIES</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else if (state.view === 'connections') {
                const { data } = await window.supabaseClient.from('follows').select('following').eq('follower', user);
                const ids = data?.map(x => x.following) || [];
                if (ids.length === 0) { root.innerHTML = `<div style="padding:100px; text-align:center; opacity:0.3; font-weight:950;">ISOLATED NODE</div>`; return; }

                const BATCH = 100;
                const chunks = [];
                for (let i = 0; i < ids.length; i += BATCH) chunks.push(ids.slice(i, i + BATCH));
                const results = await Promise.all(
                    chunks.map(chunk => window.supabaseClient.from('profiles').select('*').in('username', chunk))
                );
                const profs = results.flatMap(r => r.data || []);

                if (!profs.length) { root.innerHTML = `<div style="padding:100px; text-align:center; opacity:0.3; font-weight:950;">ISOLATED NODE</div>`; return; }
                root.innerHTML = profs.map(p => `
                    <div class="feed-item" style="display:flex; align-items:center; gap:20px; cursor:pointer;" onclick="location.href='profile.html?user=${encodeURIComponent(p.username)}'">
                        <img src="${p.avatar_url || 'jay.png'}" style="width:60px; height:60px; border-radius:20px; background:#111;">
                        <div>
                            <div style="font-weight:950; font-size:1.2rem; display:flex; align-items:center; gap:10px;">${esc(p.display_name || p.username)} ${p.role==='admin'?'<span class="badge b-blue" style="font-size:0.5rem;">STAFF</span>':''}</div>
                            <div style="color:var(--accent); font-weight:800; font-size:0.8rem;">@${esc(p.username)}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                root.innerHTML = `<div style="padding:100px; text-align:center; opacity:0.3; font-weight:950;">SYSTEM DATA SEGMENT EMPTY</div>`;
            }
        }

        async function syncStats() {
            const { count: f1 } = await window.supabaseClient.from('follows').select('*', { count: 'exact', head: true }).eq('following', user);
            const { count: f2 } = await window.supabaseClient.from('follows').select('*', { count: 'exact', head: true }).eq('follower', user);
            document.getElementById('stat-followers').innerText = f1 || 0;
            document.getElementById('stat-following').innerText = f2 || 0;
            const { data: rep } = await window.supabaseClient.from('threads').select('likes').eq('author', user);
            document.getElementById('stat-reputation').innerText = rep?.reduce((a,b) => a + (b.likes||0), 0) || 0;
        }

        window.openM = () => {
            const p = state.profile;
            document.getElementById('m-name').value = p.display_name || '';
            document.getElementById('m-pfp').value = p.avatar_url || '';
            document.getElementById('m-banner').value = p.banner_url || '';
            document.getElementById('m-bio').value = p.bio || '';
            document.getElementById('edit-modal').classList.add('open');
        };

        window.closeM = () => document.getElementById('edit-modal').classList.remove('open');

        window.saveIdentity = async () => {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (!session) { alert('Not authenticated.'); return; }

            const upd = {
                display_name: document.getElementById('m-name').value.trim(),
                avatar_url: document.getElementById('m-pfp').value.trim(),
                banner_url: document.getElementById('m-banner').value.trim(),
                bio: document.getElementById('m-bio').value.trim()
            };

            const { error } = await window.supabaseClient.from('profiles').update(upd).eq('id', session.user.id);
            if (!error) {
                state.profile = { ...state.profile, ...upd };
                document.getElementById('name-ui').innerText = upd.display_name || user;
                document.getElementById('bio-ui').innerText = upd.bio || 'This entity has not yet transmitted bio-data.';
                if (upd.avatar_url) document.getElementById('pfp-ui').src = upd.avatar_url;
                if (upd.banner_url) document.getElementById('banner-ui').style.background = `url(${upd.banner_url}) center/cover`;
                
                if (upd.display_name) localStorage.setItem('rbx_display_name', upd.display_name);
                if (upd.avatar_url) localStorage.setItem('rbx_pic', upd.avatar_url);

                closeM();
                if (window.showTopNotification) window.showTopNotification('Identity updated successfully.', 'info');
            } else {
                alert('CLOUD_SYNC_FAILED: ' + error.message);
            }
        };

        window.switchTab = (view, el) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            state.view = view;
            renderFeed();
        };

        async function checkFollow() {
            const b = document.getElementById('follow-btn');
            if (!b) return;
            const { data } = await window.supabaseClient.from('follows').select('*').eq('follower', state.me).eq('following', user).maybeSingle();
            if (data) {
                b.innerText = 'Synchronized';
                b.classList.remove('primary');
                b.style.opacity = '0.5';
            } else {
                b.innerText = 'Connect';
                b.classList.add('primary');
                b.style.opacity = '1';
            }
        }

        async function toggleFollow() {
            const b = document.getElementById('follow-btn');
            if (!b || !state.me) return;
            if (b.innerText === 'Synchronized') {
                const { error } = await window.supabaseClient.from('follows').delete().eq('follower', state.me).eq('following', user);
                if (!error) {
                    if (window.showTopNotification) window.showTopNotification(`Link severed with @${user}`, 'info');
                }
            } else {
                const { error } = await window.supabaseClient.from('follows').upsert([{ follower: state.me, following: user }], { onConflict: 'follower,following' });
                if (!error) {
                    if (window.showTopNotification) window.showTopNotification(`Established link with @${user}`, 'info');
                }
            }
            await syncStats();
            checkFollow();
        }

        function esc(s) { return s?String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])):""; }
        document.addEventListener('DOMContentLoaded', boot);
    </script>
</body>
</html>
