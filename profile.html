<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --accent: #00A2FF;
            --border: rgba(255, 255, 255, 0.05);
            --text-dim: #555;
            --glass: rgba(255, 255, 255, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        .profile-container {
            max-width: 1000px;
            margin: 80px auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 40px;
            padding: 0 20px;
        }

        /* LEFT SIDE: Identity Card */
        .identity-aside {
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .banner {
            height: 120px;
            background: linear-gradient(45deg, #111, #222);
            position: relative;
        }

        .pfp-wrap {
            width: 120px;
            height: 120px;
            margin: -60px auto 0;
            position: relative;
            z-index: 2;
        }

        .pfp {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            border: 6px solid var(--surface);
            object-fit: cover;
            background: #111;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 12px;
            height: 12px;
            background: #00ff88;
            border: 2px solid var(--surface);
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
        }

        .card-info {
            padding: 30px;
            text-align: center;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .handle {
            color: var(--accent);
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 5px;
            opacity: 0.8;
        }

        .bio {
            margin-top: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #888;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .badges-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .badge {
            background: var(--glass);
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }

        .badge.active {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(0, 162, 255, 0.05);
        }

        .btn-edit {
            width: 100%;
            margin-top: 25px;
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-edit:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            transform: translateY(-3px);
        }

        /* RIGHT SIDE: Activity & Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .tab {
            padding: 15px 30px;
            cursor: pointer;
            color: var(--text-dim);
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #fff;
            border-color: var(--accent);
        }

        .tab:hover {
            color: #fff;
        }

        .stat-shuttle {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-val {
            display: block;
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
        }

        .stat-lbl {
            font-size: 0.65rem;
            font-weight: 900;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .post-cloud {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .post-item {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .post-item:hover {
            transform: scale(1.01);
            border-color: var(--accent);
        }

        .post-time {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-weight: 800;
            text-transform: uppercase;
            margin-top: 15px;
            display: block;
        }

        /* MODAL (Same logic as before but better UI) */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        .modal-box {
            background: #0a0a0a;
            width: 400px;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--border);
            position: relative;
        }

        .m-title {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .m-sub {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-bottom: 30px;
            font-weight: 700;
            text-transform: uppercase;
        }

        input,
        textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(0, 162, 255, 0.02);
        }

        .m-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #fff;
            color: #000;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }

        .m-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }
    </style>
    <!-- GLOBAL CONTROLS -->
    <link rel="stylesheet" href="global.css">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="global.js" defer></script>
</head>

<body>

    <header class="header">
        <a href="index.html" class="logo interactable">ADIYAN<span>.</span>NEXUS</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Nexus</a>
            <a href="threads.html" class="nav-item">Threads</a>
            <a href="discuss.html" class="nav-item">Discuss</a>
            <div id="auth-nav"></div>
        </nav>
    </header>

    <div class="profile-container">
        <!-- IDENTITY CARD -->
        <aside class="identity-aside">
            <div class="card">
                <div id="banner-ui" class="banner"></div>
                <div class="pfp-wrap">
                    <img id="pfp-ui" class="pfp" src="https://via.placeholder.com/150">
                    <div class="status-dot"></div>
                </div>
                <div class="card-info">
                    <h1 id="name-ui" class="name">Identifying...</h1>
                    <div id="handle-ui" class="handle">@nexus_guest</div>

                    <div class="badges-row">
                        <div class="badge active">Verified</div>
                        <div class="badge" id="badge-rank">Rank: 0</div>
                        <div class="badge" style="color:#f91880;">OG</div>
                    </div>

                    <p id="bio-ui" class="bio">No identity record found in local cache. Synchronizing with cloud
                        database...</p>

                    <div id="edit-slot"></div>
                </div>
            </div>
        </aside>

        <!-- ACTIVITY HUB -->
        <main class="activity-hub">
            <div class="stat-shuttle">
                <div class="stat-box">
                    <span class="stat-val" id="posts-count">0</span>
                    <span class="stat-lbl">Transmissions</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val">100%</span>
                    <span class="stat-lbl">Uptime</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="rep-val">0</span>
                    <span class="stat-lbl">Reputation</span>
                </div>
            </div>

            <nav class="tabs">
                <div class="tab active">Archive</div>
                <div class="tab">Connections</div>
                <div class="tab">Saved</div>
            </nav>

            <div id="posts-feed" class="post-cloud">
                <!-- Posts will slide in here -->
            </div>
        </main>
    </div>

    <!-- MODAL (Enhanced UI) -->
    <div id="edit-modal" class="modal">
        <div class="modal-box">
            <div class="m-title">Edit Identity</div>
            <div class="m-sub">Personalize your Network Record</div>

            <input type="text" id="m-pfp" placeholder="Avatar URL">
            <textarea id="m-bio" rows="4" placeholder="Update your global transmission..."></textarea>
            <div style="display:flex; gap:10px; align-items:center; margin-bottom:20px;">
                <span class="stat-lbl" style="flex:1;">Banner Hue</span>
                <input type="color" id="m-color"
                    style="width:100px; height:40px; margin:0; padding:0; border:none; cursor:pointer;">
            </div>

            <button class="m-btn" onclick="saveProfile()">Push Updates</button>
            <button onclick="closeModal()"
                style="width:100%; margin-top:15px; background:none; border:none; color:#444; font-weight:900; letter-spacing:1px; cursor:pointer;">ABORT</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const user = params.get('user');
        const me = localStorage.getItem('rbx_user');

        window.onload = async () => {
            if (!user) { location.href = 'index.html'; return; }

            document.getElementById('name-ui').innerText = user;
            document.getElementById('handle-ui').innerText = '@' + user.toLowerCase().replace(' ', '');

            if (user === me) {
                document.getElementById('edit-slot').innerHTML = `<button class="btn-edit" onclick="openModal()">Update Profile</button>`;
            } else if (me) {
                // Determine if already following (from cloud)
                checkFollowStatus();
            }

            // LOAD CLOUD DATA
            loadIdentity();
            loadCloudPosts();
            loadFollowCounts();

            gsap.from('.identity-aside', { x: -100, opacity: 0, duration: 1.2, ease: "power4.out" });
            gsap.from('.stat-box', { y: 20, opacity: 0, stagger: 0.1, duration: 1, delay: 0.5, ease: "expo.out" });
        };

        async function checkFollowStatus() {
            if (!window.supabaseClient) { setTimeout(checkFollowStatus, 500); return; }
            const { data } = await window.supabaseClient
                .from('follows')
                .select('*')
                .eq('follower', me)
                .eq('following', user)
                .single();

            const btn = document.createElement('button');
            btn.id = 'follow-btn';
            btn.className = 'btn-edit';
            btn.style.borderColor = data ? 'var(--text-dim)' : 'var(--accent)';
            btn.style.color = data ? 'var(--text-dim)' : '#fff';
            btn.innerText = data ? 'UNLINK ENTITY' : 'ESTABLISH LINK (FOLLOW)';
            btn.onclick = () => toggleFollow(!!data);
            document.getElementById('edit-slot').appendChild(btn);
        }

        async function toggleFollow(isFollowing) {
            const btn = document.getElementById('follow-btn');
            btn.innerText = 'WAIT...';
            if (isFollowing) {
                await window.supabaseClient.from('follows').delete().eq('follower', me).eq('following', user);
            } else {
                await window.supabaseClient.from('follows').insert([{ follower: me, following: user }]);
            }
            location.reload();
        }

        async function loadFollowCounts() {
            if (!window.supabaseClient) { setTimeout(loadFollowCounts, 500); return; }
            const { count: followers } = await window.supabaseClient.from('follows')
                .select('*', { count: 'exact', head: true }).eq('following', user);
            const { count: following } = await window.supabaseClient.from('follows')
                .select('*', { count: 'exact', head: true }).eq('follower', user);

            // Create some follow stats in the stat shuttle
            const shuttle = document.querySelector('.stat-shuttle');
            shuttle.innerHTML += `
                <div class="stat-box">
                    <span class="stat-val">${followers || 0}</span>
                    <span class="stat-lbl">Followers</span>
                </div>
            `;
        }

        async function loadCloudPosts() {
            const feed = document.getElementById('posts-feed');
            feed.innerHTML = '<div style="text-align:center; padding:50px; color:#222; font-weight:900; letter-spacing:2px; font-size:0.7rem;">DECRYPTING CLOUD ARCHIVE...</div>';

            if (window.loadCloudThreads) {
                const data = await window.loadCloudThreads();
                const filtered = data.filter(p => p.author === user);
                feed.innerHTML = '';

                document.getElementById('posts-count').innerText = filtered.length;
                document.getElementById('rep-val').innerText = filtered.length * 10 + 50;
                document.getElementById('badge-rank').innerText = 'Rank: ' + Math.floor(filtered.length / 5);

                if (filtered.length === 0) {
                    feed.innerHTML = '<div style="text-align:center; padding:100px; color:#111; font-weight:900;">NO TRANSMISSIONS DETECTED</div>';
                    return;
                }

                filtered.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'post-item';
                    div.innerHTML = `
                        <div style="font-size:1.1rem; line-height:1.6; color:#fff;">${p.content}</div>
                        <span class="post-time">Archived on ${new Date(p.timestamp).toLocaleDateString()}</span>
                    `;
                    feed.appendChild(div);
                    gsap.from(div, { y: 20, opacity: 0, duration: 0.8, ease: "power3.out" });
                });
            }
        }

        function openModal() {
            document.getElementById('m-bio').value = localStorage.getItem(`bio_${user}`) || '';
            document.getElementById('m-pfp').value = localStorage.getItem(`pfp_${user}`) || '';
            document.getElementById('edit-modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

        function saveProfile() {
            const b = document.getElementById('m-bio').value;
            const p = document.getElementById('m-pfp').value;
            const c = document.getElementById('m-color').value;

            localStorage.setItem(`bio_${me}`, b);
            localStorage.setItem(`pfp_${me}`, p);
            localStorage.setItem(`color_${me}`, c);

            // Critical: Sync to auth session
            if (p) localStorage.setItem('rbx_pic', p);

            location.reload();
        }
    </script>
</body>

</html>
