<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adiyan Studio | Architect Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=Space+Grotesk:wght@500;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <style>
        /* --- THEME SYSTEM --- */
        :root {
            --bg: #030303;
            --text: #ffffff;
            --box-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --text: #000000;
            --box-bg: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.1);
            --accent: #000000;
            --nav-bg: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; 
            height: 100vh;
            transition: background 0.5s ease;
        }

        @media (min-width: 1024px) { 
            body { cursor: none !important; } 
            a, button { cursor: none !important; }
        }

        /* --- FANCY BUBBLE HEADER --- */
        .main-nav {
            position: fixed; top: 0; width: 100%; z-index: 10000;
            padding: 25px 0; display: flex; flex-direction: column; align-items: center; gap: 15px;
            background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%);
        }

        .logo { 
            font-family: 'Space Grotesk'; font-weight: 900; letter-spacing: 4px; 
            font-size: 1.1rem; color: var(--text);
        }

        .nav-links {
            display: flex; gap: 10px; background: var(--nav-bg); 
            padding: 8px 15px; border-radius: 50px; border: 1px solid var(--border);
            backdrop-filter: blur(15px);
        }

        .nav-item {
            text-decoration: none; color: var(--text); font-size: 0.7rem;
            font-weight: 800; padding: 6px 15px; border-radius: 20px;
            transition: 0.3s; opacity: 0.6;
        }

        .nav-item:hover, .nav-item.active { opacity: 1; background: var(--box-bg); }
        .nav-item.active { background: var(--text); color: var(--bg); }

        /* --- THEME TOGGLE --- */
        .theme-toggle {
            position: fixed; bottom: 30px; right: 30px; z-index: 10001;
            padding: 12px 20px; border-radius: 50px; background: var(--nav-bg);
            border: 1px solid var(--border); color: var(--text);
            font-family: 'Space Grotesk'; font-size: 0.6rem; font-weight: 900;
            backdrop-filter: blur(10px); cursor: pointer;
        }

        /* --- BACKGROUND --- */
        #video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; object-fit: cover; opacity: 0.15; filter: blur(8px);
        }

        /* --- PHYSICS BOXES --- */
        .physics-box {
            position: absolute; padding: 40px 60px;
            background: var(--box-bg); border: 1px solid var(--border);
            backdrop-filter: blur(20px); border-radius: 24px;
            text-decoration: none; color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            user-select: none; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        .physics-box h2 { font-family: 'Space Grotesk'; font-size: 2.8rem; pointer-events: none; line-height: 1; }
        .physics-box span { font-size: 0.65rem; letter-spacing: 3px; color: #888; pointer-events: none; margin-bottom: 10px; }

        /* --- CURSOR --- */
        .cursor-main { 
            width: 20px; height: 20px; border: 1px solid var(--text); border-radius: 50%; 
            position: fixed; pointer-events: none; z-index: 99999; 
            mix-blend-mode: difference; transition: transform 0.1s ease-out;
        }
        .cursor-active { transform: scale(3); background: rgba(255,255,255,0.2); }
    </style>
</head>
<body data-theme="dark">

    <div class="cursor-main"></div>

    <header class="main-nav">
        <div class="logo">ADIYAN STUDIO<span>.</span></div>
        <nav class="nav-links">
            <a href="index.html" class="nav-item active">PORTAL</a>
            <a href="website.html" class="nav-item">WEB PORTFOLIO</a>
            <a href="roblox.html" class="nav-item">ROBLOX</a>
            <a href="discuss.html" class="nav-item">DISCUSS</a>
        </nav>
    </header>

    <button class="theme-toggle" id="themeBtn">SWITCH_ATMOSPHERE</button>

    <video id="video-bg" autoplay loop muted playsinline>
        <source src="videos/hub-glitch.mp4" type="video/mp4">
    </video>

    <a href="website.html" class="physics-box" id="web-box">
        <span>SECTOR_01</span>
        <h2>WEB_DEV</h2>
    </a>

    <a href="roblox.html" class="physics-box" id="roblox-box">
        <span>SECTOR_02</span>
        <h2>ROBLOX</h2>
    </a>

    <script>
        // --- THEME LOGIC ---
        const themeBtn = document.getElementById('themeBtn');
        themeBtn.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        });

        // --- PHYSICS ENGINE (Matter.js) ---
        const { Engine, Bodies, Composite, MouseConstraint, Mouse } = Matter;
        const engine = Engine.create();
        
        // Boundaries (Floor, Walls, Ceiling)
        const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true });
        const leftWall = Bodies.rectangle(-50, window.innerHeight/2, 100, window.innerHeight, { isStatic: true });
        const rightWall = Bodies.rectangle(window.innerWidth + 50, window.innerHeight/2, 100, window.innerHeight, { isStatic: true });
        const ceiling = Bodies.rectangle(window.innerWidth/2, -500, window.innerWidth, 100, { isStatic: true });
        Composite.add(engine.world, [ground, leftWall, rightWall, ceiling]);

        // Box Creator
        function initBox(id, x, y) {
            const el = document.getElementById(id);
            const body = Bodies.rectangle(x, y, el.offsetWidth, el.offsetHeight, {
                restitution: 0.5, friction: 0.1, chamfer: { radius: 24 }
            });
            return { body, el };
        }

        const boxes = [
            initBox('web-box', window.innerWidth * 0.3, -200),
            initBox('roblox-box', window.innerWidth * 0.6, -500)
        ];
        boxes.forEach(b => Composite.add(engine.world, b.body));

        // Mouse Grab Interaction
        const mouse = Mouse.create(document.body);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });
        Composite.add(engine.world, mouseConstraint);

        // Update Loop
        (function renderLoop() {
            Engine.update(engine);
            boxes.forEach(b => {
                b.el.style.left = `${b.body.position.x - b.el.offsetWidth/2}px`;
                b.el.style.top = `${b.body.position.y - b.el.offsetHeight/2}px`;
                b.el.style.transform = `rotate(${b.body.angle}rad)`;
            });
            requestAnimationFrame(renderLoop);
        })();

        // Click Logic (Dragging vs Clicking)
        boxes.forEach(b => {
            b.el.addEventListener('click', e => {
                if (b.body.speed > 2) e.preventDefault();
            });
        });

        // --- CUSTOM CURSOR ---
        const cursor = document.querySelector('.cursor-main');
        window.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });

        window.addEventListener('resize', () => location.reload());
    </script>
</body>
</html>
