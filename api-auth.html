<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus // Authenticating...</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg: #030303;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00A2FF;
            --accent-glow: rgba(0, 162, 255, 0.3);
            --transition: cubic-bezier(0.76, 0, 0.24, 1);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .auth-card {
            width: 450px; padding: 50px; background: rgba(10,10,10,0.8); backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 24px; position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); z-index: 10; text-align: center;
        }

        .auth-header h1 { font-weight: 900; font-size: 2rem; letter-spacing: -1px; text-transform: uppercase; margin-bottom: 30px; }
        .auth-header span { color: var(--accent); }

        .loader-ring {
            width: 80px; height: 80px; border: 4px solid rgba(255,255,255,0.05);
            border-top-color: var(--accent); border-radius: 50%;
            margin: 0 auto 30px; animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
            box-shadow: 0 0 40px var(--accent-glow);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #status { font-weight: 700; font-size: 1.1rem; letter-spacing: 1px; text-transform: uppercase; color: #fff; margin-bottom: 10px; }
        #subtext { font-size: 0.85rem; color: #555; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        .btn-cancel { margin-top: 40px; background: transparent; border: 1px solid #1a1a1a; color: #444; padding: 12px 30px; border-radius: 100px; font-weight: 900; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; }
        .btn-cancel:hover { border-color: #ff3366; color: #fff; }
    </style>
    <!-- Global Control Center via Super Admin -->
    <link rel="stylesheet" href="global.css">
    <script src="global.js" defer></script>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <h1>NEXUS<span>.</span>LINK</h1>
        </div>

        <div class="loader-ring"></div>
        
        <div id="status">Establishing Link</div>
        <div id="subtext">Waiting for Roblox verification...</div>

        <button class="btn-cancel" onclick="location.href='index.html'">Abort Protocol</button>
    </div>

    <script>
        const clientId = "4112872619143689543"; 
        const redirectUri = encodeURIComponent(window.location.origin + window.location.pathname);
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        window.onload = () => {
            gsap.from('.auth-card', { y: 50, opacity: 0, scale: 0.9, duration: 1, ease: 'expo.out' });
            gsap.from('.loader-ring', { scale: 0, opacity: 0, duration: 1, delay: 0.3, ease: 'back.out(2)' });
            gsap.from('#status, #subtext', { y: 20, opacity: 0, stagger: 0.2, duration: 0.8, delay: 0.5 });
            
            setTimeout(processAuth, 1000);
        };

        async function processAuth() {
            if (!code) {
                // STEP 1: INITIAL REDIRECT
                document.getElementById('status').innerText = "Redirecting";
                document.getElementById('subtext').innerText = "Linking to global OAuth node...";
                window.location.href = `https://apis.roblox.com/oauth/v1/authorize?client_id=${clientId}&redirect_uri=${redirectUri}&scope=openid%20profile&response_type=code`;
            } else {
                // STEP 2: RETURNED WITH CODE
                document.getElementById('status').innerText = "Verification Phase";
                document.getElementById('subtext').innerText = "Acquiring network signature...";
                
                // MOCK CLIENT SIDE VERIFICATION (Because of GH static limits)
                // In a real app we'd fetch to a backend. Here we use user prompt to mock the user data.
                const username = prompt("Verify your Roblox Username to finalize the session link:");
                
                if(username) {
                    try {
                        document.getElementById('status').innerText = "Metadata Retrieval";
                        document.getElementById('subtext').innerText = "Parsing user assets...";
                        
                        const s = await fetch(`https://users.roproxy.com/v1/users/search?keyword=${username}&limit=1`);
                        const sd = await s.json();
                        if(!sd.data || !sd.data[0]) throw new Error("Agent ID Not Found");
                        
                        const t = await fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${sd.data[0].id}&size=150x150&format=Png`);
                        const td = await t.json();
                        const pfp = td.data[0].imageUrl;

                        // SAVE TO GLOBAL STATE
                        localStorage.setItem('rbx_user', sd.data[0].name);
                        localStorage.setItem('rbx_pic', pfp);
                        
                        document.getElementById('status').innerText = "Session Synced";
                        document.getElementById('subtext').innerText = "System online. Entering hub...";
                        
                        setTimeout(() => location.href = 'index.html', 1000);
                    } catch(e) {
                        alert("PROTOCOL ERROR: " + e.message);
                        location.reload();
                    }
                } else {
                    location.href = 'auth.html';
                }
            }
        }
    </script>
</body>
</html>
